      function applyLens() {
        if (!S.lensMode || !S.focused) { exitLensMode(); return; }
        const visible = getNeighborKeys(S.focused, S.lensDepth);
        document.querySelectorAll('.idea, .zone').forEach(el => {
          if (el.style.display === 'none') return;
          let key = null;
          if (el.classList.contains('idea')) key = `idea:${el.id.replace('idea-', '')}`;
          else if (el.classList.contains('zone')) key = `zone:${el.id.replace('zone-', '')}`;
          if (key) el.classList.toggle('lens-dim', !visible.has(key));
        });
      }

      function enterLensMode() {
        if (!S.focused) { toast('先にオブジェクトを選択してください'); return; }
        S.lensMode = true; S.lensDepth = 1;
        applyLens();
        toast('フォーカスレンズ — 1〜3 で深さ変更  L or Esc で終了');
        updateCmd();
      }

      function exitLensMode() {
        if (!S.lensMode) return;
        S.lensMode = false;
        document.querySelectorAll('.lens-dim').forEach(el => el.classList.remove('lens-dim'));
        updateCmd();
      }

      // ─── AUTO LAYOUT (force-directed) ────────────────────────────────────
      function autoLayout() {
        pushHistory();
        const nodes = [];
        Object.values(S.ideas).forEach(o => {
          const el = getEl('idea', o.id);
          if (!el || el.style.display === 'none') return;
          nodes.push({
            id: o.id, kind: 'idea', x: o.x + (el.offsetWidth || 160) / 2, y: o.y + (el.offsetHeight || 80) / 2,
            w: el.offsetWidth || 160, h: el.offsetHeight || 80, vx: 0, vy: 0, fx: 0, fy: 0
          });
        });
        if (nodes.length < 2) { toast('アイデアが少なすぎます'); return; }

        const nodeMap = {};
        nodes.forEach(n => nodeMap[`${n.kind}:${n.id}`] = n);
        const springs = [];
        S.connectors.forEach(c => {
          const a = nodeMap[`${c.from.kind}:${c.from.id}`];
          const b = nodeMap[`${c.to.kind}:${c.to.id}`];
          if (a && b) springs.push([a, b]);
        });

        const cx0 = nodes.reduce((s, n) => s + n.x, 0) / nodes.length;
        const cy0 = nodes.reduce((s, n) => s + n.y, 0) / nodes.length;

        runForceSim(nodes, springs, 180);

        // Re-center on original centroid
        const cx1 = nodes.reduce((s, n) => s + n.x, 0) / nodes.length;
        const cy1 = nodes.reduce((s, n) => s + n.y, 0) / nodes.length;
        nodes.forEach(n => { n.x += cx0 - cx1; n.y += cy0 - cy1; });

        // Capture start/end positions (center → top-left)
        const startPos = {}, endPos = {};
        nodes.forEach(n => {
          const obj = S.ideas[n.id];
          if (!obj) return;
          const key = `${n.kind}:${n.id}`;
          startPos[key] = { x: obj.x, y: obj.y };
          endPos[key] = { x: n.x - n.w / 2, y: n.y - n.h / 2 };
        });

        const DURATION = 700, t0 = performance.now();
        function tick(t) {
          const p = Math.min((t - t0) / DURATION, 1);
          const ease = 1 - Math.pow(1 - p, 3);
          nodes.forEach(n => {
            const key = `${n.kind}:${n.id}`;
            const s = startPos[key], e = endPos[key]; if (!s || !e) return;
            const nx = s.x + (e.x - s.x) * ease, ny = s.y + (e.y - s.y) * ease;
            const obj = S.ideas[n.id];
            if (!obj) return;
            obj.x = nx; obj.y = ny;
            const el = getEl(n.kind, n.id); if (el) { el.style.left = nx + 'px'; el.style.top = ny + 'px'; }
          });
          redrawConnectors();
          if (p < 1) requestAnimationFrame(tick);
          else { save(); toast('自動配置しました'); }
        }
        requestAnimationFrame(tick);
        toast('整列中...');
      }

      // ─── CONNECT MODE ─────────────────────────────────────────────────────
      // フォーカス中オブジェクトを接続元に設定してコネクトモードを開始し、プレビュー線の描画準備をする。
      function startConnectMode() {
        if (!S.focused) { toast('先にオブジェクトを選択してください'); return; }
        S.connectFrom = { ...S.focused };
        S.cmdMode = 'c'; S.cmdBuf = 'c';
        const srcEl = getEl(S.connectFrom.kind, S.connectFrom.id);
        if (srcEl) srcEl.classList.add('connect-source');
        updateCmd();
        toast(`接続元: ${endpointLabel(S.connectFrom)} — 矢印キー or f で相手を選択 → Enter:ライン  Shift+Enter:アロー  Esc:キャンセル`);
      }

      function exitConnectMode() {
        svgOverlay.querySelectorAll('.conn-preview').forEach(e => e.remove());
        if (S.connectFrom) {
          const srcEl = getEl(S.connectFrom.kind, S.connectFrom.id);
          if (srcEl) srcEl.classList.remove('connect-source');
        }
        S.connectFrom = null;
        S.cmdMode = null; S.cmdBuf = '';
        updateCmd();
      }

      // コネクトモード中に接続元から現在フォーカス先へのプレビュー曲線をSVGオーバーレイに描画する。
      function updateConnectLine() {
        svgOverlay.querySelectorAll('.conn-preview').forEach(e => e.remove());
        if (S.cmdMode !== 'c' || !S.connectFrom || !S.focused) return;
        if (epEqual(S.connectFrom, S.focused)) return;
        const a = objScreenCenter(S.connectFrom);
        const b = objScreenCenter(S.focused);
        if (!a || !b) return;
        const g = document.createElementNS('http://www.w3.org/2000/svg', 'g');
        g.classList.add('conn-preview');
        const dx = b.x - a.x, dy = b.y - a.y;
        const d = `M${a.x},${a.y} C${a.x + dx * .35},${a.y} ${a.x + dx * .65},${b.y} ${b.x},${b.y}`;
        const glow = document.createElementNS('http://www.w3.org/2000/svg', 'path');
        glow.setAttribute('d', d); glow.setAttribute('fill', 'none');
        glow.setAttribute('stroke', '#7b6cf6'); glow.setAttribute('stroke-width', '8'); glow.setAttribute('opacity', '.18');
        g.appendChild(glow);
        const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
        path.setAttribute('d', d); path.setAttribute('fill', 'none');
        path.setAttribute('stroke', '#fff'); path.setAttribute('stroke-width', '1.5');
        path.setAttribute('opacity', '.7'); path.setAttribute('stroke-dasharray', '7 3');
        g.appendChild(path);
        svgOverlay.appendChild(g);
      }

      function handleConnectKey(e) {
        if (e.key === 'Escape') { exitConnectMode(); return; }
        if (['ArrowLeft', 'ArrowRight', 'ArrowUp', 'ArrowDown'].includes(e.key)) {
          e.preventDefault();
          navigateFocus(e.key);
          updateConnectLine();
          return;
        }
        if (e.key === 'f') {
          e.preventDefault();
          openHintSelect(true); // return to connect mode after selection
          return;
        }
        if (e.key === 'Enter') {
          e.preventDefault();
          if (S.focused && !epEqual(S.connectFrom, S.focused)) {
            connectEndpoints(S.connectFrom, S.focused, e.shiftKey ? 'arrow' : 'line');
          }
          exitConnectMode();
          return;
        }
      }

      // ─── HINT SELECT (Vimium-style) ───────────────────────────────────────
      function openHintSelect(returnToConnect = false, moveMode = false, bridgeMode = false) {
        closeHintSelect();
        const objs = [];
        if (moveMode) {
          // Move: all objects not yet in move selection
          const inSel = ({ kind, id }) => S.moveSelection.some(s => s.kind === kind && s.id === id);
          Object.values(S.ideas).forEach(o => {
            const el = document.getElementById(`idea-${o.id}`);
            if (el && el.style.display !== 'none' && !inSel({ kind: 'idea', id: o.id }))
              objs.push({ kind: 'idea', id: o.id });
          });
          S.zones.forEach(z => {
            const el = document.getElementById(`zone-${z.id}`);
            if (el && !inSel({ kind: 'zone', id: z.id })) objs.push({ kind: 'zone', id: z.id });
          });
        } else {
          Object.values(S.ideas).forEach(o => {
            const el = document.getElementById(`idea-${o.id}`);
            if (el && el.style.display !== 'none') objs.push({ kind: 'idea', id: o.id });
          });
          S.zones.forEach(z => {
            const el = document.getElementById(`zone-${z.id}`);
            if (el) objs.push({ kind: 'zone', id: z.id });
          });
        }
        if (!objs.length) {
          if (moveMode && S.moveSelection.length > 0) toast(`${S.moveSelection.length}件選択済 — 矢印キーで移動`);
          return;
        }
        const chars = 'ASDFJKLGHQWERTYUIOPZXCVBNM';
        const hintMap = {};
        objs.forEach((obj, i) => {
          const h = i < chars.length ? chars[i] : chars[Math.floor(i / chars.length) - 1] + chars[i % chars.length];
          hintMap[h] = obj;
          const sc = objScreenCenter(obj);
          if (!sc) return;
          const div = document.createElement('div');
          div.className = 'hint-label';
          div.dataset.hint = h;
          div.textContent = h;
          div.style.left = sc.x + 'px';
          div.style.top = sc.y + 'px';
          document.body.appendChild(div);
        });
        S.hintMap = hintMap;
        S.hintBuf = '';
        S.hintReturnToConnect = returnToConnect;
        S.hintReturnToMove = moveMode;
        S.hintReturnToBridge = bridgeMode;
        S.cmdMode = 'hint';
        updateCmd();
      }

      function closeHintSelect() {
        document.querySelectorAll('.hint-label').forEach(e => e.remove());
        const wasMove = S.hintReturnToMove;
        S.hintMap = null; S.hintBuf = '';
        S.hintReturnToConnect = false;
        S.hintReturnToMove = false; S.hintReturnToBridge = false;
        if (S.cmdMode === 'hint') {
          // Restore the parent mode if we were in a multi-select flow
          if (wasMove) S.cmdMode = 'move';
          else S.cmdMode = null;
          updateCmd();
        }
      }

      function handleHintKey(e) {
        const k = e.key.toUpperCase();
        if (e.key === 'Escape') { closeHintSelect(); return; }
        if (/^[A-Z]$/.test(k)) {
          e.preventDefault();
          S.hintBuf += k;
          // Dim hints that no longer match
          document.querySelectorAll('.hint-label').forEach(el => {
            el.classList.toggle('faded', !el.dataset.hint.startsWith(S.hintBuf));
          });
          if (S.hintMap[S.hintBuf]) {
            const target = S.hintMap[S.hintBuf];
            const returnToConnect = S.hintReturnToConnect;
            const returnToMove = S.hintReturnToMove;
            const returnToBridge = S.hintReturnToBridge;
            const savedFrom = S.connectFrom ? { ...S.connectFrom } : null;
            closeHintSelect();
            if (returnToMove) {
              const ep = { kind: target.kind, id: target.id };
              if (!S.moveSelection.some(s => s.kind === ep.kind && s.id === ep.id)) {
                S.moveSelection.push(ep);
                const tEl = getEl(target.kind, target.id);
                if (tEl) tEl.classList.add('move-selected');
              }
              S.cmdMode = 'move';
              updateCmd();
              requestAnimationFrame(() => openHintSelect(false, true));
            } else if (returnToBridge) {
              S.connectFrom = null; S.cmdMode = null; S.cmdBuf = '';
              if (savedFrom) createBridgeIdea(savedFrom, { kind: target.kind, id: target.id });
            } else {
              focus(target.kind, target.id);
              if (returnToConnect && S.connectFrom) {
                S.cmdMode = 'c'; S.cmdBuf = 'c';
                updateConnectLine(); updateCmd();
              }
            }
          } else if (!Object.keys(S.hintMap).some(h => h.startsWith(S.hintBuf))) {
            closeHintSelect();
          } else {
            updateCmd();
          }
          return;
        }
      }

      // ─── PALETTE ──────────────────────────────────────────────────────────
      // カラーパレットUIを表示してパレットコマンドモードに移行する。
      function openPalette() {
        if (!S.lastFocused) { toast('先にオブジェクトを選択してください'); return; }
        S.cmdMode = 'palette'; palette.classList.add('show'); updateCmd();
      }
      function closePalette() {
        palette.classList.remove('show');
        if (S.cmdMode === 'palette') S.cmdMode = null;
      }
      function handlePaletteKey(key) {
        const c = COLOR_KEYS[key];
        if (c) applyColor(c);
        closePalette(); updateCmd();
      }
      // 最後にフォーカスされたオブジェクトに指定カラーを適用し、コネクターを再描画して保存する。
      function applyColor(color) {
        pushHistory();
        const lf = S.lastFocused;
        if (!lf) return;
        if (lf.kind === 'idea') {
          const o = S.ideas[lf.id]; if (!o) return;
          o.color = color; renderIdea(lf.id); focus('idea', lf.id);
        } else if (lf.kind === 'zone') {
          const z = S.zones.find(z => z.id === lf.id); if (!z) return;
          z.color = color; renderZone(lf.id); focus('zone', lf.id);
        }
        buildArrowMarkers(); redrawConnectors(); save();
      }
      document.querySelectorAll('.psw').forEach(sw => {
        sw.addEventListener('click', () => { applyColor(sw.dataset.c); closePalette(); });
      });

      // ─── DELETE ───────────────────────────────────────────────────────────
      function deleteSelected() {
        if (!S.focused) return;
        pushHistory();
        const { kind, id } = S.focused;
        const el = getEl(kind, id);
        if (el) { el.classList.add('fade-out'); setTimeout(() => el.remove(), 200); }
        const rmConns = () => {
          S.connectors = S.connectors.filter(c =>
            !(c.from.kind === kind && c.from.id === id) && !(c.to.kind === kind && c.to.id === id));
        };
        if (kind === 'idea') {
          delete S.ideas[id];
          rmConns();
          redrawConnectors();
        } else if (kind === 'zone') {
          S.zones = S.zones.filter(z => z.id !== id);
          rmConns(); redrawConnectors();
        }
        S.focused = null;
        save(); updateStat(); updateCmd();
      }


      // ─── CMD / STATUS ─────────────────────────────────────────────────────
      // 現在のモード・フォーカス状態に応じてコマンドバーのヘルプテキストとフォーカスバッジを更新する。
      function updateCmd() {
        let txt = '';
        if (S.cmdMode === 'c' && S.connectFrom)
          txt = `接続元: ${endpointLabel(S.connectFrom)} → 矢印キー/f で対象選択  Enter:ライン  Shift+Enter:アロー  Esc:中止`;
        else if (S.cmdMode === 'hint' && S.hintReturnToMove)
          txt = `移動対象を選択 — ${S.moveSelection.length}件選択済  [${S.hintBuf || '_'}]  矢印:移動  Esc:終了`;
        else if (S.cmdMode === 'hint')
          txt = `ジャンプ [${S.hintBuf || '_'}] — アルファベットを入力  Esc:キャンセル`;
        else if (S.cmdMode === 'move')
          txt = `移動モード: ${S.moveSelection.length}件選択済  f:追加  ↑↓←→:移動  Shift+↑↓:大移動  Enter:確定  Esc:終了`;
        else if (S.cmdBuf) txt = S.cmdBuf;
        else if (S.cmdMode === 'palette') txt = 'COLOR: 1紫  2シアン  3緑  4琥珀  5ピンク  Esc:キャンセル';
        else if (S.mode === 'resize') txt = `リサイズモード — ↑↓←→:サイズ変更  Enter:確定`;
        else if (S.cmdMode === 'v') txt = 'VIEW: Enter=全体  1-9=テンキー位置  Esc:キャンセル';
        else if (S.cmdMode === 'bridge') txt = `架け橋: 接続先を選択 — f:選択  Esc:キャンセル`;
        else if (S.lensMode) txt = `フォーカスレンズ (深さ:${S.lensDepth}) — 1〜3:深さ変更  L/Esc:終了`;
        else if (S.focused) { const { kind } = S.focused; txt = `${kind} 選択中 — Enter:編集  c:接続  g:架け橋  l:レンズ  f:別を選択  p:カラー  x:削除`; }
        cmdBufEl.textContent = txt;
      }
      // ヘッダーのアイデア数・ゾーン数などの統計表示を更新する。
      function updateStat() {
        const ni = Object.keys(S.ideas).length, nc = S.connectors.length, nz = S.zones.length;
        let s = `${ni} idea${ni !== 1 ? 's' : ''}`;
        if (nc) s += ` · ${nc} conn`;
        if (nz) s += ` · ${nz} zone${nz !== 1 ? 's' : ''}`;
        cmdStat.textContent = s;
      }

      // ─── THEME ────────────────────────────────────────────────────────────
      document.getElementById('theme-btn').addEventListener('click', () => {
        S.theme = S.theme === 'dark' ? 'light' : 'dark';
        document.body.classList.toggle('light', S.theme === 'light');
        document.getElementById('theme-btn').textContent = S.theme === 'dark' ? '◑' : '◐';
        save();
      });

      // ─── PERSIST ──────────────────────────────────────────────────────────
      let saveTimer;
      // アプリ全状態をlocalStorageに保存する。外部サーバーへの通信は一切行わない。
      function save() {
        clearTimeout(saveTimer);
        saveTimer = setTimeout(() => {
          try {
            localStorage.setItem('ideaboard_v4', JSON.stringify({
              ideas: S.ideas, connectors: S.connectors, zones: S.zones,
              nextId: S.nextId, pan: S.pan, zoom: S.zoom, theme: S.theme
            }));
          } catch (e) { }
        }, 400);
      }

      // localStorageから保存済み状態を読み込み、古いバージョン(v3)からの移行も処理する。
      function loadSaved() {
        try {
          const raw = localStorage.getItem('ideaboard_v4') || localStorage.getItem('ideaboard_v3');
          if (!raw) return false;
          const d = JSON.parse(raw);
          Object.assign(S, {
            ideas: d.ideas || {}, connectors: d.connectors || [],
            zones: d.zones || [],
            nextId: d.nextId || 1, pan: d.pan || S.pan, zoom: d.zoom || 1, theme: d.theme || 'dark'
          });
          // normalize idea ids to numbers
          const fixed = {};
          Object.entries(S.ideas).forEach(([k, v]) => { fixed[+k] = v; v.id = +v.id; });
          S.ideas = fixed;
          // normalize connectors: old format had numeric from/to, new format uses {kind,id}
          S.connectors.forEach(c => {
            if (typeof c.from !== 'object') c.from = { kind: 'idea', id: +c.from };
            if (typeof c.to !== 'object') c.to = { kind: 'idea', id: +c.to };
          });
          return true;
        } catch (e) { return false; }
      }

      // 全ゾーン・アイデア・ブックを再描画してコネクター・変換・統計を再設定するフル初期化描画関数。
      function renderAll() {
        objLayer.innerHTML = ''; zonesLayer.innerHTML = '';
        S.zones.forEach(z => renderZone(z.id));
        Object.values(S.ideas).forEach(o => renderIdea(o.id));
        buildArrowMarkers();
        redrawConnectors();
        applyXform(); updateStat();
        document.body.classList.toggle('light', S.theme === 'light');
        document.getElementById('theme-btn').textContent = S.theme === 'dark' ? '◑' : '◐';
      }

      // ─── EXPORT / IMPORT ──────────────────────────────────────────────────
      // アプリの全状態（メモ・コネクター・ゾーン・設定）をJSONファイルとしてダウンロードする。
      function exportJSON() {
        const data = {
          ideas: S.ideas, connectors: S.connectors, zones: S.zones,
          nextId: S.nextId,
          meta: { exported: new Date().toISOString(), version: 4 }
        };
        const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url; a.download = `ideaboard-${Date.now()}.json`;
        a.click(); URL.revokeObjectURL(url);
        toast('JSONをエクスポートしました');
      }
      // ファイル選択イベントからJSONを読み込んでアプリ状態を復元し全体を再描画する。外部通信は一切行わない。
      function importJSON(ev) {
        const file = ev.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = e => {
          try {
            const d = JSON.parse(e.target.result);
            Object.assign(S, {
              ideas: d.ideas || {}, connectors: d.connectors || [],
              zones: d.zones || [],
              nextId: d.nextId || 1
            });
            const fixed = {};
            Object.entries(S.ideas).forEach(([k, v]) => { fixed[+k] = v; v.id = +v.id; });
            S.ideas = fixed;
            S.connectors.forEach(c => {
              if (typeof c.from !== 'object') c.from = { kind: 'idea', id: +c.from };
              if (typeof c.to !== 'object') c.to = { kind: 'idea', id: +c.to };
            });
            renderAll(); save();
            toast('インポートしました');
          } catch (ex) { toast('インポートに失敗しました'); }
        };
        reader.readAsText(file);
        ev.target.value = '';
      }
      // ─── INIT ─────────────────────────────────────────────────────────────
      (function init() {
        const hasSaved = loadSaved();
        renderAll();
        if (!hasSaved) toast('i でアイデアを作成、Enter で次々と連続入力  /  c で接続  /  f でジャンプ選択  /  Alt+ドラッグ でパン');
        document.getElementById('json-import-btn').addEventListener('click', () =>
          document.getElementById('json-import-input').click());
        document.getElementById('json-import-input').addEventListener('change', ev => importJSON(ev));
      })();

      return { exportJSON, importJSON };
    })();
  </script>
