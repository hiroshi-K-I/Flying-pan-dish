<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IDEA BOARD</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

/* ─── THEME ─── */
:root {
  --bg: #0d0d14;
  --board-dot: rgba(50,50,80,0.8);
  --card: #1e1e30;
  --card-border: #3a3a5c;
  --text: #e2e8f0;
  --dim: #64748b;
  --header-bg: #080810;
  --header-border: #1e1e30;
  --zone-bg: rgba(28,28,50,0.45);
  --zone-border: #3a3a5c;
  --book-shadow1: #191928;
  --book-shadow2: #141420;
  --book-inner: #15151f;
  --book-inner-border: #2a2a3e;
  --cmd-bg: #080810;
  --palette-bg: #18182a;
  --toast-bg: #1e1e30;
  --toast-border: #3a3a5c;
  --purple: #7b6cf6;
  --cyan: #06b6d4;
  --green: #10b981;
  --amber: #f59e0b;
  --pink: #ec4899;
}
body.light {
  --bg: #f0f2f8;
  --board-dot: rgba(160,160,200,0.7);
  --card: #ffffff;
  --card-border: #c0c0d8;
  --text: #1a1a2e;
  --dim: #7080a0;
  --header-bg: #e4e6f0;
  --header-border: #c0c0d8;
  --zone-bg: rgba(200,200,230,0.3);
  --zone-border: #9090b8;
  --book-shadow1: #d8d8e8;
  --book-shadow2: #c8c8dc;
  --book-inner: #f5f5fc;
  --book-inner-border: #c8c8e0;
  --cmd-bg: #e4e6f0;
  --palette-bg: #e8eaf4;
  --toast-bg: #ffffff;
  --toast-border: #c0c0d8;
}

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'JetBrains Mono','Fira Code','Cascadia Code','Courier New',monospace;
  height: 100vh;
  overflow: hidden;
  display: flex;
  flex-direction: column;
  user-select: none;
}

/* ─── HEADER ─── */
#header {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 6px 14px;
  background: var(--header-bg);
  border-bottom: 1px solid var(--header-border);
  flex-shrink: 0;
  z-index: 100;
  flex-wrap: wrap;
}
#mode-badge {
  display: flex;
  align-items: center;
  gap: 5px;
  padding: 3px 9px;
  border-radius: 4px;
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 2px;
  transition: all 0.15s;
  min-width: 90px;
}
#mode-badge.select { background:rgba(123,108,246,.12); border:1px solid var(--purple); color:var(--purple); }
#mode-badge.edit   { background:rgba(16,185,129,.12);  border:1px solid var(--green);  color:var(--green); }
#mode-badge.resize { background:rgba(6,182,212,.12);   border:1px solid var(--cyan);   color:var(--cyan); }
#mode-dot { width:5px;height:5px;border-radius:50%;background:currentColor;animation:pulse 2s infinite; }
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

#app-title { font-size:11px;font-weight:700;letter-spacing:4px;color:var(--text);opacity:.35; }

.hints { display:flex;gap:8px;flex-wrap:wrap; }
.hint  { display:flex;align-items:center;gap:3px;font-size:9px;color:var(--dim); }
.hk {
  background: var(--card); border:1px solid var(--card-border);
  border-radius:3px; padding:1px 4px; font-size:8px; color:var(--text); opacity:.8;
}
#toolbar { margin-left:auto;display:flex;gap:6px; }
.tb-btn {
  background:var(--card);border:1px solid var(--card-border);border-radius:4px;
  color:var(--dim);font-family:inherit;font-size:9px;letter-spacing:1px;
  padding:3px 8px;cursor:pointer;text-transform:uppercase;transition:all .15s;
}
.tb-btn:hover { color:var(--text);border-color:var(--purple); }
#theme-btn { font-size:11px;padding:3px 6px; }

/* ─── BOARD ─── */
#board-wrap {
  flex:1;overflow:hidden;position:relative;cursor:default;
}
#board-wrap.panning { cursor:grabbing; }
#board-wrap::before {
  content:'';position:absolute;inset:0;pointer-events:none;z-index:0;
  background-image:radial-gradient(circle,var(--board-dot) 1px,transparent 1px);
  background-size:28px 28px;
}
#board {
  position:absolute;width:8000px;height:8000px;top:0;left:0;transform-origin:0 0;
}
#zones-layer   { position:absolute;inset:0;z-index:1; }
#objects-layer { position:absolute;inset:0;z-index:3; }
/* SVG overlay is a sibling of #board — NOT inside it */
#svg-overlay {
  position:absolute;inset:0;pointer-events:none;z-index:4;overflow:visible;
}

/* ─── IDEA ─── */
.idea {
  position:absolute;min-width:150px;max-width:280px;
  background:var(--card);border:1px solid var(--card-border);
  border-radius:8px;padding:8px 12px 12px;cursor:grab;
  transition:border-color .2s,box-shadow .2s,transform .15s;
}
.idea:hover { border-color:var(--dim); }
.idea.focused { transform:translateY(-2px); }
.idea[data-c="purple"]         { border-color:rgba(123,108,246,.4); }
.idea[data-c="purple"].focused { border-color:var(--purple);box-shadow:0 0 0 1px var(--purple),0 0 24px rgba(123,108,246,.35); }
.idea[data-c="cyan"]           { border-color:rgba(6,182,212,.4); }
.idea[data-c="cyan"].focused   { border-color:var(--cyan);  box-shadow:0 0 0 1px var(--cyan),0 0 24px rgba(6,182,212,.35); }
.idea[data-c="green"]          { border-color:rgba(16,185,129,.4); }
.idea[data-c="green"].focused  { border-color:var(--green); box-shadow:0 0 0 1px var(--green),0 0 24px rgba(16,185,129,.35); }
.idea[data-c="amber"]          { border-color:rgba(245,158,11,.4); }
.idea[data-c="amber"].focused  { border-color:var(--amber); box-shadow:0 0 0 1px var(--amber),0 0 24px rgba(245,158,11,.35); }
.idea[data-c="pink"]           { border-color:rgba(236,72,153,.4); }
.idea[data-c="pink"].focused   { border-color:var(--pink);  box-shadow:0 0 0 1px var(--pink),0 0 24px rgba(236,72,153,.35); }

.idea-num { font-size:9px;font-weight:700;letter-spacing:1px;margin-bottom:5px;opacity:.8; }
.idea[data-c="purple"] .idea-num { color:var(--purple); }
.idea[data-c="cyan"]   .idea-num { color:var(--cyan); }
.idea[data-c="green"]  .idea-num { color:var(--green); }
.idea[data-c="amber"]  .idea-num { color:var(--amber); }
.idea[data-c="pink"]   .idea-num { color:var(--pink); }

.idea-body { font-size:12px;color:var(--text);line-height:1.6;word-break:break-word;white-space:pre-wrap;min-height:18px; }
.idea-body.empty { color:var(--dim);font-style:italic; }
.idea-ta {
  background:transparent;border:none;outline:none;
  font-family:inherit;font-size:12px;color:var(--text);
  line-height:1.6;resize:none;width:100%;min-height:50px;caret-color:var(--green);
}

@keyframes springIn {
  0%  {transform:scale(.45) translateY(12px);opacity:0}
  65% {transform:scale(1.04) translateY(-2px);opacity:1}
  100%{transform:scale(1) translateY(0);opacity:1}
}
.spring-in { animation:springIn .32s cubic-bezier(.34,1.56,.64,1) forwards; }
@keyframes fadeOut { to{transform:scale(.7);opacity:0} }
.fade-out { animation:fadeOut .18s ease forwards; }

/* ─── ZONE ─── */
.zone {
  position:absolute;background:var(--zone-bg);border:1.5px dashed var(--zone-border);
  border-radius:10px;padding:28px 12px 10px;cursor:grab;
  transition:border-color .2s,box-shadow .2s;min-width:160px;min-height:100px;
}
.zone:hover { border-color:var(--dim); }
.zone.focused { border-color:var(--cyan);box-shadow:0 0 0 1px var(--cyan),0 0 20px rgba(6,182,212,.2); }
.zone.resize-mode { border-color:var(--amber);box-shadow:0 0 0 1px var(--amber),0 0 20px rgba(245,158,11,.2); cursor:nwse-resize; }
.zone-header {
  position:absolute;top:0;left:0;right:0;height:24px;
  display:flex;align-items:center;padding:0 10px;gap:6px;
}
.zone-num { font-size:8px;color:var(--cyan);opacity:.6;font-weight:700;letter-spacing:1px; }
.zone-lbl {
  font-size:9px;font-weight:700;letter-spacing:2px;text-transform:uppercase;
  color:rgba(6,182,212,.6);background:rgba(6,182,212,.08);padding:1px 6px;border-radius:3px;
}
.zone-lbl-input {
  background:rgba(6,182,212,.1);border:1px solid var(--cyan);border-radius:3px;
  outline:none;font-family:inherit;font-size:9px;font-weight:700;letter-spacing:2px;text-transform:uppercase;
  color:var(--cyan);padding:1px 5px;width:120px;caret-color:var(--cyan);
}
.zone-resize-handle {
  position:absolute;bottom:4px;right:4px;width:16px;height:16px;
  cursor:nwse-resize;opacity:.5;transition:opacity .2s;
}
.zone:hover .zone-resize-handle,.zone.focused .zone-resize-handle { opacity:1; }
.zone-resize-handle::before,.zone-resize-handle::after {
  content:'';position:absolute;background:var(--dim);border-radius:1px;
}
.zone-resize-handle::before { width:10px;height:1.5px;bottom:7px;right:1px;transform:rotate(-45deg); }
.zone-resize-handle::after  { width:5px; height:1.5px;bottom:3px;right:1px;transform:rotate(-45deg); }

/* ─── BOOK ─── */
.book { position:absolute;cursor:grab;min-width:170px; }
.book-stack { position:relative; }
.book-stack::before {
  content:'';position:absolute;top:-4px;left:5px;right:-5px;bottom:4px;
  background:var(--book-shadow1);border:1px solid var(--card-border);border-radius:8px;z-index:-1;
}
.book-stack::after {
  content:'';position:absolute;top:-8px;left:10px;right:-10px;bottom:8px;
  background:var(--book-shadow2);border:1px solid var(--card-border);border-radius:8px;z-index:-2;
}
.book-card {
  background:var(--card);border:1px solid var(--card-border);border-radius:8px;
  padding:8px 12px 10px;position:relative;z-index:1;transition:border-color .2s,box-shadow .2s;
}
.book.focused .book-card { border-color:var(--amber);box-shadow:0 0 0 1px var(--amber),0 0 24px rgba(245,158,11,.3); }
.book-hdr { display:flex;align-items:center;gap:5px;margin-bottom:6px; }
.book-icon,.book-bid { font-size:9px;font-weight:700;letter-spacing:1px;color:var(--amber); }
.book-ttl { font-size:11px;color:var(--text); }
.book-tags { display:flex;gap:4px;flex-wrap:wrap; }
.btag {
  background:rgba(245,158,11,.1);border:1px solid rgba(245,158,11,.25);
  border-radius:3px;padding:1px 6px;font-size:9px;color:var(--amber);
}
.book-expanded {
  margin-top:10px;border-top:1px solid var(--book-inner-border);padding-top:10px;
  display:grid;grid-template-columns:1fr 1fr;gap:7px;animation:springIn .25s ease;
}
.book-inner {
  background:var(--book-inner);border:1px solid var(--book-inner-border);
  border-radius:6px;padding:6px 8px;font-size:10px;color:var(--text);
  line-height:1.5;pointer-events:none;
}
.book-inner-num { font-size:8px;color:var(--amber);opacity:.7;margin-bottom:3px; }

/* ─── CONNECTOR ─── */
.conn-path {
  stroke-dasharray:2000;stroke-dashoffset:2000;
  animation:drawConn .45s ease forwards;
}
@keyframes drawConn { to{stroke-dashoffset:0} }

/* ─── CMD LINE ─── */
#cmdline {
  display:flex;align-items:center;gap:8px;padding:6px 14px;
  background:var(--cmd-bg);border-top:1px solid var(--header-border);
  flex-shrink:0;font-size:11px;min-height:34px;
}
#cmd-prompt { color:var(--purple);font-weight:700; }
#cmd-buf    { color:var(--text);letter-spacing:.5px; }
#cmd-cur {
  display:inline-block;width:7px;height:12px;background:var(--green);
  vertical-align:middle;margin-left:1px;animation:blink 1s step-end infinite;
}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}
#cmd-stat { margin-left:auto;font-size:9px;color:var(--dim);letter-spacing:1px; }

/* ─── PALETTE ─── */
#palette {
  position:fixed;bottom:44px;left:50%;
  transform:translateX(-50%) translateY(6px);
  background:var(--palette-bg);border:1px solid var(--card-border);
  border-radius:12px;padding:10px 16px;
  display:none;gap:10px;align-items:center;z-index:500;
  box-shadow:0 8px 40px rgba(0,0,0,.5);opacity:0;transition:opacity .15s,transform .15s;
}
#palette.show { display:flex;opacity:1;transform:translateX(-50%) translateY(0); }
.p-lbl { font-size:9px;letter-spacing:2px;color:var(--dim);text-transform:uppercase;margin-right:2px; }
.psw { width:22px;height:22px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:transform .12s,border-color .12s;position:relative; }
.psw:hover { transform:scale(1.35);border-color:rgba(255,255,255,.7); }
.psw-k { position:absolute;bottom:-15px;left:50%;transform:translateX(-50%);font-size:8px;color:var(--dim); }

/* ─── MOVE OVERLAY ─── */
#move-overlay {
  position:fixed;inset:0;pointer-events:none;z-index:300;display:none;
}
#move-overlay.show { display:block; }
.move-grid-cell {
  position:absolute;border:1px solid rgba(123,108,246,.2);
  display:flex;align-items:center;justify-content:center;
  font-size:16px;font-weight:700;color:rgba(123,108,246,.3);
  pointer-events:none;
}
.move-grid-cell.active {
  background:rgba(123,108,246,.12);color:rgba(123,108,246,.7);
  border-color:rgba(123,108,246,.5);
}

/* ─── TOAST ─── */
.toast {
  position:fixed;top:52px;right:18px;
  background:var(--toast-bg);border:1px solid var(--toast-border);
  border-radius:6px;padding:7px 13px;font-size:10px;color:var(--text);
  z-index:1000;pointer-events:none;
  animation:toastIn .18s ease,toastOut .2s ease 1.9s forwards;
}
@keyframes toastIn  { from{transform:translateX(16px);opacity:0}to{transform:none;opacity:1} }
@keyframes toastOut { from{opacity:1}to{opacity:0} }
</style>
</head>
<body>

<div id="header">
  <div id="mode-badge" class="select">
    <div id="mode-dot"></div>
    <span id="mode-txt">SELECT</span>
  </div>
  <div id="app-title">IDEA BOARD</div>
  <div class="hints">
    <div class="hint"><span class="hk">TAB</span>モード切替</div>
    <div class="hint"><span class="hk">i</span>アイデア</div>
    <div class="hint"><span class="hk">z</span>ゾーン</div>
    <div class="hint"><span class="hk">b#+#</span>ブック</div>
    <div class="hint"><span class="hk">j#±#</span>接続</div>
    <div class="hint"><span class="hk">n#</span>選択</div>
    <div class="hint"><span class="hk">m#+##</span>移動</div>
    <div class="hint"><span class="hk">p</span>カラー</div>
    <div class="hint"><span class="hk">r</span>リサイズ</div>
    <div class="hint"><span class="hk">x</span>削除</div>
  </div>
  <div id="toolbar">
    <button class="tb-btn" id="theme-btn" title="テーマ切替">◑</button>
    <button class="tb-btn" onclick="App.exportJSON()">EXPORT</button>
    <button class="tb-btn" onclick="document.getElementById('imp').click()">IMPORT</button>
    <input type="file" id="imp" accept=".json" style="display:none" onchange="App.importJSON(event)">
  </div>
</div>

<div id="board-wrap">
  <div id="board">
    <div id="zones-layer"></div>
    <div id="objects-layer"></div>
  </div>
  <!-- SVG overlay: sibling of #board, in screen space -->
  <svg id="svg-overlay" xmlns="http://www.w3.org/2000/svg">
    <defs id="svg-defs"></defs>
  </svg>
</div>

<!-- move grid overlay -->
<div id="move-overlay"></div>

<div id="palette">
  <span class="p-lbl">COLOR</span>
  <div class="psw" data-c="purple" style="background:#7b6cf6"><span class="psw-k">1</span></div>
  <div class="psw" data-c="cyan"   style="background:#06b6d4"><span class="psw-k">2</span></div>
  <div class="psw" data-c="green"  style="background:#10b981"><span class="psw-k">3</span></div>
  <div class="psw" data-c="amber"  style="background:#f59e0b"><span class="psw-k">4</span></div>
  <div class="psw" data-c="pink"   style="background:#ec4899"><span class="psw-k">5</span></div>
</div>

<div id="cmdline">
  <span id="cmd-prompt">›</span>
  <span id="cmd-buf"></span><span id="cmd-cur"></span>
  <span id="cmd-stat">0 ideas</span>
</div>

<script>
const App = (() => {
  // ─── CONSTANTS ────────────────────────────────────────────────────────
  const COLOR_HEX = { purple:'#7b6cf6',cyan:'#06b6d4',green:'#10b981',amber:'#f59e0b',pink:'#ec4899' };
  const COLOR_KEYS = { '1':'purple','2':'cyan','3':'green','4':'amber','5':'pink' };
  // Grid: digit → [col, row] (0-indexed from top-left)
  // Layout (like reversed numpad): 9=TL 8=TC 7=TR / 6=ML 5=MC 4=MR / 3=BL 2=BC 1=BR
  const GRID_POS = { 9:[0,0],8:[1,0],7:[2,0], 6:[0,1],5:[1,1],4:[2,1], 3:[0,2],2:[1,2],1:[2,2] };

  // ─── STATE ────────────────────────────────────────────────────────────
  const S = {
    mode: 'select',        // 'select'|'edit'|'resize'
    ideas: {},             // num id → {id,x,y,text,color}
    connectors: [],        // {id,from,to,type:'line'|'arrow'}
    zones: [],             // {id,x,y,w,h,label}  id=`z${N}`
    books: [],             // {id,x,y,title,children:[],expanded}  id=`bk${N}`
    nextId: 1,
    focused: null,         // {kind:'idea'|'zone'|'book', id}
    lastFocused: null,
    pan: {x:300,y:200},
    zoom: 1,
    cmdBuf: '',
    cmdMode: null,         // null|'j'|'b'|'palette'|'n'|'m'
    panning: false,
    panOrigin: null,
    resizeZoneId: null,    // zone id currently being resized via keyboard
    theme: 'dark',
  };

  // ─── DOM ──────────────────────────────────────────────────────────────
  const boardWrap  = document.getElementById('board-wrap');
  const board      = document.getElementById('board');
  const zonesLayer = document.getElementById('zones-layer');
  const objLayer   = document.getElementById('objects-layer');
  const svgOverlay = document.getElementById('svg-overlay');
  const svgDefs    = document.getElementById('svg-defs');
  const modeBadge  = document.getElementById('mode-badge');
  const modeTxt    = document.getElementById('mode-txt');
  const cmdBufEl   = document.getElementById('cmd-buf');
  const cmdStat    = document.getElementById('cmd-stat');
  const palette    = document.getElementById('palette');
  const moveOverlay= document.getElementById('move-overlay');

  // ─── UTILS ────────────────────────────────────────────────────────────
  const esc = s => String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');

  function toast(msg) {
    document.querySelectorAll('.toast').forEach(t=>t.remove());
    const t = document.createElement('div');
    t.className='toast'; t.textContent=msg;
    document.body.appendChild(t);
    setTimeout(()=>t.remove(), 2300);
  }

  function centerPos(offX=0, offY=0) {
    const r = boardWrap.getBoundingClientRect();
    return {
      x: (r.width/2  - S.pan.x)/S.zoom - 90 + offX + (Math.random()-.5)*70,
      y: (r.height/2 - S.pan.y)/S.zoom - 45 + offY + (Math.random()-.5)*50
    };
  }

  // Board → screen coordinate conversion
  function b2s(bx, by) {
    return { x: bx*S.zoom + S.pan.x, y: by*S.zoom + S.pan.y };
  }

  // ─── TRANSFORM ────────────────────────────────────────────────────────
  function applyXform() {
    board.style.transform = `translate(${S.pan.x}px,${S.pan.y}px) scale(${S.zoom})`;
  }

  // ─── MODE ─────────────────────────────────────────────────────────────
  function setMode(m) {
    S.mode = m;
    modeBadge.className = m;
    modeTxt.textContent = m.toUpperCase();
    if (m==='select') {
      document.querySelectorAll('.idea-ta,.zone-lbl-input').forEach(t=>t.blur());
      closePalette();
      S.resizeZoneId = null;
    }
    updateCmd();
  }

  // ─── FOCUS ────────────────────────────────────────────────────────────
  function focus(kind, id) {
    clearFocus();
    S.focused = {kind,id};
    S.lastFocused = {kind,id};
    const el = getEl(kind,id);
    if (el) el.classList.add('focused');
    updateCmd();
  }
  function clearFocus() {
    document.querySelectorAll('.focused').forEach(e=>e.classList.remove('focused'));
    S.focused = null;
    updateCmd();
  }
  function getEl(kind, id) {
    if (kind==='idea') return document.getElementById(`idea-${id}`);
    if (kind==='zone') return document.getElementById(`zone-${id}`);
    if (kind==='book') return document.getElementById(`book-${id}`);
    return null;
  }

  // ─── BOOK MEMBERSHIP ─────────────────────────────────────────────────
  function getBookedIdeas() {
    const set = new Set();
    S.books.forEach(bk => bk.children.forEach(c => set.add(c)));
    return set;
  }
  function syncIdeaVisibility() {
    const booked = getBookedIdeas();
    Object.keys(S.ideas).forEach(id => {
      const el = document.getElementById(`idea-${id}`);
      if (el) el.style.display = booked.has(+id) ? 'none' : '';
    });
    redrawConnectors();
  }

  // ─── IDEA ─────────────────────────────────────────────────────────────
  function createIdea() {
    const pos = centerPos();
    const id = S.nextId++;
    S.ideas[id] = {id, x:pos.x, y:pos.y, text:'', color:'purple'};
    renderIdea(id, true);
    focus('idea', id);
    setMode('edit');
    startEdit(id);
    save(); updateStat();
  }

  function renderIdea(id, animate) {
    const obj = S.ideas[id];
    if (!obj) return;
    let el = document.getElementById(`idea-${id}`);
    const isNew = !el;
    if (isNew) {
      el = document.createElement('div');
      el.id = `idea-${id}`;
      el.className = 'idea';
      objLayer.appendChild(el);
      makeDraggable(el, ()=>S.ideas[id], o=>{});
      el.addEventListener('click', e=>{
        e.stopPropagation();
        if (S.mode==='select') focus('idea', id);
      });
      el.addEventListener('dblclick', e=>{
        e.stopPropagation();
        focus('idea',id); setMode('edit'); startEdit(id);
      });
    }
    el.setAttribute('data-c', obj.color||'purple');
    el.style.left = obj.x+'px';
    el.style.top  = obj.y+'px';
    el.innerHTML = `
      <div class="idea-num">#${id}</div>
      <div class="idea-body${obj.text?'':' empty'}">${obj.text?esc(obj.text):'アイデアを入力...'}</div>`;
    if (animate) { el.classList.add('spring-in'); setTimeout(()=>el.classList.remove('spring-in'),400); }
    // Respect book visibility
    const booked = getBookedIdeas();
    el.style.display = booked.has(id) ? 'none' : '';
  }

  function startEdit(id) {
    const obj = S.ideas[id];
    if (!obj) return;
    const el = document.getElementById(`idea-${id}`);
    if (!el) return;
    el.innerHTML = `
      <div class="idea-num">#${id}</div>
      <textarea class="idea-ta" placeholder="アイデアを入力...">${esc(obj.text||'')}</textarea>`;
    const ta = el.querySelector('textarea');
    ta.focus();
    ta.setSelectionRange(ta.value.length, ta.value.length);
    ta.addEventListener('input', ()=>{ obj.text=ta.value; save(); });
    ta.addEventListener('keydown', e=>{
      if (e.key==='Escape'||(e.key==='Tab'&&!e.shiftKey)) {
        e.preventDefault();
        obj.text = ta.value;
        setMode('select');
        renderIdea(id);
        focus('idea',id);
      }
    });
  }

  // ─── ZONE ─────────────────────────────────────────────────────────────
  function createZone() {
    const pos = centerPos();
    const id = `z${S.nextId++}`;
    S.zones.push({id, x:pos.x-100, y:pos.y-75, w:280, h:190, label:'ZONE'});
    renderZone(id, true);
    focus('zone', id);
    save(); updateStat();
    toast('ゾーン生成 — Enter:ラベル編集  r:リサイズモード  Shift+↑↓←→:サイズ変更');
  }

  function renderZone(id, animate) {
    const z = S.zones.find(z=>z.id===id);
    if (!z) return;
    let el = document.getElementById(`zone-${id}`);
    const isNew = !el;
    if (isNew) {
      el = document.createElement('div');
      el.id = `zone-${id}`;
      el.className = 'zone';
      zonesLayer.appendChild(el);
      makeDraggable(el, ()=>z, o=>{}, '.zone-resize-handle');
      el.addEventListener('click', e=>{
        e.stopPropagation();
        if (S.mode==='select') focus('zone',id);
      });
    }
    const numPart = id.replace('z','');
    el.style.left  = z.x+'px'; el.style.top  = z.y+'px';
    el.style.width = z.w+'px'; el.style.height= z.h+'px';
    el.innerHTML = `
      <div class="zone-header">
        <span class="zone-num">ZONE #${numPart}</span>
        <span class="zone-lbl">${esc(z.label)}</span>
      </div>
      <div class="zone-resize-handle"></div>`;
    // Resize handle
    const handle = el.querySelector('.zone-resize-handle');
    handle.addEventListener('mousedown', e=>{
      e.stopPropagation(); e.preventDefault();
      const sx=e.clientX,sy=e.clientY,sw=z.w,sh=z.h;
      const onMove=e=>{
        z.w=Math.max(120,sw+(e.clientX-sx)/S.zoom);
        z.h=Math.max(80,sh+(e.clientY-sy)/S.zoom);
        el.style.width=z.w+'px'; el.style.height=z.h+'px';
      };
      const onUp=()=>{ save(); document.removeEventListener('mousemove',onMove); document.removeEventListener('mouseup',onUp); };
      document.addEventListener('mousemove',onMove);
      document.addEventListener('mouseup',onUp);
    });
    if (animate) { el.classList.add('spring-in'); setTimeout(()=>el.classList.remove('spring-in'),400); }
  }

  function startZoneEdit(id) {
    const z = S.zones.find(z=>z.id===id);
    if (!z) return;
    const el = document.getElementById(`zone-${id}`);
    if (!el) return;
    const numPart = id.replace('z','');
    el.innerHTML = `
      <div class="zone-header">
        <span class="zone-num">ZONE #${numPart}</span>
        <input class="zone-lbl-input" value="${esc(z.label)}" maxlength="30">
      </div>
      <div class="zone-resize-handle"></div>`;
    const inp = el.querySelector('.zone-lbl-input');
    inp.focus(); inp.select();
    inp.addEventListener('input', ()=>{ z.label=inp.value; });
    inp.addEventListener('keydown', e=>{
      if (e.key==='Enter'||e.key==='Escape'||(e.key==='Tab'&&!e.shiftKey)) {
        e.preventDefault();
        z.label = inp.value;
        setMode('select');
        renderZone(id);
        focus('zone',id);
        save();
      }
    });
    inp.addEventListener('blur', ()=>{
      z.label=inp.value; renderZone(id); focus('zone',id); setMode('select'); save();
    });
  }

  // ─── BOOK ─────────────────────────────────────────────────────────────
  function createBook(childIds) {
    const pos = centerPos();
    const id = `bk${S.nextId++}`;
    S.books.push({id, x:pos.x-85, y:pos.y-50, title:'BOOK', children:childIds, expanded:false});
    renderBook(id, true);
    syncIdeaVisibility();
    focus('book', id);
    save(); updateStat();
  }

  function renderBook(id, animate) {
    const bk = S.books.find(b=>b.id===id);
    if (!bk) return;
    let el = document.getElementById(`book-${id}`);
    const isNew = !el;
    if (isNew) {
      el = document.createElement('div');
      el.id = `book-${id}`;
      el.className = 'book';
      objLayer.appendChild(el);
      makeDraggable(el, ()=>bk, o=>{});
      el.addEventListener('click', e=>{
        e.stopPropagation();
        if (S.mode==='select') focus('book',id);
      });
    }
    el.style.left = bk.x+'px'; el.style.top = bk.y+'px';
    const numPart = id.replace('bk','');
    const tags = bk.children.map(c=>`<span class="btag">#${c}</span>`).join('');
    const exp = bk.expanded ? `<div class="book-expanded">${
      bk.children.map(c=>{
        const o=S.ideas[c];
        return `<div class="book-inner"><div class="book-inner-num">#${c}</div>${esc(o?o.text:'')}</div>`;
      }).join('')
    }</div>` : '';
    el.innerHTML = `<div class="book-stack"><div class="book-card">
      <div class="book-hdr">
        <span class="book-icon">${bk.expanded?'▼':'▶'}</span>
        <span class="book-bid">BOOK #${numPart}</span>
      </div>
      <div class="book-tags">${tags}</div>
      ${exp}
    </div></div>`;
    if (animate) { el.classList.add('spring-in'); setTimeout(()=>el.classList.remove('spring-in'),400); }
  }

  // ─── CONNECTORS (screen-space SVG) ───────────────────────────────────
  function buildConnector(fromId, toId, type) {
    if (!S.ideas[fromId]||!S.ideas[toId]) {
      toast(`アイデア #${fromId} または #${toId} が見つかりません`); return;
    }
    const booked = getBookedIdeas();
    if (booked.has(fromId)||booked.has(toId)) {
      toast('ブック内のアイデアは直接接続できません'); return;
    }
    const dup = S.connectors.find(c=>(c.from===fromId&&c.to===toId)||(type==='line'&&c.from===toId&&c.to===fromId));
    if (dup) { toast('既に接続済みです'); return; }
    const id = `c${S.nextId++}`;
    S.connectors.push({id, from:fromId, to:toId, type});
    redrawConnectors();
    save();
    toast(`#${fromId} ${type==='arrow'?'→':'—'} #${toId} を接続`);
  }

  function ideaScreenCenter(id) {
    const el = document.getElementById(`idea-${id}`);
    if (!el || el.style.display==='none') return null;
    const bx = parseFloat(el.style.left) + el.offsetWidth/2;
    const by = parseFloat(el.style.top)  + el.offsetHeight/2;
    return b2s(bx, by);
  }

  function buildArrowMarkers() {
    svgDefs.innerHTML = '';
    Object.entries(COLOR_HEX).forEach(([name,hex])=>{
      const mk = document.createElementNS('http://www.w3.org/2000/svg','marker');
      mk.setAttribute('id',`arr-${name}`);
      mk.setAttribute('markerUnits','strokeWidth');
      mk.setAttribute('markerWidth','6');
      mk.setAttribute('markerHeight','4');
      mk.setAttribute('refX','6');
      mk.setAttribute('refY','2');
      mk.setAttribute('orient','auto');
      const p = document.createElementNS('http://www.w3.org/2000/svg','path');
      p.setAttribute('d','M0,0 L6,2 L0,4 z');
      p.setAttribute('fill',hex);
      mk.appendChild(p);
      svgDefs.appendChild(mk);
    });
  }
  buildArrowMarkers();

  function redrawConnectors() {
    svgOverlay.querySelectorAll('.conn-g').forEach(e=>e.remove());
    S.connectors.forEach(conn=>{
      const a = ideaScreenCenter(conn.from);
      const b = ideaScreenCenter(conn.to);
      if (!a||!b) return;
      const color = (S.ideas[conn.from]||{}).color||'purple';
      const hex = COLOR_HEX[color];
      const g = document.createElementNS('http://www.w3.org/2000/svg','g');
      g.classList.add('conn-g');
      const dx=b.x-a.x, dy=b.y-a.y;
      const d = `M${a.x},${a.y} C${a.x+dx*.35},${a.y} ${a.x+dx*.65},${b.y} ${b.x},${b.y}`;
      // glow
      const glow = document.createElementNS('http://www.w3.org/2000/svg','path');
      glow.setAttribute('d',d); glow.setAttribute('fill','none');
      glow.setAttribute('stroke',hex); glow.setAttribute('stroke-width','6'); glow.setAttribute('opacity','.07');
      g.appendChild(glow);
      // main line
      const path = document.createElementNS('http://www.w3.org/2000/svg','path');
      path.setAttribute('d',d); path.setAttribute('fill','none');
      path.setAttribute('stroke',hex); path.setAttribute('stroke-width','1.5'); path.setAttribute('opacity','.8');
      if (conn.type==='arrow') {
        path.setAttribute('marker-end',`url(#arr-${color})`);
        path.classList.add('conn-path');
      } else {
        // line: dashed, no animation
        path.setAttribute('stroke-dasharray','5 3');
      }
      g.appendChild(path);
      svgOverlay.appendChild(g);
    });
  }

  // ─── DRAG ─────────────────────────────────────────────────────────────
  function makeDraggable(el, getObj, onPos, excludeSel) {
    el.addEventListener('mousedown', e=>{
      if (e.target.tagName==='TEXTAREA'||e.target.tagName==='INPUT') return;
      if (excludeSel && e.target.closest(excludeSel)) return;
      if (e.button!==0) return;
      e.stopPropagation();
      const obj = getObj();
      if (!obj) return;
      const sx=e.clientX,sy=e.clientY,ox=obj.x,oy=obj.y;
      el.style.zIndex=99; el.style.transition='none';
      const onMove = e=>{
        obj.x = ox+(e.clientX-sx)/S.zoom;
        obj.y = oy+(e.clientY-sy)/S.zoom;
        el.style.left=obj.x+'px'; el.style.top=obj.y+'px';
        redrawConnectors();
      };
      const onUp = ()=>{
        el.style.zIndex=''; el.style.transition='';
        save();
        document.removeEventListener('mousemove',onMove);
        document.removeEventListener('mouseup',onUp);
      };
      document.addEventListener('mousemove',onMove);
      document.addEventListener('mouseup',onUp);
    });
  }

  // ─── PAN / ZOOM ───────────────────────────────────────────────────────
  boardWrap.addEventListener('mousedown', e=>{
    if (e.button===1||(e.button===0&&e.altKey)) {
      e.preventDefault();
      S.panning=true;
      S.panOrigin={x:e.clientX-S.pan.x,y:e.clientY-S.pan.y};
      boardWrap.classList.add('panning');
    }
  });
  document.addEventListener('mousemove', e=>{
    if (!S.panning) return;
    S.pan.x=e.clientX-S.panOrigin.x;
    S.pan.y=e.clientY-S.panOrigin.y;
    applyXform(); redrawConnectors();
  });
  document.addEventListener('mouseup', ()=>{
    if (S.panning){ S.panning=false; boardWrap.classList.remove('panning'); }
  });
  boardWrap.addEventListener('wheel', e=>{
    e.preventDefault();
    const dz=e.deltaY>0?.9:1.1;
    const nz=Math.max(.25,Math.min(2.5,S.zoom*dz));
    const r=boardWrap.getBoundingClientRect();
    const mx=e.clientX-r.left,my=e.clientY-r.top;
    S.pan.x=mx-(mx-S.pan.x)*(nz/S.zoom);
    S.pan.y=my-(my-S.pan.y)*(nz/S.zoom);
    S.zoom=nz;
    applyXform(); redrawConnectors();
  },{passive:false});
  boardWrap.addEventListener('click', e=>{
    if (e.target===boardWrap||e.target===board||e.target===objLayer||e.target===zonesLayer) clearFocus();
  });

  // ─── KEYBOARD ─────────────────────────────────────────────────────────
  document.addEventListener('keydown', e=>{
    if (e.key==='Tab') {
      e.preventDefault();
      if (S.mode==='select') {
        setMode('edit');
        if (S.focused?.kind==='idea') startEdit(S.focused.id);
        else if (S.focused?.kind==='zone') { setMode('edit'); startZoneEdit(S.focused.id); }
      } else {
        const {kind,id}=S.focused||{};
        setMode('select');
        if (kind==='idea'&&S.ideas[id]) { renderIdea(id); focus('idea',id); }
        if (kind==='zone') { renderZone(id); focus('zone',id); }
      }
      return;
    }

    if (S.mode==='edit') return;

    if (e.key==='Escape') {
      closePalette(); hideMoveOverlay();
      S.cmdBuf=''; S.cmdMode=null;
      if (S.mode==='resize') setMode('select');
      updateCmd(); return;
    }

    // ── Resize mode (zone) ──
    if (S.mode==='resize') {
      const z = S.zones.find(z=>z.id===S.resizeZoneId);
      const el = z && document.getElementById(`zone-${z.id}`);
      if (z && el) {
        const step = e.shiftKey?50:20;
        if (e.key==='ArrowRight'){ e.preventDefault(); z.w=Math.max(80,z.w+step); el.style.width=z.w+'px'; save(); }
        if (e.key==='ArrowLeft') { e.preventDefault(); z.w=Math.max(80,z.w-step); el.style.width=z.w+'px'; save(); }
        if (e.key==='ArrowDown') { e.preventDefault(); z.h=Math.max(60,z.h+step); el.style.height=z.h+'px'; save(); }
        if (e.key==='ArrowUp')   { e.preventDefault(); z.h=Math.max(60,z.h-step); el.style.height=z.h+'px'; save(); }
        if (e.key==='Enter'||e.key==='r') { e.preventDefault(); setMode('select'); focus('zone',S.resizeZoneId); }
      }
      return;
    }

    // ── Command modes ──
    if (S.cmdMode==='palette') { handlePaletteKey(e.key); return; }

    if (S.cmdMode==='j') {
      if (e.key==='Escape'){ S.cmdBuf='';S.cmdMode=null;updateCmd();return; }
      S.cmdBuf+=e.key; updateCmd(); tryJoint(); return;
    }
    if (S.cmdMode==='b') {
      if (e.key==='Escape'){ S.cmdBuf='';S.cmdMode=null;updateCmd();return; }
      if (e.key==='Enter'){ execBook();return; }
      if (/^\d$/.test(e.key)||e.key==='+'){ S.cmdBuf+=e.key;updateCmd(); }
      return;
    }
    if (S.cmdMode==='n') {
      if (e.key==='Escape'){ S.cmdBuf='';S.cmdMode=null;updateCmd();return; }
      if (/^\d$/.test(e.key)){ S.cmdBuf+=e.key;updateCmd(); }
      if (e.key==='Enter'&&S.cmdBuf.length>1){ execSelect();return; }
      return;
    }
    if (S.cmdMode==='m') {
      if (e.key==='Escape'){ S.cmdBuf='';S.cmdMode=null;hideMoveOverlay();updateCmd();return; }
      if (/^\d$/.test(e.key)||e.key==='+') {
        S.cmdBuf+=e.key; updateCmd();
        const mtch=S.cmdBuf.match(/^m(\d+)\+(\d)(\d)$/);
        if (mtch){ execMove(+mtch[1],+mtch[2],+mtch[3]); return; }
        // Show move overlay hint when we have the id and '+'
        if (/^m\d+\+$/.test(S.cmdBuf)) showMoveOverlay();
      }
      return;
    }

    // ── Arrow key movement of selected object ──
    if (['ArrowLeft','ArrowRight','ArrowUp','ArrowDown'].includes(e.key)) {
      e.preventDefault();
      if (e.shiftKey && S.focused) {
        // Move object with Shift+Arrow
        moveObjByKey(e.key);
      } else {
        navigateFocus(e.key);
      }
      return;
    }

    // ── Single-key commands ──
    switch(e.key) {
      case 'i': e.preventDefault(); createIdea(); break;
      case 'z': e.preventDefault(); createZone(); break;
      case 'b':
        e.preventDefault();
        S.cmdMode='b'; S.cmdBuf='b'; updateCmd();
        toast('ブック: b+[ID]+[ID]+... + Enter  例:b1+2+3 → #1,#2,#3を含むブック  b10+23 → #10,#23');
        break;
      case 'j':
        e.preventDefault();
        S.cmdMode='j'; S.cmdBuf='j'; updateCmd();
        toast('接続: j[ID][+or-][ID]  例:j1+2=ライン  j2-3=アロー');
        break;
      case 'n':
        e.preventDefault();
        S.cmdMode='n'; S.cmdBuf='n'; updateCmd();
        break;
      case 'm':
        e.preventDefault();
        S.cmdMode='m'; S.cmdBuf='m'; updateCmd();
        toast('移動: m[ID]+[外位置][内位置]  例:m5+55=中央  m4+72=右上の下中央');
        break;
      case 'p': e.preventDefault(); openPalette(); break;
      case 'r':
        e.preventDefault();
        if (S.focused?.kind==='zone') {
          S.resizeZoneId=S.focused.id;
          const el=getEl('zone',S.focused.id);
          if(el){el.classList.add('resize-mode');}
          setMode('resize');
          toast('リサイズモード: ↑↓←→ でサイズ変更 / Enter で確定');
        }
        break;
      case 'Enter':
        if (S.focused?.kind==='idea')  { setMode('edit'); startEdit(S.focused.id); }
        if (S.focused?.kind==='zone')  { setMode('edit'); startZoneEdit(S.focused.id); }
        if (S.focused?.kind==='book')  { toggleBook(S.focused.id); }
        break;
      case 'x': case 'Delete': e.preventDefault(); deleteSelected(); break;
    }
  });

  function toggleBook(id) {
    const bk=S.books.find(b=>b.id===id);
    if(bk){bk.expanded=!bk.expanded;renderBook(id);focus('book',id);}
  }

  function moveObjByKey(key) {
    const {kind,id}=S.focused||{};
    const step=10;
    let obj=null;
    if(kind==='idea') obj=S.ideas[id];
    else if(kind==='zone') obj=S.zones.find(z=>z.id===id);
    else if(kind==='book') obj=S.books.find(b=>b.id===id);
    if(!obj)return;
    if(key==='ArrowLeft')  obj.x-=step;
    if(key==='ArrowRight') obj.x+=step;
    if(key==='ArrowUp')    obj.y-=step;
    if(key==='ArrowDown')  obj.y+=step;
    const el=getEl(kind,id);
    if(el){el.style.left=obj.x+'px';el.style.top=obj.y+'px';}
    redrawConnectors(); save();
  }

  // ─── JOINT ────────────────────────────────────────────────────────────
  function tryJoint() {
    const m=S.cmdBuf.match(/^j(\d+)([+\-])(\d+)$/);
    if(m){
      buildConnector(+m[1],+m[3],m[2]==='-'?'arrow':'line');
      S.cmdBuf='';S.cmdMode=null;updateCmd();
    }
  }

  // ─── BOOK ─────────────────────────────────────────────────────────────
  function execBook() {
    // Format: b[ID]+[ID]+[ID]... — supports multi-digit IDs
    const ids = S.cmdBuf.slice(1).split('+').map(Number).filter(n => n > 0 && S.ideas[n]);
    const valid = [...new Set(ids)]; // deduplicate
    if(!valid.length){toast('有効なアイデアIDが見つかりません');S.cmdBuf='';S.cmdMode=null;updateCmd();return;}
    createBook(valid);
    S.cmdBuf='';S.cmdMode=null;updateCmd();
  }

  // ─── SELECT BY NUMBER ─────────────────────────────────────────────────
  function execSelect() {
    const num=+S.cmdBuf.slice(1);
    if(S.ideas[num]){focus('idea',num);S.cmdBuf='';S.cmdMode=null;updateCmd();return;}
    const z=S.zones.find(z=>z.id===`z${num}`);
    if(z){focus('zone',z.id);S.cmdBuf='';S.cmdMode=null;updateCmd();return;}
    const bk=S.books.find(b=>b.id===`bk${num}`);
    if(bk){focus('book',bk.id);S.cmdBuf='';S.cmdMode=null;updateCmd();return;}
    toast(`#${num} が見つかりません`);
    S.cmdBuf='';S.cmdMode=null;updateCmd();
  }

  // ─── MOVE COMMAND ─────────────────────────────────────────────────────
  function showMoveOverlay() {
    moveOverlay.innerHTML='';
    const r=boardWrap.getBoundingClientRect();
    const W=r.width,H=r.height;
    // Draw 3x3 outer grid × 3x3 inner = 81 cells, but show outer 9 with numbers
    for(let d=1;d<=9;d++){
      const [c,row]=GRID_POS[d];
      const cellW=W/3,cellH=H/3;
      const x=r.left+c*cellW,y=r.top+row*cellH;
      const div=document.createElement('div');
      div.className='move-grid-cell';
      div.style.cssText=`left:${x}px;top:${y}px;width:${cellW}px;height:${cellH}px;`;
      div.textContent=d;
      moveOverlay.appendChild(div);
    }
    moveOverlay.classList.add('show');
  }
  function hideMoveOverlay(){ moveOverlay.classList.remove('show'); moveOverlay.innerHTML=''; }

  function execMove(objNum, d1, d2) {
    // Lookup object
    let obj=null, kind=null, id=null;
    if(S.ideas[objNum]){ obj=S.ideas[objNum]; kind='idea'; id=objNum; }
    else { const z=S.zones.find(z=>z.id===`z${objNum}`); if(z){obj=z;kind='zone';id=z.id;} }
    if(!obj){ const bk=S.books.find(b=>b.id===`bk${objNum}`); if(bk){obj=bk;kind='book';id=bk.id;} }
    if(!obj){ toast(`#${objNum} が見つかりません`); S.cmdBuf='';S.cmdMode=null;hideMoveOverlay();updateCmd();return; }

    if(!GRID_POS[d1]||!GRID_POS[d2]){ toast('無効な位置です(1-9)'); S.cmdBuf='';S.cmdMode=null;hideMoveOverlay();updateCmd();return; }

    const r=boardWrap.getBoundingClientRect();
    const [c1,r1]=GRID_POS[d1];
    const [c2,r2]=GRID_POS[d2];
    // Screen position of the target cell center (18-grid)
    const sx=r.left + r.width  * (6*c1 + 2*c2 + 1)/18;
    const sy=r.top  + r.height * (6*r1 + 2*r2 + 1)/18;
    // Convert screen → board
    const bx=(sx-r.left-S.pan.x)/S.zoom;
    const by=(sy-r.top -S.pan.y)/S.zoom;
    // Get element size for centering
    const el=getEl(kind,id);
    const elW=el?el.offsetWidth/2:75;
    const elH=el?el.offsetHeight/2:40;
    obj.x=bx-elW; obj.y=by-elH;
    if(el){el.style.left=obj.x+'px';el.style.top=obj.y+'px';}
    redrawConnectors(); save();
    focus(kind,id);
    hideMoveOverlay();
    S.cmdBuf='';S.cmdMode=null;updateCmd();
    toast(`#${objNum} を移動しました`);
  }

  // ─── NAVIGATE FOCUS ───────────────────────────────────────────────────
  function navigateFocus(key) {
    // Gather all objects with positions
    const all=[];
    Object.values(S.ideas).forEach(o=>all.push({kind:'idea',id:o.id,x:o.x,y:o.y}));
    S.zones.forEach(z=>all.push({kind:'zone',id:z.id,x:z.x,y:z.y}));
    S.books.forEach(b=>all.push({kind:'book',id:b.id,x:b.x,y:b.y}));
    if(!all.length)return;
    if(!S.focused){ const f=all[0]; focus(f.kind,f.id); return; }
    const cur=all.find(a=>a.kind===S.focused.kind&&a.id===S.focused.id);
    if(!cur){ const f=all[0]; focus(f.kind,f.id); return; }
    let best=null,bestD=Infinity;
    all.forEach(a=>{
      if(a.kind===cur.kind&&a.id===cur.id)return;
      const dx=a.x-cur.x,dy=a.y-cur.y;
      let ok=false;
      if(key==='ArrowRight'&&dx>20&&Math.abs(dy)<Math.abs(dx))ok=true;
      if(key==='ArrowLeft' &&dx<-20&&Math.abs(dy)<Math.abs(dx))ok=true;
      if(key==='ArrowDown' &&dy>20&&Math.abs(dx)<Math.abs(dy))ok=true;
      if(key==='ArrowUp'   &&dy<-20&&Math.abs(dx)<Math.abs(dy))ok=true;
      if(ok){const d=Math.hypot(dx,dy);if(d<bestD){bestD=d;best=a;}}
    });
    if(best)focus(best.kind,best.id);
  }

  // ─── PALETTE ──────────────────────────────────────────────────────────
  function openPalette() {
    if(!S.lastFocused){toast('先にオブジェクトを選択してください');return;}
    S.cmdMode='palette'; palette.classList.add('show'); updateCmd();
  }
  function closePalette() {
    palette.classList.remove('show');
    if(S.cmdMode==='palette')S.cmdMode=null;
  }
  function handlePaletteKey(key) {
    const c=COLOR_KEYS[key];
    if(c)applyColor(c);
    closePalette(); updateCmd();
  }
  function applyColor(color) {
    const lf=S.lastFocused;
    if(!lf||lf.kind!=='idea')return;
    const o=S.ideas[lf.id];
    if(!o)return;
    o.color=color;
    renderIdea(lf.id);
    focus('idea',lf.id);
    buildArrowMarkers();
    redrawConnectors();
    save();
  }
  document.querySelectorAll('.psw').forEach(sw=>{
    sw.addEventListener('click',()=>{applyColor(sw.dataset.c);closePalette();});
  });

  // ─── DELETE ───────────────────────────────────────────────────────────
  function deleteSelected() {
    if(!S.focused)return;
    const {kind,id}=S.focused;
    const el=getEl(kind,id);
    if(el){el.classList.add('fade-out');setTimeout(()=>el.remove(),200);}
    if(kind==='idea'){
      delete S.ideas[id];
      S.connectors=S.connectors.filter(c=>c.from!==id&&c.to!==id);
      S.books.forEach(b=>{b.children=b.children.filter(c=>c!==id);});
      S.books.forEach(b=>renderBook(b.id));
      redrawConnectors();
    } else if(kind==='zone'){
      S.zones=S.zones.filter(z=>z.id!==id);
    } else if(kind==='book'){
      S.books=S.books.filter(b=>b.id!==id);
      syncIdeaVisibility();
    }
    S.focused=null;
    save(); updateStat(); updateCmd();
  }

  // ─── CMD / STATUS ─────────────────────────────────────────────────────
  function updateCmd() {
    let txt='';
    if(S.cmdBuf) txt=S.cmdBuf;
    else if(S.cmdMode==='palette') txt='COLOR: 1紫  2シアン  3緑  4琥珀  5ピンク  Esc:キャンセル';
    else if(S.mode==='resize') txt=`リサイズモード [${S.resizeZoneId}] — ↑↓←→ / Enter:確定`;
    else if(S.focused){ const{kind,id}=S.focused; txt=`${kind} #${String(id).replace(/[a-z]/g,'')} — Enter:編集/展開  Shift+↑↓←→:移動  m:配置  p:カラー  x:削除`; }
    cmdBufEl.textContent=txt;
  }
  function updateStat() {
    const ni=Object.keys(S.ideas).length,nc=S.connectors.length,nz=S.zones.length,nb=S.books.length;
    let s=`${ni} idea${ni!==1?'s':''}`;
    if(nc)s+=` · ${nc} conn`;
    if(nz)s+=` · ${nz} zone${nz!==1?'s':''}`;
    if(nb)s+=` · ${nb} book${nb!==1?'s':''}`;
    cmdStat.textContent=s;
  }

  // ─── THEME ────────────────────────────────────────────────────────────
  document.getElementById('theme-btn').addEventListener('click',()=>{
    S.theme=S.theme==='dark'?'light':'dark';
    document.body.classList.toggle('light',S.theme==='light');
    document.getElementById('theme-btn').textContent=S.theme==='dark'?'◑':'◐';
    save();
  });

  // ─── PERSIST ──────────────────────────────────────────────────────────
  let saveTimer;
  function save() {
    clearTimeout(saveTimer);
    saveTimer=setTimeout(()=>{
      try {
        localStorage.setItem('ideaboard_v3',JSON.stringify({
          ideas:S.ideas,connectors:S.connectors,zones:S.zones,books:S.books,
          nextId:S.nextId,pan:S.pan,zoom:S.zoom,theme:S.theme
        }));
      } catch(e){}
    },400);
  }

  function loadSaved() {
    try {
      const raw=localStorage.getItem('ideaboard_v3');
      if(!raw)return false;
      const d=JSON.parse(raw);
      Object.assign(S,{
        ideas:d.ideas||{},connectors:d.connectors||[],
        zones:d.zones||[],books:d.books||[],
        nextId:d.nextId||1,pan:d.pan||S.pan,zoom:d.zoom||1,theme:d.theme||'dark'
      });
      // normalize idea ids to numbers
      const fixed={};
      Object.entries(S.ideas).forEach(([k,v])=>{fixed[+k]=v;v.id=+v.id;});
      S.ideas=fixed;
      S.connectors.forEach(c=>{c.from=+c.from;c.to=+c.to;});
      return true;
    } catch(e){return false;}
  }

  function renderAll() {
    objLayer.innerHTML=''; zonesLayer.innerHTML='';
    S.zones.forEach(z=>renderZone(z.id));
    Object.values(S.ideas).forEach(o=>renderIdea(o.id));
    S.books.forEach(b=>renderBook(b.id));
    syncIdeaVisibility();
    buildArrowMarkers();
    redrawConnectors();
    applyXform(); updateStat();
    document.body.classList.toggle('light',S.theme==='light');
    document.getElementById('theme-btn').textContent=S.theme==='dark'?'◑':'◐';
  }

  // ─── EXPORT / IMPORT ──────────────────────────────────────────────────
  function exportJSON() {
    const data={ideas:S.ideas,connectors:S.connectors,zones:S.zones,books:S.books,nextId:S.nextId,
                meta:{exported:new Date().toISOString(),version:3}};
    const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a');
    a.href=url; a.download=`ideaboard-${Date.now()}.json`;
    a.click(); URL.revokeObjectURL(url);
    toast('JSONをエクスポートしました');
  }
  function importJSON(ev) {
    const file=ev.target.files[0];
    if(!file)return;
    const reader=new FileReader();
    reader.onload=e=>{
      try {
        const d=JSON.parse(e.target.result);
        Object.assign(S,{ideas:d.ideas||{},connectors:d.connectors||[],zones:d.zones||[],books:d.books||[],nextId:d.nextId||1});
        const fixed={};
        Object.entries(S.ideas).forEach(([k,v])=>{fixed[+k]=v;v.id=+v.id;});
        S.ideas=fixed;
        S.connectors.forEach(c=>{c.from=+c.from;c.to=+c.to;});
        renderAll(); save(); toast('インポートしました');
      } catch(ex){toast('インポートに失敗しました');}
    };
    reader.readAsText(file);
    ev.target.value='';
  }

  // ─── INIT ─────────────────────────────────────────────────────────────
  (function init(){
    const hasSaved=loadSaved();
    renderAll();
    if(!hasSaved) toast('TAB → i でアイデアを作成  /  Alt+ドラッグ でパン  /  スクロールでズーム');
  })();

  return {exportJSON,importJSON};
})();
</script>
