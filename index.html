<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>IDEA BOARD</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    /* ─── THEME ─── */
    :root {
      --bg: #0d0d14;
      --board-dot: rgba(50, 50, 80, 0.8);
      --card: #1e1e30;
      --card-border: #3a3a5c;
      --text: #e2e8f0;
      --dim: #64748b;
      --header-bg: #080810;
      --header-border: #1e1e30;
      --zone-bg: rgba(28, 28, 50, 0.45);
      --zone-border: #3a3a5c;
      --book-shadow1: #191928;
      --book-shadow2: #141420;
      --book-inner: #15151f;
      --book-inner-border: #2a2a3e;
      --cmd-bg: #080810;
      --palette-bg: #18182a;
      --toast-bg: #1e1e30;
      --toast-border: #3a3a5c;
      --purple: #7b6cf6;
      --cyan: #06b6d4;
      --green: #10b981;
      --amber: #f59e0b;
      --pink: #ec4899;
    }

    body.light {
      --bg: #f0f2f8;
      --board-dot: rgba(160, 160, 200, 0.7);
      --card: #ffffff;
      --card-border: #c0c0d8;
      --text: #1a1a2e;
      --dim: #7080a0;
      --header-bg: #e4e6f0;
      --header-border: #c0c0d8;
      --zone-bg: rgba(200, 200, 230, 0.3);
      --zone-border: #9090b8;
      --book-shadow1: #d8d8e8;
      --book-shadow2: #c8c8dc;
      --book-inner: #f5f5fc;
      --book-inner-border: #c8c8e0;
      --cmd-bg: #e4e6f0;
      --palette-bg: #e8eaf4;
      --toast-bg: #ffffff;
      --toast-border: #c0c0d8;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'JetBrains Mono', 'Fira Code', 'Cascadia Code', 'Courier New', monospace;
      height: 100vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      user-select: none;
    }

    /* ─── HEADER ─── */
    #header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 6px 14px;
      background: var(--header-bg);
      border-bottom: 1px solid var(--header-border);
      flex-shrink: 0;
      z-index: 100;
      flex-wrap: wrap;
    }

    #mode-badge {
      display: flex;
      align-items: center;
      gap: 5px;
      padding: 3px 9px;
      border-radius: 4px;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 2px;
      transition: all 0.15s;
      min-width: 90px;
    }

    #mode-badge.select {
      background: rgba(123, 108, 246, .12);
      border: 1px solid var(--purple);
      color: var(--purple);
    }

    #mode-badge.edit {
      background: rgba(16, 185, 129, .12);
      border: 1px solid var(--green);
      color: var(--green);
    }

    #mode-badge.resize {
      background: rgba(6, 182, 212, .12);
      border: 1px solid var(--cyan);
      color: var(--cyan);
    }

    #mode-dot {
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: currentColor;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {

      0%,
      100% {
        opacity: 1
      }

      50% {
        opacity: .3
      }
    }

    #app-title {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 4px;
      color: var(--text);
      opacity: .35;
    }

    .hints {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .hint {
      display: flex;
      align-items: center;
      gap: 3px;
      font-size: 9px;
      color: var(--dim);
    }

    .hk {
      background: var(--card);
      border: 1px solid var(--card-border);
      border-radius: 3px;
      padding: 1px 4px;
      font-size: 8px;
      color: var(--text);
      opacity: .8;
    }

    #toolbar {
      margin-left: auto;
      display: flex;
      gap: 6px;
    }

    .tb-btn {
      background: var(--card);
      border: 1px solid var(--card-border);
      border-radius: 4px;
      color: var(--dim);
      font-family: inherit;
      font-size: 9px;
      letter-spacing: 1px;
      padding: 3px 8px;
      cursor: pointer;
      text-transform: uppercase;
      transition: all .15s;
    }

    .tb-btn:hover {
      color: var(--text);
      border-color: var(--purple);
    }

    #theme-btn {
      font-size: 11px;
      padding: 3px 6px;
    }

    /* ─── BOARD ─── */
    #board-wrap {
      flex: 1;
      overflow: hidden;
      position: relative;
      cursor: default;
    }

    #board-wrap.panning {
      cursor: grabbing;
    }

    #board-wrap::before {
      content: '';
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      background-image: radial-gradient(circle, var(--board-dot) 1px, transparent 1px);
      background-size: 28px 28px;
    }

    #board {
      position: absolute;
      width: 8000px;
      height: 8000px;
      top: 0;
      left: 0;
      transform-origin: 0 0;
    }

    #zones-layer {
      position: absolute;
      inset: 0;
      z-index: 1;
    }

    #objects-layer {
      position: absolute;
      inset: 0;
      z-index: 3;
    }

    /* SVG overlay is a sibling of #board — NOT inside it */
    #svg-overlay {
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 4;
      overflow: visible;
    }

    /* ─── IDEA ─── */
    .idea {
      position: absolute;
      min-width: 150px;
      max-width: 280px;
      background: var(--card);
      border: 2px solid var(--card-border);
      border-radius: 8px;
      padding: 8px 12px 12px;
      cursor: grab;
      transition: box-shadow .2s, transform .2s;
    }

    /* border-color/width is set via inline style in JS — CSS only handles focus glow */
    .idea.focused {
      transform: translateY(-2px);
    }

    .idea-num {
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 1px;
      margin-bottom: 5px;
      opacity: .8;
    }

    .idea[data-c="purple"] .idea-num {
      color: var(--purple);
    }

    .idea[data-c="cyan"] .idea-num {
      color: var(--cyan);
    }

    .idea[data-c="green"] .idea-num {
      color: var(--green);
    }

    .idea[data-c="amber"] .idea-num {
      color: var(--amber);
    }

    .idea[data-c="pink"] .idea-num {
      color: var(--pink);
    }

    .idea-body {
      font-size: 12px;
      color: var(--text);
      line-height: 1.6;
      word-break: break-word;
      white-space: pre-wrap;
      min-height: 18px;
    }

    .idea-body.empty {
      color: var(--dim);
      font-style: italic;
    }

    .idea-ta {
      background: transparent;
      border: none;
      outline: none;
      font-family: inherit;
      font-size: 12px;
      color: var(--text);
      line-height: 1.6;
      resize: none;
      width: 100%;
      min-height: 50px;
      caret-color: var(--green);
    }

    @keyframes springIn {
      0% {
        transform: scale(.45) translateY(12px);
        opacity: 0
      }

      65% {
        transform: scale(1.04) translateY(-2px);
        opacity: 1
      }

      100% {
        transform: scale(1) translateY(0);
        opacity: 1
      }
    }

    .spring-in {
      animation: springIn .32s cubic-bezier(.34, 1.56, .64, 1) forwards;
    }

    @keyframes fadeOut {
      to {
        transform: scale(.7);
        opacity: 0
      }
    }

    .fade-out {
      animation: fadeOut .18s ease forwards;
    }

    /* ─── ZONE ─── */
    .zone {
      position: absolute;
      background: var(--zone-bg);
      border: 1.5px dashed var(--zone-border);
      border-radius: 10px;
      padding: 28px 12px 10px;
      cursor: grab;
      transition: border-color .2s, box-shadow .2s;
      min-width: 160px;
      min-height: 100px;
    }

    .zone:hover {
      border-color: var(--dim);
    }

    .zone.focused {
      border-color: var(--cyan);
      box-shadow: 0 0 0 1px var(--cyan), 0 0 20px rgba(6, 182, 212, .2);
    }

    .zone.resize-mode {
      border-color: var(--amber);
      box-shadow: 0 0 0 1px var(--amber), 0 0 20px rgba(245, 158, 11, .2);
      cursor: nwse-resize;
    }

    .zone-header {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 24px;
      display: flex;
      align-items: center;
      padding: 0 10px;
      gap: 6px;
    }

    .zone-num {
      font-size: 8px;
      color: var(--cyan);
      opacity: .6;
      font-weight: 700;
      letter-spacing: 1px;
    }

    .zone-lbl {
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: rgba(6, 182, 212, .6);
      background: rgba(6, 182, 212, .08);
      padding: 1px 6px;
      border-radius: 3px;
    }

    .zone-lbl-input {
      background: rgba(6, 182, 212, .1);
      border: 1px solid var(--cyan);
      border-radius: 3px;
      outline: none;
      font-family: inherit;
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--cyan);
      padding: 1px 5px;
      width: 120px;
      caret-color: var(--cyan);
    }

    .zone-resize-handle {
      position: absolute;
      bottom: 0;
      right: 0;
      width: 22px;
      height: 22px;
      cursor: nwse-resize;
      pointer-events: all;
      border-radius: 0 0 10px 0;
      background: linear-gradient(135deg, transparent 40%, rgba(6, 182, 212, .25) 40%);
      transition: background .2s;
    }

    .zone:hover .zone-resize-handle {
      background: linear-gradient(135deg, transparent 40%, rgba(6, 182, 212, .5) 40%);
    }

    .zone.focused .zone-resize-handle {
      background: linear-gradient(135deg, transparent 40%, rgba(6, 182, 212, .7) 40%);
    }

    /* ─── BOOK ─── */
    .book {
      position: absolute;
      cursor: grab;
      min-width: 170px;
    }

    .book-stack {
      position: relative;
    }

    .book-stack::before {
      content: '';
      position: absolute;
      top: -4px;
      left: 5px;
      right: -5px;
      bottom: 4px;
      background: var(--book-shadow1);
      border: 1px solid var(--card-border);
      border-radius: 8px;
      z-index: -1;
    }

    .book-stack::after {
      content: '';
      position: absolute;
      top: -8px;
      left: 10px;
      right: -10px;
      bottom: 8px;
      background: var(--book-shadow2);
      border: 1px solid var(--card-border);
      border-radius: 8px;
      z-index: -2;
    }

    .book-card {
      background: var(--card);
      border: 1px solid var(--card-border);
      border-radius: 8px;
      padding: 8px 12px 10px;
      position: relative;
      z-index: 1;
      transition: border-color .2s, box-shadow .2s;
    }

    .book.focused .book-card {
      border-color: var(--amber);
      box-shadow: 0 0 0 1px var(--amber), 0 0 24px rgba(245, 158, 11, .3);
    }

    .book-hdr {
      display: flex;
      align-items: center;
      gap: 5px;
      margin-bottom: 6px;
    }

    .book-icon,
    .book-bid {
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 1px;
      color: var(--amber);
    }

    .book-ttl {
      font-size: 11px;
      color: var(--text);
    }

    .book-tags {
      display: flex;
      gap: 4px;
      flex-wrap: wrap;
    }

    .btag {
      background: rgba(245, 158, 11, .1);
      border: 1px solid rgba(245, 158, 11, .25);
      border-radius: 3px;
      padding: 1px 6px;
      font-size: 9px;
      color: var(--amber);
    }

    .book-expanded {
      margin-top: 10px;
      border-top: 1px solid var(--book-inner-border);
      padding-top: 10px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 7px;
      animation: springIn .25s ease;
    }

    .book-inner {
      background: var(--book-inner);
      border: 1px solid var(--book-inner-border);
      border-radius: 6px;
      padding: 6px 8px;
      font-size: 10px;
      color: var(--text);
      line-height: 1.5;
      pointer-events: none;
    }

    .book-inner-num {
      font-size: 8px;
      color: var(--amber);
      opacity: .7;
      margin-bottom: 3px;
    }

    /* ─── CONNECTOR ─── */
    .conn-path {
      stroke-dasharray: 2000;
      stroke-dashoffset: 2000;
      animation: drawConn .45s ease forwards;
    }

    @keyframes drawConn {
      to {
        stroke-dashoffset: 0
      }
    }

    /* ─── CMD LINE ─── */
    #cmdline {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 14px;
      background: var(--cmd-bg);
      border-top: 1px solid var(--header-border);
      flex-shrink: 0;
      font-size: 11px;
      min-height: 34px;
    }

    #cmd-prompt {
      color: var(--purple);
      font-weight: 700;
    }

    #cmd-buf {
      color: var(--text);
      letter-spacing: .5px;
    }

    #cmd-cur {
      display: inline-block;
      width: 7px;
      height: 12px;
      background: var(--green);
      vertical-align: middle;
      margin-left: 1px;
      animation: blink 1s step-end infinite;
    }

    @keyframes blink {

      0%,
      100% {
        opacity: 1
      }

      50% {
        opacity: 0
      }
    }

    #cmd-stat {
      margin-left: auto;
      font-size: 9px;
      color: var(--dim);
      letter-spacing: 1px;
    }

    /* ─── PALETTE ─── */
    #palette {
      position: fixed;
      bottom: 44px;
      left: 50%;
      transform: translateX(-50%) translateY(6px);
      background: var(--palette-bg);
      border: 1px solid var(--card-border);
      border-radius: 12px;
      padding: 10px 16px;
      display: none;
      gap: 10px;
      align-items: center;
      z-index: 500;
      box-shadow: 0 8px 40px rgba(0, 0, 0, .5);
      opacity: 0;
      transition: opacity .15s, transform .15s;
    }

    #palette.show {
      display: flex;
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    .p-lbl {
      font-size: 9px;
      letter-spacing: 2px;
      color: var(--dim);
      text-transform: uppercase;
      margin-right: 2px;
    }

    .psw {
      width: 22px;
      height: 22px;
      border-radius: 50%;
      cursor: pointer;
      border: 2px solid transparent;
      transition: transform .12s, border-color .12s;
      position: relative;
    }

    .psw:hover {
      transform: scale(1.35);
      border-color: rgba(255, 255, 255, .7);
    }

    .psw-k {
      position: absolute;
      bottom: -15px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 8px;
      color: var(--dim);
    }

    /* ─── MOVE OVERLAY ─── */
    #move-overlay {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 300;
      display: none;
    }

    #move-overlay.show {
      display: block;
    }

    .move-grid-cell {
      position: absolute;
      border: 1px solid rgba(123, 108, 246, .2);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      font-weight: 700;
      color: rgba(123, 108, 246, .3);
      pointer-events: none;
    }

    .move-grid-cell.active {
      background: rgba(123, 108, 246, .12);
      color: rgba(123, 108, 246, .7);
      border-color: rgba(123, 108, 246, .5);
    }

    /* ─── HINT LABELS (Vimium-style) ─── */
    .hint-label {
      position: fixed;
      transform: translate(-50%, -50%);
      background: #f59e0b;
      color: #000;
      font-size: 11px;
      font-weight: 800;
      padding: 2px 5px;
      border-radius: 3px;
      z-index: 600;
      pointer-events: none;
      letter-spacing: 1px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, .45);
    }

    .hint-label.faded {
      opacity: .35;
    }

    /* ─── BOOK BUILD SELECTION ─── */
    .book-selected {
      outline: 2px solid var(--amber);
      outline-offset: 3px;
    }

    /* ─── MOVE SELECTION ─── */
    .move-selected {
      outline: 2px solid var(--purple);
      outline-offset: 3px;
    }

    /* ─── FOCUS LENS ─── */
    .lens-dim {
      opacity: 0.06 !important;
      filter: grayscale(1) !important;
      transition: opacity 0.3s, filter 0.3s;
      pointer-events: none !important;
    }

    /* ─── CONNECT SOURCE ─── */
    .connect-source {
      animation: connectPulse .9s ease-in-out infinite;
    }

    @keyframes connectPulse {

      0%,
      100% {
        opacity: 1
      }

      50% {
        opacity: .45
      }
    }

    /* ─── VIEW SWITCH ─── */
    #view-switch {
      display: flex;
      gap: 0;
      border: 1px solid var(--card-border);
      border-radius: 5px;
      overflow: hidden;
    }

    .vs-btn {
      background: var(--card);
      border: none;
      color: var(--dim);
      font-family: inherit;
      font-size: 9px;
      letter-spacing: 1px;
      padding: 4px 11px;
      cursor: pointer;
      transition: all .15s;
    }

    .vs-btn:not(:last-child) {
      border-right: 1px solid var(--card-border);
    }

    .vs-btn:hover {
      color: var(--text);
    }

    .vs-btn.active {
      background: var(--purple);
      color: #fff;
    }

    /* ─── IDEA CARD MD PREVIEW ─── */
    .idea-title {
      font-size: 13px;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 4px;
      line-height: 1.35;
      word-break: break-word;
    }

    .idea-snip {
      font-size: 11px;
      color: var(--dim);
      line-height: 1.5;
      word-break: break-word;
      display: -webkit-box;
      -webkit-line-clamp: 4;
      -webkit-box-orient: vertical;
      overflow: hidden;
      white-space: pre-wrap;
    }

    .idea-wl {
      color: var(--cyan);
      font-weight: 600;
    }

    .idea-doc-badge {
      position: absolute;
      top: 6px;
      right: 8px;
      font-size: 9px;
      color: var(--dim);
      opacity: .6;
    }

    /* ─── NOTE VIEW ─── */
    #note-view {
      position: fixed;
      inset: 0;
      z-index: 800;
      background: var(--bg);
      display: none;
      flex-direction: column;
    }

    #note-view.show {
      display: flex;
    }

    #note-top {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 8px 16px;
      background: var(--header-bg);
      border-bottom: 1px solid var(--header-border);
      flex-shrink: 0;
    }

    #note-top .nt-title {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 3px;
      color: var(--text);
      opacity: .4;
    }

    #note-top .nt-hint {
      font-size: 9px;
      color: var(--dim);
      opacity: .55;
      letter-spacing: .5px;
      white-space: nowrap;
    }

    .nv-btn {
      background: var(--card);
      border: 1px solid var(--card-border);
      border-radius: 4px;
      color: var(--dim);
      font-family: inherit;
      font-size: 9px;
      letter-spacing: 1px;
      padding: 4px 10px;
      cursor: pointer;
      text-transform: uppercase;
      transition: all .15s;
    }

    .nv-btn:hover {
      color: var(--text);
      border-color: var(--purple);
    }

    #note-body {
      flex: 1;
      display: flex;
      overflow: hidden;
    }

    #note-list {
      width: 230px;
      flex-shrink: 0;
      border-right: 1px solid var(--header-border);
      display: flex;
      flex-direction: column;
      background: var(--header-bg);
    }

    #note-list-hd { display: flex; align-items: center; gap: 5px; padding: 8px 8px 0; }
    #note-search {
      flex: 1;
      padding: 6px 9px;
      background: var(--card);
      border: 1px solid var(--card-border);
      border-radius: 5px;
      color: var(--text);
      font-family: inherit;
      font-size: 11px;
      outline: none;
    }
    #note-sort-btn {
      background: var(--card); border: 1px solid var(--card-border); border-radius: 4px;
      color: var(--dim); font-family: inherit; font-size: 9px; letter-spacing: .5px;
      padding: 5px 7px; cursor: pointer; flex-shrink: 0; white-space: nowrap;
    }
    #note-sort-btn:hover { color: var(--text); border-color: var(--purple); }

    #note-search:focus {
      border-color: var(--purple);
    }

    #note-list-items {
      flex: 1;
      overflow-y: auto;
      padding: 0 8px 10px;
    }

    .nl-item {
      padding: 7px 9px;
      border-radius: 5px;
      cursor: pointer;
      font-size: 11px;
      color: var(--dim);
      margin-bottom: 3px;
      border: 1px solid transparent;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      transition: all .12s;
    }

    .nl-item:hover {
      background: var(--card);
      color: var(--text);
    }

    .nl-item.active {
      background: var(--card);
      color: var(--text);
      border-color: var(--purple);
    }

    .nl-new {
      margin: 0 8px 10px;
      padding: 7px;
      text-align: center;
      font-size: 10px;
      letter-spacing: 1px;
      color: var(--dim);
      border: 1px dashed var(--card-border);
      border-radius: 5px;
      cursor: pointer;
    }

    .nl-new:hover {
      color: var(--text);
      border-color: var(--purple);
    }

    #note-main {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    #note-main-top {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 14px;
      border-bottom: 1px solid var(--header-border);
      flex-shrink: 0;
    }

    #note-main-top .nm-color {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    #note-main-top .nm-name {
      font-size: 12px;
      font-weight: 700;
      color: var(--text);
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    #note-edit-area {
      flex: 1;
      display: flex;
      overflow: hidden;
      position: relative;
    }

    #wl-auto {
      position: absolute;
      left: 22px;
      bottom: 14px;
      z-index: 20;
      display: none;
      background: var(--palette-bg);
      border: 1px solid var(--card-border);
      border-radius: 6px;
      box-shadow: 0 8px 30px rgba(0, 0, 0, .45);
      overflow: hidden;
      min-width: 200px;
      max-width: 340px;
    }

    #wl-auto.show {
      display: block;
    }

    #wl-auto .wla-hd {
      font-size: 8px;
      letter-spacing: 1px;
      color: var(--dim);
      padding: 5px 10px 3px;
      text-transform: uppercase;
    }

    .wla-item {
      padding: 6px 11px;
      font-size: 11px;
      color: var(--dim);
      cursor: pointer;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .wla-item:hover,
    .wla-item.sel {
      background: var(--card);
      color: var(--text);
    }

    .wla-item.create {
      color: var(--cyan);
      font-style: italic;
    }

    #note-ta {
      flex: 1;
      background: var(--bg);
      border: none;
      outline: none;
      resize: none;
      font-family: inherit;
      font-size: 13px;
      color: var(--text);
      line-height: 1.7;
      padding: 18px 22px;
      caret-color: var(--green);
    }

    #note-preview {
      flex: 1;
      overflow-y: auto;
      padding: 18px 26px;
      border-left: 1px solid var(--header-border);
      font-size: 13px;
      color: var(--text);
      line-height: 1.7;
    }

    #note-preview.hidden,
    #note-ta.hidden {
      display: none;
    }

    #note-preview h1 {
      font-size: 20px;
      margin: 14px 0 8px;
      font-weight: 800;
    }

    #note-preview h2 {
      font-size: 16px;
      margin: 13px 0 7px;
      font-weight: 700;
    }

    #note-preview h3 {
      font-size: 14px;
      margin: 12px 0 6px;
      font-weight: 700;
    }

    #note-preview p {
      margin: 7px 0;
    }

    #note-preview ul,
    #note-preview ol {
      margin: 7px 0;
      padding-left: 22px;
    }

    #note-preview li {
      margin: 3px 0;
    }

    #note-preview code {
      background: var(--card);
      padding: 1px 5px;
      border-radius: 3px;
      font-size: 12px;
    }

    #note-preview pre {
      background: var(--card);
      padding: 10px 12px;
      border-radius: 6px;
      overflow-x: auto;
      margin: 9px 0;
    }

    #note-preview pre code {
      background: none;
      padding: 0;
    }

    #note-preview blockquote {
      border-left: 3px solid var(--purple);
      padding: 2px 0 2px 12px;
      margin: 8px 0;
      color: var(--dim);
    }

    #note-preview hr {
      border: none;
      border-top: 1px solid var(--card-border);
      margin: 14px 0;
    }

    #note-preview a {
      color: var(--cyan);
      text-decoration: none;
    }

    #note-preview a:hover {
      text-decoration: underline;
    }

    #note-preview del {
      opacity: .6;
      text-decoration: line-through;
    }

    #note-preview li.task {
      list-style: none;
      margin-left: -4px;
    }

    #note-preview li.task .cb {
      margin-right: 5px;
    }

    #note-preview li.task.done {
      opacity: .55;
    }

    #note-preview ul ul,
    #note-preview ul ol,
    #note-preview ol ul,
    #note-preview ol ol {
      margin: 2px 0;
      padding-left: 16px;
    }

    .wikilink {
      color: var(--cyan);
      cursor: pointer;
      border-bottom: 1px dashed var(--cyan);
    }

    .wikilink.missing {
      color: var(--pink);
      border-color: var(--pink);
    }

    #note-links {
      width: 230px;
      flex-shrink: 0;
      border-left: 1px solid var(--header-border);
      overflow-y: auto;
      padding: 14px 12px;
      background: var(--header-bg);
    }

    .nlk-sec {
      font-size: 9px;
      letter-spacing: 2px;
      color: var(--dim);
      text-transform: uppercase;
      margin: 14px 0 7px;
      font-weight: 700;
    }

    .nlk-sec:first-child {
      margin-top: 0;
    }

    .nlk-item {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 5px 7px;
      border-radius: 4px;
      font-size: 11px;
      color: var(--dim);
      cursor: pointer;
      margin-bottom: 2px;
    }

    .nlk-item:hover {
      background: var(--card);
      color: var(--text);
    }

    .nlk-item .nlk-tx {
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .nlk-link {
      font-size: 9px;
      color: var(--dim);
      border: 1px solid var(--card-border);
      border-radius: 3px;
      padding: 1px 5px;
      cursor: pointer;
      flex-shrink: 0;
    }

    .nlk-link:hover {
      color: var(--cyan);
      border-color: var(--cyan);
    }

    .nlk-back {
      font-size: 9px;
      color: var(--dim);
      border: 1px solid var(--card-border);
      border-radius: 3px;
      padding: 1px 5px;
      cursor: pointer;
      flex-shrink: 0;
    }
    .nlk-back:hover {
      color: var(--green);
      border-color: var(--green);
    }

    .nlk-empty {
      font-size: 10px;
      color: var(--dim);
      opacity: .5;
      font-style: italic;
    }

    /* ─── GRAPH VIEW ─── */
    #graph-view {
      position: fixed;
      inset: 0;
      z-index: 800;
      background: var(--bg);
      display: none;
      flex-direction: column;
    }

    #graph-view.show {
      display: flex;
    }

    #graph-top {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 8px 16px;
      background: var(--header-bg);
      border-bottom: 1px solid var(--header-border);
      flex-shrink: 0;
    }

    #graph-svg {
      flex: 1;
      cursor: grab;
      display: block;
    }

    #graph-svg.gp {
      cursor: grabbing;
    }

    .gnode {
      cursor: pointer;
    }

    .gnode text {
      pointer-events: none;
      font-family: 'JetBrains Mono', 'Fira Code', monospace;
      fill: var(--text);
    }

    .gnode.dim {
      opacity: .1;
      transition: opacity .2s;
    }

    .gnode circle,
    .gnode rect {
      transition: filter .2s;
    }

    .gnode:not(.dim):hover circle,
    .gnode:not(.dim):hover rect {
      filter: brightness(1.25);
    }

    .gedge {
      pointer-events: none;
    }

    .gedge.dim {
      opacity: .06;
      transition: opacity .2s;
    }

    #graph-live-lbl {
      font-size: 10px;
      color: var(--dim);
      display: flex;
      align-items: center;
      gap: 5px;
    }

    /* ─── TOAST ─── */
    .toast {
      position: fixed;
      top: 52px;
      right: 18px;
      background: var(--toast-bg);
      border: 1px solid var(--toast-border);
      border-radius: 6px;
      padding: 7px 13px;
      font-size: 10px;
      color: var(--text);
      z-index: 1000;
      pointer-events: none;
      animation: toastIn .18s ease, toastOut .2s ease 6.7s forwards;
    }

    @keyframes toastIn {
      from {
        transform: translateX(16px);
        opacity: 0
      }

      to {
        transform: none;
        opacity: 1
      }
    }

    @keyframes toastOut {
      from {
        opacity: 1
      }

      to {
        opacity: 0
      }
    }
  </style>
</head>

<body>

  <div id="header">
    <div id="mode-badge" class="select">
      <div id="mode-dot"></div>
      <span id="mode-txt">SELECT</span>
    </div>
    <div id="app-title">IDEA BOARD</div>
    <div class="hints">
      <div class="hint"><span class="hk">i</span>idea</div>
      <div class="hint"><span class="hk">f</span>forcus</div>
      <div class="hint"><span class="hk">c</span>connect</div>
      <div class="hint"><span class="hk">z</span>zone</div>
      <div class="hint"><span class="hk">b</span>book</div>
      <div class="hint"><span class="hk">p</span>pallet</div>
      <div class="hint"><span class="hk">u</span>undo</div>
      <div class="hint"><span class="hk">x</span>delete</div>
      <div class="hint"><span class="hk">m</span>move</div>
      <div class="hint"><span class="hk">v</span>view</div>
      <div class="hint"><span class="hk">l</span>lense</div>
      <div class="hint"><span class="hk">g</span>gateway</div>
      <div class="hint"><span class="hk">s</span>sort</div>
    </div>
    <div id="toolbar">
      <div id="view-switch">
        <button class="vs-btn active" data-view="board">BOARD</button>
        <button class="vs-btn" data-view="note">NOTE</button>
        <button class="vs-btn" data-view="graph">GRAPH</button>
      </div>
      <button class="tb-btn" id="theme-btn" title="テーマ切替">◑</button>
      <button class="tb-btn" onclick="App.exportMarkdown()">MD</button>
    </div>
  </div>

  <!-- ─── NOTE VIEW ─── -->
  <div id="note-view">
    <div id="note-top">
      <span class="nt-title">NOTE</span>
      <div id="view-switch-n"
        style="display:flex;border:1px solid var(--card-border);border-radius:5px;overflow:hidden;">
        <button class="vs-btn" data-view="board">BOARD</button>
        <button class="vs-btn active" data-view="note">NOTE</button>
        <button class="vs-btn" data-view="graph">GRAPH</button>
      </div>
      <div style="margin-left:auto;display:flex;align-items:center;gap:6px;">
        <span class="nt-hint">Ctrl+1/2/3 ビュー切替 &nbsp;|&nbsp; n 新規 &nbsp;|&nbsp; e 編集 &nbsp;|&nbsp; p プレビュー &nbsp;|&nbsp; Alt+↑↓/[ ] 移動</span>
        <button class="nv-btn" id="note-txt-export" title="現在のメモをテキストファイルとして保存">TXT</button>
        <button class="nv-btn" id="note-json-export" title="環境全体をJSONで保存">JSON出力</button>
        <button class="nv-btn" id="note-json-import" title="JSONから読み込み">JSON読込</button>
        <input type="file" id="note-imp" accept=".json" style="display:none">
        <button class="nv-btn" id="note-toggle-prev" title="編集/プレビュー切替">プレビュー</button>
        <button class="nv-btn" id="note-open-board">ボードで開く</button>
      </div>
    </div>
    <div id="note-body">
      <div id="note-list">
        <div id="note-list-hd">
          <input id="note-search" placeholder="🔍 メモを検索...">
          <button id="note-sort-btn" title="並び順を切り替え">A→Z</button>
        </div>
        <div id="note-list-items"></div>
        <div class="nl-new" id="note-new">＋ 新規 (n)</div>
      </div>
      <div id="note-main">
        <div id="note-main-top">
          <span class="nm-color" id="note-color"></span>
          <span class="nm-name" id="note-name">メモを選択</span>
        </div>
        <div id="note-edit-area">
          <textarea id="note-ta" placeholder="# タイトル&#10;&#10;マークダウンで記述。[[別のメモ]] でリンク。" spellcheck="false"></textarea>
          <div id="note-preview" class="hidden"></div>
          <div id="wl-auto"></div>
        </div>
      </div>
      <div id="note-links"></div>
    </div>
  </div>

  <!-- ─── GRAPH VIEW ─── -->
  <div id="graph-view">
    <div id="graph-top">
      <span class="nt-title">GRAPH</span>
      <div style="display:flex;border:1px solid var(--card-border);border-radius:5px;overflow:hidden;">
        <button class="vs-btn" data-view="board">BOARD</button>
        <button class="vs-btn" data-view="note">NOTE</button>
        <button class="vs-btn active" data-view="graph">GRAPH</button>
      </div>
      <label id="graph-live-lbl">
        <input type="checkbox" id="graph-live" checked>ライブ
      </label>
      <div style="margin-left:auto;display:flex;gap:6px;">
        <button class="nv-btn" id="graph-fit-btn">全体表示</button>
        <button class="nv-btn" id="graph-layout-btn">整列</button>
      </div>
    </div>
    <svg id="graph-svg" xmlns="http://www.w3.org/2000/svg">
      <defs id="graph-defs"></defs>
      <g id="graph-cam">
        <g id="graph-edges-g"></g>
        <g id="graph-nodes-g"></g>
      </g>
    </svg>
  </div>

  <div id="board-wrap">
    <div id="board">
      <div id="zones-layer"></div>
      <div id="objects-layer"></div>
    </div>
    <!-- SVG overlay: sibling of #board, in screen space -->
    <svg id="svg-overlay" xmlns="http://www.w3.org/2000/svg">
      <defs id="svg-defs"></defs>
    </svg>
  </div>

  <!-- move grid overlay -->
  <div id="move-overlay"></div>

  <div id="palette">
    <span class="p-lbl">COLOR</span>
    <div class="psw" data-c="purple" style="background:#7b6cf6"><span class="psw-k">1</span></div>
    <div class="psw" data-c="cyan" style="background:#06b6d4"><span class="psw-k">2</span></div>
    <div class="psw" data-c="green" style="background:#10b981"><span class="psw-k">3</span></div>
    <div class="psw" data-c="amber" style="background:#f59e0b"><span class="psw-k">4</span></div>
    <div class="psw" data-c="pink" style="background:#ec4899"><span class="psw-k">5</span></div>
  </div>

  <div id="cmdline">
    <span id="cmd-prompt">›</span>
    <span id="cmd-buf"></span><span id="cmd-cur"></span>
    <span id="cmd-stat">0 ideas</span>
  </div>

  <script>
    const App = (() => {
      // ─── CONSTANTS ────────────────────────────────────────────────────────
      const COLOR_HEX = { purple: '#7b6cf6', cyan: '#06b6d4', green: '#10b981', amber: '#f59e0b', pink: '#ec4899' };
      const COLOR_KEYS = { '1': 'purple', '2': 'cyan', '3': 'green', '4': 'amber', '5': 'pink' };
      // Grid: digit → [col, row] (0-indexed from top-left)
      // Standard numpad layout: 7=TL 8=TC 9=TR / 4=ML 5=MC 6=MR / 1=BL 2=BC 3=BR
      const GRID_POS = { 7: [0, 0], 8: [1, 0], 9: [2, 0], 4: [0, 1], 5: [1, 1], 6: [2, 1], 1: [0, 2], 2: [1, 2], 3: [2, 2] };

      // ─── STATE ────────────────────────────────────────────────────────────
      const S = {
        mode: 'select',        // 'select'|'edit'|'resize'
        ideas: {},             // num id → {id,x,y,text,color}
        connectors: [],        // {id,from,to,type:'line'|'arrow'}
        zones: [],             // {id,x,y,w,h,label}  id=`z${N}`
        books: [],             // {id,x,y,title,children:[],expanded}  id=`bk${N}`
        nextId: 1,
        focused: null,         // {kind:'idea'|'zone'|'book', id}
        lastFocused: null,
        pan: { x: 300, y: 200 },
        zoom: 1,
        cmdBuf: '',
        cmdMode: null,         // null|'c'|'book'|'palette'|'v'|'hint'
        panning: false,
        panOrigin: null,
        resizeZoneId: null,
        connectFrom: null,     // {kind,id} — source endpoint during connect mode
        hintMap: null,         // hint char → {kind,id}
        hintBuf: '',
        hintReturnToConnect: false,
        hintReturnToBook: false,
        hintReturnToMove: false,
        hintReturnToBridge: false,
        bookSelection: [],     // idea ids accumulating for book build
        moveSelection: [],     // {kind,id} objects accumulating for move
        lensMode: false,
        lensDepth: 1,
        view: 'board',         // 'board'|'note'|'graph'
        activeNote: null,      // idea id open in note view
        notePreview: false,    // note view: show rendered preview
        noteSort: 'az',         // 'az'|'za'|'new'|'old'|'manual'
        noteOrder: [],           // manual sort order (array of idea IDs)
        graphPos: {},          // 'kind:id' → {x,y}
        gPan: { x: 0, y: 0 },
        gZoom: 1,
        graphAnimId: null,
        theme: 'dark',
      };

      // ─── DOM ──────────────────────────────────────────────────────────────
      const boardWrap = document.getElementById('board-wrap');
      const board = document.getElementById('board');
      const zonesLayer = document.getElementById('zones-layer');
      const objLayer = document.getElementById('objects-layer');
      const svgOverlay = document.getElementById('svg-overlay');
      const svgDefs = document.getElementById('svg-defs');
      const modeBadge = document.getElementById('mode-badge');
      const modeTxt = document.getElementById('mode-txt');
      const cmdBufEl = document.getElementById('cmd-buf');
      const cmdStat = document.getElementById('cmd-stat');
      const palette = document.getElementById('palette');
      const moveOverlay = document.getElementById('move-overlay');

      // ─── UTILS ────────────────────────────────────────────────────────────
      const esc = s => String(s || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');

      function toast(msg) {
        document.querySelectorAll('.toast').forEach(t => t.remove());
        const t = document.createElement('div');
        t.className = 'toast'; t.textContent = msg;
        document.body.appendChild(t);
        setTimeout(() => t.remove(), 6900);
      }

      function centerPos(offX = 0, offY = 0) {
        const r = boardWrap.getBoundingClientRect();
        return {
          x: (r.width / 2 - S.pan.x) / S.zoom - 90 + offX + (Math.random() - .5) * 70,
          y: (r.height / 2 - S.pan.y) / S.zoom - 45 + offY + (Math.random() - .5) * 50
        };
      }

      // Board → screen coordinate conversion
      function b2s(bx, by) {
        return { x: bx * S.zoom + S.pan.x, y: by * S.zoom + S.pan.y };
      }

      // ─── TRANSFORM ────────────────────────────────────────────────────────
      function applyXform() {
        board.style.transform = `translate(${S.pan.x}px,${S.pan.y}px) scale(${S.zoom})`;
      }

      // ─── MODE ─────────────────────────────────────────────────────────────
      function setMode(m) {
        S.mode = m;
        modeBadge.className = m;
        modeTxt.textContent = m.toUpperCase();
        if (m === 'select') {
          document.querySelectorAll('.idea-ta,.zone-lbl-input').forEach(t => t.blur());
          closePalette();
          S.resizeZoneId = null;
        }
        updateCmd();
      }

      // ─── FOCUS ────────────────────────────────────────────────────────────
      function applyIdeaBorder(el, obj, focused) {
        const hex = COLOR_HEX[obj.color || 'purple'];
        el.style.borderColor = hex;
        el.style.borderWidth = '2px';
        el.style.boxShadow = focused
          ? `0 0 0 1px ${hex}, 0 0 24px ${hex}55`
          : '';
      }

      function applyZoneBorder(el, z, focused) {
        const hex = COLOR_HEX[z.color || 'cyan'];
        el.style.borderColor = hex;
        el.style.boxShadow = focused ? `0 0 0 1px ${hex}, 0 0 20px ${hex}44` : '';
      }

      function applyBookBorder(el, bk, focused) {
        const hex = COLOR_HEX[bk.color || 'purple'];
        const card = el.querySelector('.book-card');
        if (!card) return;
        card.style.borderColor = focused ? hex : '';
        card.style.boxShadow = focused ? `0 0 0 1px ${hex}, 0 0 24px ${hex}4d` : '';
      }

      function focus(kind, id) {
        clearFocus();
        S.focused = { kind, id };
        S.lastFocused = { kind, id };
        const el = getEl(kind, id);
        if (el) {
          el.classList.add('focused');
          if (kind === 'idea') { const o = S.ideas[id]; if (o) applyIdeaBorder(el, o, true); }
          else if (kind === 'zone') { const z = S.zones.find(z => z.id === id); if (z) applyZoneBorder(el, z, true); }
          else if (kind === 'book') { const bk = S.books.find(b => b.id === id); if (bk) applyBookBorder(el, bk, true); }
        }
        if (S.lensMode) applyLens();
        updateCmd();
      }
      function clearFocus() {
        document.querySelectorAll('.focused').forEach(el => {
          el.classList.remove('focused');
          if (el.classList.contains('idea')) {
            el.style.boxShadow = '';
            el.style.transform = '';
          } else if (el.classList.contains('zone')) {
            el.style.boxShadow = '';           // keep borderColor set by renderZone
          } else if (el.classList.contains('book')) {
            const card = el.querySelector('.book-card');
            if (card) { card.style.borderColor = ''; card.style.boxShadow = ''; }
          }
        });
        S.focused = null;
        if (S.lensMode) exitLensMode();
        updateCmd();
      }
      function getEl(kind, id) {
        if (kind === 'idea') return document.getElementById(`idea-${id}`);
        if (kind === 'zone') return document.getElementById(`zone-${id}`);
        if (kind === 'book') return document.getElementById(`book-${id}`);
        return null;
      }

      // ─── BOOK MEMBERSHIP ─────────────────────────────────────────────────
      function getBookedIdeas() {
        const set = new Set();
        S.books.forEach(bk => bk.children.forEach(c => set.add(c)));
        return set;
      }
      function syncIdeaVisibility() {
        const booked = getBookedIdeas();
        Object.keys(S.ideas).forEach(id => {
          const el = document.getElementById(`idea-${id}`);
          if (el) el.style.display = booked.has(+id) ? 'none' : '';
        });
        redrawConnectors();
      }

      // ─── IDEA ─────────────────────────────────────────────────────────────
      function createIdeaAt(x, y) {
        const id = S.nextId++;
        S.ideas[id] = { id, x, y, text: '', color: 'purple' };
        renderIdea(id, true);
        focus('idea', id);
        setMode('edit');
        startEdit(id);
        save(); updateStat();
      }

      function createIdea() {
        if (S.focused?.kind === 'idea') {
          // Cascade below focused idea
          const fObj = S.ideas[S.focused.id];
          const fEl = getEl('idea', S.focused.id);
          const h = fEl ? fEl.offsetHeight : 80;
          createIdeaAt(fObj.x, fObj.y + h + 20);
        } else {
          const pos = centerPos();
          createIdeaAt(pos.x, pos.y);
        }
      }

      function ideaCardHTML(obj) {
        const raw = (obj.text || '').trim();
        if (!raw) return `<div class="idea-body empty">アイデアを入力...</div>`;
        const allLines = raw.split('\n');
        const titleLine = (allLines.find(l => l.trim()) || '').replace(/^#{1,6}\s*/, '').trim();
        const rest = allLines.slice(allLines.indexOf(allLines.find(l => l.trim())) + 1).join('\n').trim();
        const wl = s => esc(s).replace(/\[\[([^\]]+)\]\]/g, '<span class="idea-wl">$1</span>');
        const multi = rest.length > 0;
        return `${multi ? '<span class="idea-doc-badge" title="メモを開く">≡</span>' : ''}
      <div class="idea-title">${wl(titleLine || '(無題)')}</div>
      ${rest ? `<div class="idea-snip">${wl(rest)}</div>` : ''}`;
      }

      function renderIdea(id, animate) {
        const obj = S.ideas[id];
        if (!obj) return;
        let el = document.getElementById(`idea-${id}`);
        const isNew = !el;
        if (isNew) {
          el = document.createElement('div');
          el.id = `idea-${id}`;
          el.className = 'idea';
          objLayer.appendChild(el);
          makeDraggable(el, () => S.ideas[id], o => { });
          el.addEventListener('click', e => {
            e.stopPropagation();
            if (S.mode === 'select') focus('idea', id);
          });
          el.addEventListener('dblclick', e => {
            e.stopPropagation();
            focus('idea', id); setMode('edit'); startEdit(id);
          });
        }
        el.setAttribute('data-c', obj.color || 'purple');
        el.style.left = obj.x + 'px';
        el.style.top = obj.y + 'px';
        // Border always set via JS to avoid CSS specificity issues
        const isFocused = S.focused?.kind === 'idea' && S.focused.id === id;
        applyIdeaBorder(el, obj, isFocused);
        if (isFocused) el.classList.add('focused');
        el.innerHTML = ideaCardHTML(obj);
        const badge = el.querySelector('.idea-doc-badge');
        if (badge) badge.addEventListener('click', e => { e.stopPropagation(); openNote(id); });
        if (animate) { el.classList.add('spring-in'); setTimeout(() => el.classList.remove('spring-in'), 400); }
        // Respect book visibility
        const booked = getBookedIdeas();
        el.style.display = booked.has(id) ? 'none' : '';
      }

      function startEdit(id) {
        const obj = S.ideas[id];
        if (!obj) return;
        const el = document.getElementById(`idea-${id}`);
        if (!el) return;
        el.innerHTML = `
      <textarea class="idea-ta" placeholder="アイデアを入力...">${esc(obj.text || '')}</textarea>`;
        const ta = el.querySelector('textarea');
        ta.focus();
        ta.setSelectionRange(ta.value.length, ta.value.length);
        ta.addEventListener('input', () => { obj.text = ta.value; save(); });
        ta.addEventListener('keydown', e => {
          // Esc or Tab → commit and stop
          if (e.key === 'Escape' || (e.key === 'Tab' && !e.shiftKey)) {
            e.preventDefault(); e.stopPropagation();
            obj.text = ta.value;
            setMode('select'); renderIdea(id); focus('idea', id);
            requestAnimationFrame(() => resolveOverlaps());
            return;
          }
          // Enter (no shift) → commit and immediately create next idea below
          if (e.key === 'Enter' && !e.shiftKey) {
            e.preventDefault(); e.stopPropagation();
            obj.text = ta.value;
            setMode('select'); renderIdea(id); focus('idea', id);
            requestAnimationFrame(() => {
              resolveOverlaps();
              const curEl = document.getElementById(`idea-${id}`);
              const h = curEl ? curEl.offsetHeight : 80;
              createIdeaAt(obj.x, obj.y + h + 20);
            });
            return;
          }
          // Shift+Enter → default textarea newline (no intercept)
        });
      }

      // ─── ZONE ─────────────────────────────────────────────────────────────
      function createZone() {
        const pos = centerPos();
        const id = `z${S.nextId++}`;
        S.zones.push({ id, x: pos.x - 100, y: pos.y - 75, w: 280, h: 190, label: 'ZONE' });
        renderZone(id, true);
        focus('zone', id);
        save(); updateStat();
        toast('ゾーン生成 — Enter:ラベル編集  r:リサイズモード  Shift+↑↓←→:サイズ変更');
      }

      function renderZone(id, animate) {
        const z = S.zones.find(z => z.id === id);
        if (!z) return;
        let el = document.getElementById(`zone-${id}`);
        const isNew = !el;
        if (isNew) {
          el = document.createElement('div');
          el.id = `zone-${id}`;
          el.className = 'zone';
          zonesLayer.appendChild(el);
          makeDraggable(el, () => z, o => { }, '.zone-resize-handle');
          el.addEventListener('click', e => {
            e.stopPropagation();
            if (S.mode === 'select') focus('zone', id);
          });
        }
        const numPart = id.replace('z', '');
        const zhex = COLOR_HEX[z.color || 'cyan'];
        el.style.left = z.x + 'px'; el.style.top = z.y + 'px';
        el.style.width = z.w + 'px'; el.style.height = z.h + 'px';
        const isFocusedZ = S.focused?.kind === 'zone' && S.focused.id === id;
        applyZoneBorder(el, z, isFocusedZ);
        el.innerHTML = `
      <div class="zone-header">
        <span class="zone-lbl" style="color:${zhex}cc;background:${zhex}18">${esc(z.label)}</span>
      </div>
      <div class="zone-resize-handle" style="background:linear-gradient(135deg,transparent 40%,${zhex}44 40%)"></div>`;
        // Resize handle
        const handle = el.querySelector('.zone-resize-handle');
        handle.addEventListener('mousedown', e => {
          e.stopPropagation(); e.preventDefault();
          const sx = e.clientX, sy = e.clientY, sw = z.w, sh = z.h;
          const onMove = e => {
            z.w = Math.max(120, sw + (e.clientX - sx) / S.zoom);
            z.h = Math.max(80, sh + (e.clientY - sy) / S.zoom);
            el.style.width = z.w + 'px'; el.style.height = z.h + 'px';
          };
          const onUp = () => { save(); document.removeEventListener('mousemove', onMove); document.removeEventListener('mouseup', onUp); };
          document.addEventListener('mousemove', onMove);
          document.addEventListener('mouseup', onUp);
        });
        if (animate) { el.classList.add('spring-in'); setTimeout(() => el.classList.remove('spring-in'), 400); }
      }

      function startZoneEdit(id) {
        const z = S.zones.find(z => z.id === id);
        if (!z) return;
        const el = document.getElementById(`zone-${id}`);
        if (!el) return;
        const numPart = id.replace('z', '');
        const zehex = COLOR_HEX[z.color || 'cyan'];
        el.innerHTML = `
      <div class="zone-header">
        <input class="zone-lbl-input" value="${esc(z.label)}" maxlength="30"
          style="background:${zehex}1a;border-color:${zehex};color:${zehex};caret-color:${zehex}">
      </div>
      <div class="zone-resize-handle" style="background:linear-gradient(135deg,transparent 40%,${zehex}44 40%)"></div>`;
        const inp = el.querySelector('.zone-lbl-input');
        inp.focus(); inp.select();
        inp.addEventListener('input', () => { z.label = inp.value; });
        inp.addEventListener('keydown', e => {
          if (e.key === 'Enter' || e.key === 'Escape' || (e.key === 'Tab' && !e.shiftKey)) {
            e.preventDefault();
            z.label = inp.value;
            setMode('select');
            renderZone(id);
            focus('zone', id);
            save();
          }
        });
        inp.addEventListener('blur', () => {
          z.label = inp.value; renderZone(id); focus('zone', id); setMode('select'); save();
        });
      }

      // ─── BOOK ─────────────────────────────────────────────────────────────
      function createBook(childIds) {
        const pos = centerPos();
        const id = `bk${S.nextId++}`;
        S.books.push({ id, x: pos.x - 85, y: pos.y - 50, title: 'BOOK', children: childIds, expanded: false });
        renderBook(id, true);
        syncIdeaVisibility();
        focus('book', id);
        save(); updateStat();
      }

      function renderBook(id, animate) {
        const bk = S.books.find(b => b.id === id);
        if (!bk) return;
        let el = document.getElementById(`book-${id}`);
        const isNew = !el;
        if (isNew) {
          el = document.createElement('div');
          el.id = `book-${id}`;
          el.className = 'book';
          objLayer.appendChild(el);
          makeDraggable(el, () => bk, o => { });
          el.addEventListener('click', e => {
            e.stopPropagation();
            if (S.mode === 'select') focus('book', id);
          });
          el.addEventListener('dblclick', e => {
            e.stopPropagation();
            toggleBook(id);
          });
        }
        el.style.left = bk.x + 'px'; el.style.top = bk.y + 'px';
        const numPart = id.replace('bk', '');
        const bkhex = COLOR_HEX[bk.color || 'purple'];
        // First child's text becomes the book title
        const firstChild = bk.children[0] ? S.ideas[bk.children[0]] : null;
        const titleText = firstChild?.text
          ? esc(firstChild.text.split('\n')[0].slice(0, 40)) + (firstChild.text.length > 40 ? '…' : '')
          : 'BOOK';
        // Collapsed: show rest as short text previews; Expanded: 2nd onward (1st = title)
        const restChildren = bk.children.slice(1);
        const restTags = restChildren.map(c => {
          const o = S.ideas[c];
          const preview = o?.text ? esc(o.text.split('\n')[0].slice(0, 14)) + (o.text.length > 14 ? '…' : '') : '…';
          return `<span class="btag" style="background:${bkhex}1a;border-color:${bkhex}44;color:${bkhex}">${preview}</span>`;
        }).join('');
        const expandedChildren = bk.expanded ? restChildren : [];
        const exp = bk.expanded ? `<div class="book-expanded">${expandedChildren.map(c => {
          const o = S.ideas[c];
          return `<div class="book-inner">${esc(o ? o.text : '')}</div>`;
        }).join('')
          }</div>` : '';
        el.innerHTML = `<div class="book-stack"><div class="book-card">
      <div class="book-hdr">
        <span class="book-icon" style="color:${bkhex}">${bk.expanded ? '▼' : '▶'}</span>
        <span class="book-ttl" style="font-size:11px;color:var(--text);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${titleText}</span>
      </div>
      <div class="book-tags">${restTags}</div>
      ${exp}
    </div></div>`;
        const isFocusedBk = S.focused?.kind === 'book' && S.focused.id === id;
        applyBookBorder(el, bk, isFocusedBk);
        if (animate) { el.classList.add('spring-in'); setTimeout(() => el.classList.remove('spring-in'), 400); }
      }

      // ─── CONNECTORS (screen-space SVG) ───────────────────────────────────
      function resolveByNum(num) {
        if (S.ideas[num]) return { kind: 'idea', id: num };
        const z = S.zones.find(z => z.id === `z${num}`);
        if (z) return { kind: 'zone', id: z.id };
        const b = S.books.find(b => b.id === `bk${num}`);
        if (b) return { kind: 'book', id: b.id };
        return null;
      }

      function endpointLabel(ep) {
        if (ep.kind === 'idea') {
          const o = S.ideas[ep.id];
          const t = o?.text ? o.text.split('\n')[0].slice(0, 15) : '';
          return t ? `"${t}${t.length === 15 ? '…' : ''}"` : 'アイデア';
        }
        if (ep.kind === 'zone') return S.zones.find(z => z.id === ep.id)?.label || 'ゾーン';
        if (ep.kind === 'book') return 'ブック';
        return '?';
      }

      function buildConnector(fromNum, toNum, type) {
        const fromEp = resolveByNum(fromNum);
        const toEp = resolveByNum(toNum);
        if (!fromEp) { toast(`オブジェクト #${fromNum} が見つかりません`); return; }
        if (!toEp) { toast(`オブジェクト #${toNum} が見つかりません`); return; }
        const epEq = (a, b) => a.kind === b.kind && a.id === b.id;
        const dup = S.connectors.find(c =>
          (epEq(c.from, fromEp) && epEq(c.to, toEp)) ||
          (type === 'line' && epEq(c.from, toEp) && epEq(c.to, fromEp)));
        if (dup) {
          S.connectors = S.connectors.filter(c => c.id !== dup.id);
          if (dup.from.kind === 'idea') rebuildNoteLinkBlock(dup.from.id);
          if (dup.to.kind === 'idea') rebuildNoteLinkBlock(dup.to.id);
          redrawConnectors();
          save();
          toast(`${endpointLabel(fromEp)} — ${endpointLabel(toEp)} の接続を削除`);
          return;
        }
        const id = `c${S.nextId++}`;
        S.connectors.push({ id, from: fromEp, to: toEp, type });
        if (fromEp.kind === 'idea') rebuildNoteLinkBlock(fromEp.id);
        if (toEp.kind === 'idea') rebuildNoteLinkBlock(toEp.id);
        redrawConnectors(); save();
        toast(`${endpointLabel(fromEp)} ${type === 'arrow' ? '→' : '—'} ${endpointLabel(toEp)} を接続`);
      }

      function objScreenCenter(ep) {
        if (!ep) return null;
        let el;
        if (ep.kind === 'idea') {
          el = document.getElementById(`idea-${ep.id}`);
          if (!el) return null;
          if (el.style.display === 'none') {
            // If this idea is the first child of a book, proxy to the book position
            for (const bk of S.books) {
              if (bk.children.length > 0 && bk.children[0] === ep.id) {
                const bkEl = document.getElementById(`book-${bk.id}`);
                if (!bkEl) return null;
                const bx = parseFloat(bkEl.style.left) + bkEl.offsetWidth / 2;
                const by = parseFloat(bkEl.style.top) + bkEl.offsetHeight / 2;
                return b2s(bx, by);
              }
            }
            return null; // non-first children: hide connector
          }
        } else if (ep.kind === 'zone') {
          el = document.getElementById(`zone-${ep.id}`);
          if (!el) return null;
        } else if (ep.kind === 'book') {
          el = document.getElementById(`book-${ep.id}`);
          if (!el) return null;
        } else return null;
        const bx = parseFloat(el.style.left) + el.offsetWidth / 2;
        const by = parseFloat(el.style.top) + el.offsetHeight / 2;
        return b2s(bx, by);
      }

      function buildArrowMarkers() {
        svgDefs.innerHTML = '';
        Object.entries(COLOR_HEX).forEach(([name, hex]) => {
          const mk = document.createElementNS('http://www.w3.org/2000/svg', 'marker');
          mk.setAttribute('id', `arr-${name}`);
          mk.setAttribute('markerUnits', 'strokeWidth');
          mk.setAttribute('markerWidth', '6');
          mk.setAttribute('markerHeight', '4');
          mk.setAttribute('refX', '6');
          mk.setAttribute('refY', '2');
          mk.setAttribute('orient', 'auto');
          const p = document.createElementNS('http://www.w3.org/2000/svg', 'path');
          p.setAttribute('d', 'M0,0 L6,2 L0,4 z');
          p.setAttribute('fill', hex);
          mk.appendChild(p);
          svgDefs.appendChild(mk);
        });
      }
      buildArrowMarkers();

      function epColor(ep) {
        if (!ep) return 'purple';
        if (ep.kind === 'idea') return (S.ideas[ep.id] || {}).color || 'purple';
        if (ep.kind === 'zone') return (S.zones.find(z => z.id === ep.id) || {}).color || 'cyan';
        if (ep.kind === 'book') return (S.books.find(b => b.id === ep.id) || {}).color || 'purple';
        return 'purple';
      }

      function redrawConnectors() {
        svgOverlay.querySelectorAll('.conn-g').forEach(e => e.remove());
        S.connectors.forEach(conn => {
          const a = objScreenCenter(conn.from);
          const b = objScreenCenter(conn.to);
          if (!a || !b) return;
          const color = epColor(conn.from);
          const hex = COLOR_HEX[color];
          const g = document.createElementNS('http://www.w3.org/2000/svg', 'g');
          g.classList.add('conn-g');
          const dx = b.x - a.x, dy = b.y - a.y;
          const d = `M${a.x},${a.y} C${a.x + dx * .35},${a.y} ${a.x + dx * .65},${b.y} ${b.x},${b.y}`;
          // glow
          const glow = document.createElementNS('http://www.w3.org/2000/svg', 'path');
          glow.setAttribute('d', d); glow.setAttribute('fill', 'none');
          glow.setAttribute('stroke', hex); glow.setAttribute('stroke-width', '6'); glow.setAttribute('opacity', '.07');
          g.appendChild(glow);
          // main line
          const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
          path.setAttribute('d', d); path.setAttribute('fill', 'none');
          path.setAttribute('stroke', hex); path.setAttribute('stroke-width', '1.5'); path.setAttribute('opacity', '.8');
          if (conn.type === 'arrow') {
            path.setAttribute('marker-end', `url(#arr-${color})`);
            path.classList.add('conn-path');
          } else if (conn.type === 'link') {
            // wikilink-materialized: faint dotted
            path.setAttribute('stroke-dasharray', '1 5');
            path.setAttribute('stroke-linecap', 'round');
            path.setAttribute('opacity', '.45');
          } else {
            // line: dashed, no animation
            path.setAttribute('stroke-dasharray', '5 3');
          }
          g.appendChild(path);
          svgOverlay.appendChild(g);
        });
        updateConnectLine();
      }

      // ─── CONNECT ENDPOINTS (direct, no number lookup) ─────────────────────
      const epEqual = (a, b) => a && b && a.kind === b.kind && a.id === b.id;

      // ─── MANAGED LINK BLOCK ───────────────────────────────────────────────
      // The bottom of each note holds an auto-managed link section:
      //   <body>\n\n---\n\n[[Title A]]\n[[Title B]]
      // It is kept in perfect sync with idea-to-idea connectors.
      const MLINK_RE = /^\s*\[\[([^\]\n]+)\]\]\s*$/;
      function splitNote(text) {
        const lines = String(text || '').split('\n');
        let sep = -1;
        for (let i = lines.length - 1; i >= 0; i--) {
          if (/^\s*---\s*$/.test(lines[i])) {
            const tail = lines.slice(i + 1);
            if (tail.every(l => l.trim() === '' || MLINK_RE.test(l))) sep = i;
            break;
          }
        }
        if (sep < 0) return { body: String(text || '').replace(/\s+$/, ''), links: [] };
        const body = lines.slice(0, sep).join('\n').replace(/\s+$/, '');
        const links = [];
        lines.slice(sep + 1).forEach(l => {
          const m = l.match(MLINK_RE);
          if (m) { const v = m[1].trim(); if (v && !links.some(x => x.toLowerCase() === v.toLowerCase())) links.push(v); }
        });
        return { body, links };
      }
      function buildNote(body, titles) {
        body = String(body || '').replace(/\s+$/, '');
        const uniq = [];
        (titles || []).forEach(t => {
          t = (t || '').trim();
          if (t && !uniq.some(x => x.toLowerCase() === t.toLowerCase())) uniq.push(t);
        });
        if (!uniq.length) return body;
        return body + '\n\n---\n\n' + uniq.map(t => `[[${t}]]`).join('\n');
      }
      // Titles this idea should list, derived purely from connectors:
      //  from-side of any connector → list the target;
      //  to-side of a 'line' (bidirectional) connector → list the source.
      function connectorLinkTitlesFor(ideaId) {
        const titles = [];
        S.connectors.forEach(c => {
          if (c.from.kind !== 'idea' || c.to.kind !== 'idea') return;
          let other = null;
          if (c.from.id === ideaId) other = c.to.id;
          else if (c.to.id === ideaId && c.type === 'line') other = c.from.id;
          if (other != null && S.ideas[other]) {
            const t = noteTitle(S.ideas[other]);
            if (t && !titles.some(x => x.toLowerCase() === t.toLowerCase())) titles.push(t);
          }
        });
        return titles;
      }
      function rebuildNoteLinkBlock(ideaId) {
        const idea = S.ideas[ideaId];
        if (!idea) return;
        const { body } = splitNote(idea.text);
        const next = buildNote(body, connectorLinkTitlesFor(ideaId));
        if (next === idea.text) return;
        idea.text = next;
        if (S.activeNote === ideaId) {
          const ta = document.getElementById('note-ta');
          if (ta) ta.value = idea.text;
          if (S.view === 'note') {
            document.getElementById('note-name').textContent = noteTitle(idea);
            if (S.notePreview) renderNotePreview();
            renderNoteLinks();
          }
        }
      }
      function rebuildAllNoteLinkBlocks() {
        Object.keys(S.ideas).forEach(k => rebuildNoteLinkBlock(S.ideas[k].id));
      }
      function connectEndpoints(fromEp, toEp, type) {
        const dup = S.connectors.find(c =>
          (epEqual(c.from, fromEp) && epEqual(c.to, toEp)) ||
          (type === 'line' && epEqual(c.from, toEp) && epEqual(c.to, fromEp)));
        if (dup) {
          S.connectors = S.connectors.filter(c => c.id !== dup.id);
          if (dup.from.kind === 'idea') rebuildNoteLinkBlock(dup.from.id);
          if (dup.to.kind === 'idea') rebuildNoteLinkBlock(dup.to.id);
          redrawConnectors(); save();
          toast(`${endpointLabel(fromEp)} — ${endpointLabel(toEp)} の接続を削除`);
          return;
        }
        const id = `c${S.nextId++}`;
        S.connectors.push({ id, from: fromEp, to: toEp, type });
        if (fromEp.kind === 'idea') rebuildNoteLinkBlock(fromEp.id);
        if (toEp.kind === 'idea') rebuildNoteLinkBlock(toEp.id);
        redrawConnectors();
        save();
        toast(`${endpointLabel(fromEp)} ${type === 'arrow' ? '→' : '—'} ${endpointLabel(toEp)} を接続`);
      }

      // ─── DRAG ─────────────────────────────────────────────────────────────
      function makeDraggable(el, getObj, onPos, excludeSel) {
        el.addEventListener('mousedown', e => {
          if (e.target.tagName === 'TEXTAREA' || e.target.tagName === 'INPUT') return;
          if (excludeSel && e.target.closest(excludeSel)) return;
          if (e.button !== 0) return;
          e.stopPropagation();
          const obj = getObj();
          if (!obj) return;
          const sx = e.clientX, sy = e.clientY, ox = obj.x, oy = obj.y;
          el.style.zIndex = 99; el.style.transition = 'none';
          const onMove = e => {
            obj.x = ox + (e.clientX - sx) / S.zoom;
            obj.y = oy + (e.clientY - sy) / S.zoom;
            el.style.left = obj.x + 'px'; el.style.top = obj.y + 'px';
            redrawConnectors();
          };
          const onUp = () => {
            el.style.zIndex = ''; el.style.transition = '';
            // resolve overlaps only for idea dragging
            if (el.classList.contains('idea')) resolveOverlaps();
            save();
            document.removeEventListener('mousemove', onMove);
            document.removeEventListener('mouseup', onUp);
          };
          document.addEventListener('mousemove', onMove);
          document.addEventListener('mouseup', onUp);
        });
      }

      // ─── OVERLAP RESOLUTION ───────────────────────────────────────────────
      // Larger ID always yields to smaller ID (goes below). No anchor — ID is the authority.
      function resolveOverlaps() {
        const PAD = 12;
        const items = Object.values(S.ideas)
          .filter(o => {
            const el = document.getElementById(`idea-${o.id}`);
            return el && el.style.display !== 'none';
          })
          .map(o => {
            const el = document.getElementById(`idea-${o.id}`);
            return { obj: o, w: el.offsetWidth || 160, h: el.offsetHeight || 80 };
          });

        if (items.length < 2) return;

        // Stable sort: smaller IDs come first (they are the "fixed" anchor for larger IDs)
        items.sort((a, b) => a.obj.id - b.obj.id);

        let changed = true, iter = 0;
        while (changed && iter++ < 60) {
          changed = false;
          for (let i = 0; i < items.length; i++) {
            for (let j = i + 1; j < items.length; j++) {
              const A = items[i], B = items[j]; // A.id < B.id (sorted)
              const overX = A.obj.x < B.obj.x + B.w + PAD && A.obj.x + A.w + PAD > B.obj.x;
              const overY = A.obj.y < B.obj.y + B.h + PAD && A.obj.y + A.h + PAD > B.obj.y;
              if (overX && overY) {
                // B has larger ID → push B below A
                B.obj.y = A.obj.y + A.h + PAD;
                const el = document.getElementById(`idea-${B.obj.id}`);
                if (el) el.style.top = B.obj.y + 'px';
                changed = true;
              }
            }
          }
        }
        redrawConnectors();
      }

      // ─── PAN / ZOOM ───────────────────────────────────────────────────────
      boardWrap.addEventListener('mousedown', e => {
        if (e.button === 1 || (e.button === 0 && e.altKey)) {
          e.preventDefault();
          S.panning = true;
          S.panOrigin = { x: e.clientX - S.pan.x, y: e.clientY - S.pan.y };
          boardWrap.classList.add('panning');
        }
      });
      document.addEventListener('mousemove', e => {
        if (!S.panning) return;
        S.pan.x = e.clientX - S.panOrigin.x;
        S.pan.y = e.clientY - S.panOrigin.y;
        applyXform(); redrawConnectors();
      });
      document.addEventListener('mouseup', () => {
        if (S.panning) { S.panning = false; boardWrap.classList.remove('panning'); }
      });
      boardWrap.addEventListener('wheel', e => {
        e.preventDefault();
        const dz = e.deltaY > 0 ? .9 : 1.1;
        const nz = Math.max(.25, Math.min(2.5, S.zoom * dz));
        const r = boardWrap.getBoundingClientRect();
        const mx = e.clientX - r.left, my = e.clientY - r.top;
        S.pan.x = mx - (mx - S.pan.x) * (nz / S.zoom);
        S.pan.y = my - (my - S.pan.y) * (nz / S.zoom);
        S.zoom = nz;
        applyXform(); redrawConnectors();
      }, { passive: false });
      boardWrap.addEventListener('click', e => {
        if (e.target === boardWrap || e.target === board || e.target === objLayer || e.target === zonesLayer) clearFocus();
      });

      // ─── KEYBOARD ─────────────────────────────────────────────────────────
      document.addEventListener('keydown', e => {
        // Global view shortcuts: Ctrl+1/2/3 from any view
        if (e.ctrlKey && !e.shiftKey && !e.altKey && (e.key === '1' || e.key === '2' || e.key === '3')) {
          const ae = document.activeElement;
          const inInput = ae && (ae.tagName === 'INPUT' || ae.tagName === 'TEXTAREA');
          if (!inInput) {
            e.preventDefault();
            if (e.key === '1') switchView('board');
            else if (e.key === '2') switchView('note');
            else if (e.key === '3') switchView('graph');
            return;
          }
        }
        // Note view: native input behavior, Escape returns to board
        if (S.view !== 'board') {
          if (e.key === 'Escape') {
            const ae = document.activeElement;
            if (ae && (ae.id === 'note-ta' || ae.id === 'note-search')) { ae.blur(); return; }
            switchView('board');
            return;
          }
          // Note view shortcuts
          if (S.view === 'note') {
            const ae = document.activeElement;
            const inTA = ae && ae.id === 'note-ta';
            const inSearch = ae && ae.id === 'note-search';
            const inInput = inTA || inSearch;
            // Ctrl+P: toggle preview from anywhere
            if (e.ctrlKey && e.key === 'p') { e.preventDefault(); toggleNotePreview(); return; }
            // Layout-independent bracket detection ([/{ = left, ]/} = right)
            const brL = e.key === '[' || e.key === '{';
            const brR = e.key === ']' || e.key === '}';
            // Shift+[ ]: manual reorder
            if (!inInput && e.shiftKey && (brL || brR)) {
              e.preventDefault();
              if (S.noteSort !== 'manual') {
                S.noteOrder = getSortedNoteItems('').map(o => o.id);
                S.noteSort = 'manual';
              }
              const cur = S.noteOrder.indexOf(S.activeNote);
              if (cur >= 0) {
                const nxt = brL ? cur - 1 : cur + 1;
                if (nxt >= 0 && nxt < S.noteOrder.length) {
                  [S.noteOrder[cur], S.noteOrder[nxt]] = [S.noteOrder[nxt], S.noteOrder[cur]];
                  save(); renderNoteList('');
                }
              }
              return;
            }
            // Navigation: Alt+↑↓ or [ ] outside input
            let step = 0;
            if ((e.altKey && e.key === 'ArrowUp') || (!inInput && !e.shiftKey && brL)) step = -1;
            if ((e.altKey && e.key === 'ArrowDown') || (!inInput && !e.shiftKey && brR)) step = 1;
            if (step !== 0) {
              e.preventDefault();
              const filter = document.getElementById('note-search').value.trim().toLowerCase();
              const sorted = getSortedNoteItems(filter);
              if (!sorted.length) return;
              const cur = sorted.findIndex(o => o.id === S.activeNote);
              const next = sorted[((cur < 0 ? 0 : cur) + step + sorted.length) % sorted.length];
              selectNote(next.id);
              return;
            }
            // Keys outside input
            if (!inInput) {
              if (e.key === 'n') { e.preventDefault(); document.getElementById('note-new').click(); return; }
              if ((e.key === 'Enter' && !e.shiftKey) || e.key === 'e') { e.preventDefault(); enterNoteEdit(); return; }
              if (e.key === 'p') { e.preventDefault(); toggleNotePreview(); return; }
            }
          }
          return;
        }

        if (e.key === 'Tab') {
          e.preventDefault();
          if (S.mode === 'select') {
            setMode('edit');
            if (S.focused?.kind === 'idea') startEdit(S.focused.id);
            else if (S.focused?.kind === 'zone') { setMode('edit'); startZoneEdit(S.focused.id); }
          } else {
            const { kind, id } = S.focused || {};
            setMode('select');
            if (kind === 'idea' && S.ideas[id]) { renderIdea(id); focus('idea', id); }
            if (kind === 'zone') { renderZone(id); focus('zone', id); }
          }
          return;
        }

        if (S.mode === 'edit') return;

        if (e.key === 'Escape') {
          closePalette(); exitConnectMode(); closeHintSelect(); cancelBookBuild(); cancelMoveSelect(); exitLensMode();
          if (S.cmdMode === 'bridge') { S.connectFrom = null; }
          S.cmdBuf = ''; S.cmdMode = null;
          if (S.mode === 'resize') setMode('select');
          updateCmd(); return;
        }

        // ── Resize mode (zone) ──
        if (S.mode === 'resize') {
          const z = S.zones.find(z => z.id === S.resizeZoneId);
          const el = z && document.getElementById(`zone-${z.id}`);
          if (z && el) {
            const step = e.shiftKey ? 50 : 20;
            if (e.key === 'ArrowRight') { e.preventDefault(); z.w = Math.max(80, z.w + step); el.style.width = z.w + 'px'; save(); }
            if (e.key === 'ArrowLeft') { e.preventDefault(); z.w = Math.max(80, z.w - step); el.style.width = z.w + 'px'; save(); }
            if (e.key === 'ArrowDown') { e.preventDefault(); z.h = Math.max(60, z.h + step); el.style.height = z.h + 'px'; save(); }
            if (e.key === 'ArrowUp') { e.preventDefault(); z.h = Math.max(60, z.h - step); el.style.height = z.h + 'px'; save(); }
            if (e.key === 'Enter' || e.key === 'r') { e.preventDefault(); setMode('select'); focus('zone', S.resizeZoneId); }
          }
          return;
        }

        // ── Command modes ──
        if (S.cmdMode === 'palette') { handlePaletteKey(e.key); return; }
        if (S.cmdMode === 'hint') { handleHintKey(e); return; }
        if (S.cmdMode === 'c') { handleConnectKey(e); return; }

        if (S.cmdMode === 'move') {
          if (e.key === 'Escape') { cancelMoveSelect(); return; }
          if (e.key === 'Enter') { e.preventDefault(); finalizeMoveSelect(); return; }
          if (e.key === 'f' || e.key === 'm') { e.preventDefault(); openHintSelect(false, false, true); return; }
          if (['ArrowLeft', 'ArrowRight', 'ArrowUp', 'ArrowDown'].includes(e.key)) {
            e.preventDefault();
            const step = e.shiftKey ? 50 : 20;
            moveMoveSelection(e.key, step);
            return;
          }
          return;
        }

        if (S.cmdMode === 'book') {
          if (e.key === 'Escape') { cancelBookBuild(); return; }
          if (e.key === 'Enter') {
            e.preventDefault();
            if (S.bookSelection.length > 0) {
              const sel = [...S.bookSelection];
              cancelBookBuild();
              createBook(sel);
            } else { cancelBookBuild(); }
            return;
          }
          if (e.key === 'f') { e.preventDefault(); openHintSelect(false, true); return; }
          return;
        }
        if (S.cmdMode === 'bridge') {
          if (e.key === 'Escape') { S.connectFrom = null; S.cmdMode = null; S.cmdBuf = ''; updateCmd(); return; }
          if (e.key === 'f') { e.preventDefault(); openHintSelect(false, false, false, true); return; }
          return;
        }

        if (S.cmdMode === 'v') {
          if (e.key === 'Escape') { S.cmdBuf = ''; S.cmdMode = null; updateCmd(); return; }
          if (e.key === 'Enter') { fitAll(); S.cmdBuf = ''; S.cmdMode = null; updateCmd(); return; }
          if (/^[1-9]$/.test(e.key)) { zoomToSection(+e.key); S.cmdBuf = ''; S.cmdMode = null; updateCmd(); return; }
          return;
        }

        // ── Lens depth shortcut (1-3 while in lens mode) ──
        if (S.lensMode && /^[123]$/.test(e.key)) {
          e.preventDefault();
          S.lensDepth = +e.key;
          applyLens(); updateCmd(); return;
        }

        // ── Arrow key movement of selected object ──
        if (['ArrowLeft', 'ArrowRight', 'ArrowUp', 'ArrowDown'].includes(e.key)) {
          e.preventDefault();
          if (e.shiftKey && S.focused) {
            // Move object with Shift+Arrow
            moveObjByKey(e.key);
          } else {
            navigateFocus(e.key);
          }
          return;
        }

        // ── Single-key commands ──
        switch (e.key) {
          case 'i': e.preventDefault(); createIdea(); break;
          case 'z': e.preventDefault(); createZone(); break;
          case 'b':
            e.preventDefault();
            S.cmdMode = 'book'; S.bookSelection = [];
            toast('ブック作成: f でアイデアを選択  Enter で確定  Esc でキャンセル');
            openHintSelect(false, true);
            break;
          case 'c':
            e.preventDefault();
            startConnectMode();
            break;
          case 'f':
            e.preventDefault();
            openHintSelect();
            break;
          case 'v':
            e.preventDefault();
            S.cmdMode = 'v'; S.cmdBuf = 'v'; updateCmd();
            toast('ビュー: Enter=全体表示  1〜9=テンキー配置でズーム');
            break;
          case 'm':
            e.preventDefault();
            S.cmdMode = 'move'; S.moveSelection = [];
            toast('移動: f でオブジェクトを選択  矢印で移動  Shift+矢印で大きく移動  Enter:確定  Esc:終了');
            openHintSelect(false, false, true);
            break;
          case 'u':
            e.preventDefault();
            unbookOrDetach();
            break;
          case 'p': e.preventDefault(); openPalette(); break;
          case 'n':
            e.preventDefault();
            if (S.focused?.kind === 'idea') openNote(S.focused.id);
            else openNote(null);
            break;
          case 'l':
            e.preventDefault();
            if (S.lensMode) exitLensMode(); else enterLensMode();
            break;
          case 'g':
            e.preventDefault();
            if (!S.focused) { toast('先に接続元を選択してください'); break; }
            S.connectFrom = { ...S.focused };
            S.cmdMode = 'bridge'; S.cmdBuf = 'g';
            openHintSelect(false, false, false, true);
            break;
          case 's':
            e.preventDefault();
            autoLayout();
            break;
          case 'r':
            e.preventDefault();
            if (S.focused?.kind === 'zone') {
              S.resizeZoneId = S.focused.id;
              const el = getEl('zone', S.focused.id);
              if (el) {
                el.classList.add('resize-mode');
                el.style.borderColor = COLOR_HEX.amber;
                el.style.boxShadow = `0 0 0 1px ${COLOR_HEX.amber}, 0 0 20px rgba(245,158,11,.2)`;
              }
              setMode('resize');
              toast('リサイズモード: ↑↓←→ でサイズ変更 / Enter で確定');
            }
            break;
          case 'Enter':
            if (S.focused?.kind === 'idea') { setMode('edit'); startEdit(S.focused.id); }
            if (S.focused?.kind === 'zone') { setMode('edit'); startZoneEdit(S.focused.id); }
            if (S.focused?.kind === 'book') { toggleBook(S.focused.id); }
            break;
          case 'x': case 'Delete': e.preventDefault(); deleteSelected(); break;
        }
      });

      function toggleBook(id) {
