<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>IDEA BOARD</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    /* ─── THEME ─── */
    :root {
      --bg: #0a0a0f;
      --board-dot: rgba(255,255,255,0.055);
      --surface: #111118;
      --card: #16161f;
      --card-border: #252530;
      --text: #ededf0;
      --muted: #8888a0;
      --dim: #55556a;
      --header-bg: #111118;
      --header-border: #1e1e2a;
      --cmd-bg: #111118;
      --palette-bg: #1a1a24;
      --toast-bg: #1a1a24;
      --toast-border: #2a2a38;
      --accent: #6366f1;
      --purple: #a78bfa;
      --cyan:   #22d3ee;
      --green:  #34d399;
      --amber:  #fbbf24;
      --pink:   #f472b6;
      --selection: rgba(99,102,241,0.14);
    }

    body.light {
      --bg: #f4f4f8;
      --board-dot: rgba(0,0,0,0.07);
      --surface: #ffffff;
      --card: #ffffff;
      --card-border: #e2e2ec;
      --text: #111118;
      --muted: #5c5c78;
      --dim: #9090a8;
      --header-bg: #ffffff;
      --header-border: #e2e2ec;
      --cmd-bg: #ffffff;
      --palette-bg: #f9f9fc;
      --toast-bg: #ffffff;
      --toast-border: #e2e2ec;
      --accent: #6366f1;
      --purple: #7c3aed;
      --cyan:   #0891b2;
      --green:  #059669;
      --amber:  #d97706;
      --pink:   #db2777;
      --selection: rgba(99,102,241,0.1);
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans JP", Helvetica, Arial, sans-serif;
      height: 100vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      user-select: none;
    }

    /* ─── HEADER ─── */
    #header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 0 14px;
      height: 44px;
      background: var(--header-bg);
      border-bottom: 1px solid var(--header-border);
      flex-shrink: 0;
      z-index: 100;
    }

    #app-name {
      font-size: 11px;
      font-weight: 700;
      color: var(--dim);
      letter-spacing: 1.2px;
      flex-shrink: 0;
      text-transform: uppercase;
      user-select: none;
    }

    #header-sep {
      width: 1px;
      height: 18px;
      background: var(--header-border);
      flex-shrink: 0;
    }

    #mode-badge {
      display: flex;
      align-items: center;
      gap: 5px;
      padding: 4px 10px;
      border-radius: 6px;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: .5px;
      transition: all 0.15s;
      flex-shrink: 0;
    }

    #mode-badge.select { background: rgba(99,102,241,.12); border: 1px solid rgba(99,102,241,.3); color: var(--accent); }
    #mode-badge.edit   { background: rgba(52,211,153,.12); border: 1px solid rgba(52,211,153,.3); color: var(--green); }
    #mode-badge.resize { background: rgba(34,211,238,.12); border: 1px solid rgba(34,211,238,.3); color: var(--cyan); }

    #mode-dot {
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: currentColor;
      animation: pulse 2.5s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: .35; transform: scale(.65); }
    }

    #zoom-display {
      font-size: 11px;
      color: var(--dim);
      font-family: 'SFMono-Regular', Consolas, monospace;
      min-width: 42px;
      text-align: center;
      flex-shrink: 0;
      cursor: pointer;
    }

    #zoom-display:hover { color: var(--muted); }

    .hints { display: flex; gap: 3px; flex-wrap: nowrap; overflow: hidden; }
    .hint { display: flex; align-items: center; gap: 3px; font-size: 10px; color: var(--dim); white-space: nowrap; }

    .hk {
      background: rgba(255,255,255,.05);
      border: 1px solid rgba(255,255,255,.1);
      border-bottom: 1px solid rgba(255,255,255,.2);
      border-radius: 4px;
      padding: 0 5px;
      font-size: 9.5px;
      font-family: 'SFMono-Regular', Consolas, monospace;
      color: var(--dim);
      line-height: 17px;
    }
    body.light .hk {
      background: rgba(0,0,0,.04);
      border-color: rgba(0,0,0,.12);
      border-bottom-color: rgba(0,0,0,.2);
    }

    #toolbar { margin-left: auto; display: flex; gap: 6px; align-items: center; }

    .tb-btn {
      background: transparent;
      border: 1px solid var(--card-border);
      border-radius: 6px;
      color: var(--muted);
      font-family: inherit;
      font-size: 11px;
      font-weight: 500;
      padding: 4px 11px;
      cursor: pointer;
      transition: all .12s;
      letter-spacing: .2px;
    }

    .tb-btn:hover { background: var(--surface); color: var(--text); border-color: var(--muted); }

    #theme-btn {
      padding: 4px 8px;
      font-size: 13px;
    }

    /* ─── BOARD ─── */
    #board-wrap {
      flex: 1;
      overflow: hidden;
      position: relative;
      cursor: default;
    }

    #board-wrap.panning { cursor: grabbing !important; }

    #board-wrap::before {
      content: '';
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      background-image: radial-gradient(circle, var(--board-dot) 1.2px, transparent 1.2px);
      background-size: var(--grid-size, 24px) var(--grid-size, 24px);
      background-position: var(--grid-ox, 0px) var(--grid-oy, 0px);
    }

    #board {
      position: absolute;
      width: 8000px;
      height: 8000px;
      top: 0;
      left: 0;
      transform-origin: 0 0;
      cursor: grab;
    }

    .idea, .zone { cursor: default; }

    #zones-layer {
      position: absolute;
      inset: 0;
      z-index: 1;
    }

    #objects-layer {
      position: absolute;
      inset: 0;
      z-index: 3;
    }

    /* SVG overlay is a sibling of #board — NOT inside it */
    #svg-overlay {
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 4;
      overflow: visible;
    }

    /* ─── IDEA ─── */
    .idea {
      position: absolute;
      min-width: 192px;
      max-width: 288px;
      padding: 12px 14px 13px 18px;
      background: var(--card);
      border-radius: 10px;
      border: 1px solid var(--card-border);
      cursor: default;
      box-shadow: 0 1px 3px rgba(0,0,0,.5), 0 4px 12px rgba(0,0,0,.3);
      overflow: hidden;
      transition: box-shadow .1s, border-color .1s;
      will-change: transform;
    }
    .idea::before {
      content: '';
      position: absolute; left:0; top:0; bottom:0; width:3px;
      background: var(--idea-accent, var(--purple));
      border-radius: 10px 0 0 10px;
    }
    .idea:hover {
      border-color: var(--idea-accent, var(--purple));
      box-shadow: 0 2px 8px rgba(0,0,0,.6), 0 0 0 1px var(--idea-accent, var(--purple));
    }
    .idea.focused {
      border-color: var(--idea-accent, var(--purple));
      box-shadow: 0 4px 20px rgba(0,0,0,.6), 0 0 0 2px var(--idea-accent, var(--purple));
    }

    .idea-body {
      font-size: 13px;
      color: var(--text);
      line-height: 1.6;
      word-break: break-word;
      white-space: pre-wrap;
      min-height: 18px;
    }

    .idea-body.empty {
      color: var(--dim);
      font-style: italic;
    }

    .idea-ta {
      background: transparent;
      border: none;
      outline: none;
      font-family: 'SFMono-Regular', Consolas, 'Liberation Mono', Menlo, monospace;
      font-size: 12px;
      color: var(--text);
      line-height: 1.6;
      resize: none;
      width: 100%;
      min-height: 50px;
      caret-color: var(--green);
    }

    @keyframes springIn {
      0% {
        transform: scale(.45) translateY(12px);
        opacity: 0
      }

      65% {
        transform: scale(1.04) translateY(-2px);
        opacity: 1
      }

      100% {
        transform: scale(1) translateY(0);
        opacity: 1
      }
    }

    .spring-in {
      animation: springIn .32s cubic-bezier(.34, 1.56, .64, 1) forwards;
    }

    @keyframes fadeOut {
      to {
        transform: scale(.7);
        opacity: 0
      }
    }

    .fade-out {
      animation: fadeOut .18s ease forwards;
    }

    /* ─── ZONE ─── */
    .zone {
      position: absolute;
      border: 1.5px solid var(--zone-border-col, rgba(255,255,255,.14));
      border-radius: 10px;
      background: var(--zone-fill, rgba(255,255,255,.025));
      cursor: default;
      transition: border-color .15s, box-shadow .15s, background .15s;
    }
    .zone:hover {
      border-color: var(--zone-accent-col, rgba(255,255,255,.22));
    }
    .zone.focused {
      border-color: var(--zone-accent-col, var(--accent));
      box-shadow: 0 0 0 1px var(--zone-accent-col, var(--accent)), 0 4px 24px rgba(0,0,0,.2);
    }
    .zone.resize-mode {
      border-color: var(--amber);
      box-shadow: 0 0 0 1px var(--amber);
    }
    .zone-header {
      position: absolute;
      top: -12px; left: 12px;
    }
    .zone-lbl {
      display: inline-block;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: .5px;
      text-transform: uppercase;
      padding: 1px 7px;
      border-radius: 4px;
      white-space: nowrap;
      border: 1px solid var(--zone-border-col, rgba(255,255,255,.2));
      background: var(--bg);
    }
    .zone-lbl-input {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: .5px;
      text-transform: uppercase;
      background: var(--bg);
      border: 1px solid var(--zone-accent-col, var(--accent));
      border-radius: 4px;
      outline: none;
      font-family: inherit;
      color: var(--text);
      padding: 1px 7px;
      width: 110px;
      caret-color: var(--accent);
    }
    .zone-resize-handle {
      position: absolute;
      bottom: 6px; right: 6px;
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--zone-accent-col, var(--muted));
      opacity: 0.35;
      cursor: nwse-resize;
      pointer-events: all;
      transition: opacity .15s, transform .15s;
    }
    .zone:hover .zone-resize-handle { opacity: 0.65; transform: scale(1.2); }
    .zone.focused .zone-resize-handle { opacity: 0.9; transform: scale(1.3); }

    /* ─── CONNECTOR ─── */
    .conn-path {
      stroke-dasharray: 2000;
      stroke-dashoffset: 2000;
      animation: drawConn .45s ease forwards;
    }

    @keyframes drawConn {
      to {
        stroke-dashoffset: 0
      }
    }

    /* ─── CMD LINE ─── */
    #cmdline {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 0 16px;
      background: var(--cmd-bg);
      border-top: 1px solid var(--header-border);
      flex-shrink: 0;
      font-size: 11px;
      height: 28px;
      font-family: 'SFMono-Regular', Consolas, monospace;
      box-shadow: 0 -1px 4px rgba(0,0,0,.15);
    }

    #cmd-prompt {
      color: var(--purple);
      font-weight: 700;
      opacity: .7;
    }

    #cmd-buf {
      color: var(--text);
    }

    #cmd-cur {
      display: inline-block;
      width: 2px;
      height: 14px;
      background: var(--green);
      vertical-align: middle;
      margin-left: 1px;
      border-radius: 1px;
      animation: blink 1.1s ease-in-out infinite;
    }

    @keyframes blink {
      0%, 100% { opacity: 1 }
      50% { opacity: 0 }
    }

    #cmd-stat {
      margin-left: auto;
      font-size: 11px;
      color: var(--dim);
    }

    /* ─── MINIMAP ─── */
    #minimap {
      position: fixed;
      bottom: 40px;
      right: 16px;
      width: 176px;
      height: 116px;
      background: var(--header-bg);
      border: 1px solid var(--card-border);
      border-radius: 8px;
      overflow: hidden;
      z-index: 200;
      cursor: crosshair;
      box-shadow: 0 4px 20px rgba(0,0,0,.5);
      opacity: 0.85;
      transition: opacity .15s;
    }
    #minimap:hover { opacity: 1; }
    #minimap canvas { display: block; width: 100%; height: 100%; image-rendering: pixelated; }
    #minimap-viewport {
      position: absolute;
      border: 1.5px solid var(--accent);
      border-radius: 2px;
      pointer-events: none;
      opacity: 0.7;
    }

    /* ─── PALETTE ─── */
    #palette {
      position: fixed;
      bottom: 44px;
      left: 50%;
      transform: translateX(-50%) translateY(8px);
      background: var(--palette-bg);
      border: 1px solid var(--card-border);
      border-radius: 14px;
      padding: 12px 14px;
      display: none;
      z-index: 500;
      box-shadow: 0 8px 40px rgba(0,0,0,.55);
      opacity: 0;
      transition: opacity .15s, transform .15s;
    }
    #palette.show {
      display: block;
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }
    .pal-grid {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 6px;
    }
    .psw {
      width: 26px;
      height: 26px;
      border-radius: 6px;
      cursor: pointer;
      border: 1.5px solid transparent;
      transition: transform .1s, border-color .1s, box-shadow .1s;
      position: relative;
      box-shadow: 0 1px 4px rgba(0,0,0,.3);
    }
    .psw:hover {
      transform: scale(1.15);
      border-color: rgba(255,255,255,.9);
      box-shadow: 0 2px 10px rgba(0,0,0,.5);
    }
    .psw-k {
      position: absolute;
      top: -1px; right: -1px;
      font-size: 7px;
      font-weight: 700;
      font-family: 'SFMono-Regular', Consolas, monospace;
      background: rgba(0,0,0,.7);
      color: #fff;
      width: 11px; height: 11px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      line-height: 1;
      letter-spacing: 0;
      pointer-events: none;
    }

    /* ─── MOVE OVERLAY ─── */
    #rubber-band {
      position: absolute;
      border: 1px solid var(--accent);
      background: var(--selection);
      border-radius: 2px;
      pointer-events: none;
      display: none;
      z-index: 50;
    }

    #move-overlay {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 300;
      display: none;
    }

    #move-overlay.show {
      display: block;
    }

    .move-grid-cell {
      position: absolute;
      border: 1px solid rgba(123, 108, 246, .2);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      font-weight: 700;
      color: rgba(123, 108, 246, .3);
      pointer-events: none;
    }

    .move-grid-cell.active {
      background: rgba(123, 108, 246, .12);
      color: rgba(123, 108, 246, .7);
      border-color: rgba(123, 108, 246, .5);
    }

    /* ─── HINT LABELS (Vimium-style) ─── */
    .hint-label {
      position: fixed;
      transform: translate(-50%, -50%);
      background: #f59e0b;
      color: #000;
      font-size: 11px;
      font-weight: 800;
      padding: 2px 5px;
      border-radius: 3px;
      z-index: 600;
      pointer-events: none;
      letter-spacing: 1px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, .45);
    }

    .hint-label.faded {
      opacity: .35;
    }

    /* ─── MOVE SELECTION ─── */
    .move-selected {
      outline: 2px solid var(--purple);
      outline-offset: 3px;
    }

    /* ─── FOCUS LENS ─── */
    .lens-dim {
      opacity: 0.06 !important;
      filter: grayscale(1) !important;
      transition: opacity 0.3s, filter 0.3s;
      pointer-events: none !important;
    }

    /* ─── CONNECT SOURCE ─── */
    .connect-source {
      animation: connectPulse .9s ease-in-out infinite;
    }

    @keyframes connectPulse {

      0%,
      100% {
        opacity: 1
      }

      50% {
        opacity: .45
      }
    }

    /* ─── VIEW SWITCH ─── */
    /* ビュー切り替えボタングループ（全ビュー共通） */




    /* ─── IDEA CARD CONTENT ─── */
    .idea-title {
      font-size: 12.5px;
      font-weight: 600;
      color: var(--text);
      line-height: 1.45;
      word-break: break-word;
      margin-bottom: 4px;
      letter-spacing: .01em;
    }
    .idea-snip {
      font-size: 11px;
      color: var(--muted);
      line-height: 1.65;
      word-break: break-word;
      display: -webkit-box;
      -webkit-line-clamp: 5;
      -webkit-box-orient: vertical;
      overflow: hidden;
      white-space: pre-wrap;
    }
    .idea-empty {
      font-size: 11.5px;
      color: var(--dim);
      font-style: italic;
    }

























    .wla-item {
      padding: 7px 12px;
      font-size: 12px;
      color: var(--muted);
      cursor: pointer;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      transition: background .1s, color .1s;
    }

    .wla-item:hover,
    .wla-item.sel {
      background: var(--card);
      color: var(--text);
    }

    .wla-item.create {
      color: var(--cyan);
      font-style: italic;
    }






















    #ep-search {
      flex: 1;
      background: var(--card);
      border: 1px solid var(--card-border);
      border-radius: 6px;
      color: var(--text);
      font-family: inherit;
      font-size: 12px;
      padding: 5px 10px;
      outline: none;
    }
    #ep-search:focus { border-color: var(--accent); }

    /* ─── MARKDOWN CHEATSHEET (right pane) ─── */













    /* ─── GRAPH VIEW ─── */










    .gedge {
      pointer-events: none;
    }

    .gedge.dim {
      opacity: .06;
      transition: opacity .2s;
    }


    /* ─── TOAST ─── */
    .toast {
      position: fixed;
      bottom: 48px;
      left: 50%;
      transform: translateX(-50%) translateY(4px);
      background: var(--toast-bg);
      border: 1px solid var(--toast-border);
      color: var(--text);
      font-size: 12px;
      padding: 7px 16px;
      border-radius: 8px;
      pointer-events: none;
      z-index: 9999;
      box-shadow: 0 4px 16px rgba(0,0,0,.4);
      white-space: nowrap;
      animation: toastIn .18s ease forwards, toastOut .2s ease 6.7s forwards;
    }

    @keyframes toastIn {
      from {
        transform: translateX(-50%) translateY(8px);
        opacity: 0
      }

      to {
        transform: translateX(-50%) translateY(0);
        opacity: 1
      }
    }

    @keyframes toastOut {
      from {
        opacity: 1
      }

      to {
        opacity: 0
      }
    }
  </style>
</head>

<body>

  <div id="header">
    <span id="app-name">✦ IDEA BOARD</span>
    <div id="header-sep"></div>
    <div id="mode-badge" class="select">
      <div id="mode-dot"></div>
      <span id="mode-txt">SELECT</span>
    </div>
    <span id="zoom-display">100%</span>
    <div id="header-sep" style="margin-left:2px"></div>
    <div class="hints">
      <div class="hint"><span class="hk">i</span>idea</div>
      <div class="hint"><span class="hk">f</span>focus</div>
      <div class="hint"><span class="hk">c</span>connect</div>
      <div class="hint"><span class="hk">z</span>zone</div>
      <div class="hint"><span class="hk">p</span>color</div>
      <div class="hint"><span class="hk">l</span>lens</div>
      <div class="hint"><span class="hk">s</span>sort</div>
      <div class="hint"><span class="hk">^Z</span>undo</div>
      <div class="hint"><span class="hk">x</span>del</div>
    </div>
    <div id="toolbar">
      <button class="tb-btn" id="theme-btn" title="テーマ切替">◑</button>
      <button class="tb-btn" onclick="App.exportJSON()">JSON</button>
      <button class="tb-btn" id="json-import-btn">読込</button>
      <input type="file" id="json-import-input" accept=".json" style="display:none">
    </div>
  </div>



  <div id="board-wrap">
    <div id="board">
      <div id="zones-layer"></div>
      <div id="objects-layer"></div>
    </div>
    <!-- SVG overlay: sibling of #board, in screen space -->
    <svg id="svg-overlay" xmlns="http://www.w3.org/2000/svg">
      <defs id="svg-defs"></defs>
    </svg>
    <!-- rubber band selection rect, in screen space -->
    <div id="rubber-band"></div>
  </div>

  <!-- move grid overlay -->
  <div id="move-overlay"></div>

  <!-- minimap -->
  <div id="minimap">
    <canvas id="minimap-canvas" width="360" height="240"></canvas>
    <div id="minimap-viewport"></div>
  </div>

  <div id="palette">
    <div class="pal-grid">
      <div class="psw" data-c="purple" style="background:#a78bfa"><span class="psw-k">1</span></div>
      <div class="psw" data-c="blue"   style="background:#60a5fa"><span class="psw-k">2</span></div>
      <div class="psw" data-c="cyan"   style="background:#22d3ee"><span class="psw-k">3</span></div>
      <div class="psw" data-c="teal"   style="background:#2dd4bf"><span class="psw-k">4</span></div>
      <div class="psw" data-c="green"  style="background:#34d399"><span class="psw-k">5</span></div>
      <div class="psw" data-c="lime"   style="background:#a3e635"><span class="psw-k">6</span></div>
      <div class="psw" data-c="yellow" style="background:#facc15"><span class="psw-k">7</span></div>
      <div class="psw" data-c="amber"  style="background:#fb923c"><span class="psw-k">8</span></div>
      <div class="psw" data-c="orange" style="background:#f97316"><span class="psw-k">9</span></div>
      <div class="psw" data-c="red"    style="background:#f87171"><span class="psw-k">0</span></div>
      <div class="psw" data-c="rose"   style="background:#fb7185"><span class="psw-k">q</span></div>
      <div class="psw" data-c="pink"   style="background:#f472b6"><span class="psw-k">w</span></div>
      <div class="psw" data-c="violet" style="background:#c084fc"><span class="psw-k">e</span></div>
      <div class="psw" data-c="indigo" style="background:#818cf8"><span class="psw-k">r</span></div>
      <div class="psw" data-c="slate"  style="background:#94a3b8"><span class="psw-k">t</span></div>
    </div>
  </div>

  <div id="cmdline">
    <span id="cmd-prompt">›</span>
    <span id="cmd-buf"></span><span id="cmd-cur"></span>
    <span id="cmd-stat">0 ideas</span>
  </div>

  <script>
    const App = (() => {
      // ─── CONSTANTS ────────────────────────────────────────────────────────
      const COLOR_HEX = {
        purple:  '#a78bfa',
        blue:    '#60a5fa',
        cyan:    '#22d3ee',
        teal:    '#2dd4bf',
        green:   '#34d399',
        lime:    '#a3e635',
        yellow:  '#facc15',
        amber:   '#fb923c',
        orange:  '#f97316',
        red:     '#f87171',
        rose:    '#fb7185',
        pink:    '#f472b6',
        violet:  '#c084fc',
        indigo:  '#818cf8',
        slate:   '#94a3b8',
      };
      const COLOR_KEYS = {
        '1':'purple','2':'blue','3':'cyan','4':'teal','5':'green',
        '6':'lime','7':'yellow','8':'amber','9':'orange','0':'red',
        'q':'rose','w':'pink','e':'violet','r':'indigo','t':'slate',
      };
      // Grid: digit → [col, row] (0-indexed from top-left)
      // Standard numpad layout: 7=TL 8=TC 9=TR / 4=ML 5=MC 6=MR / 1=BL 2=BC 3=BR
      const GRID_POS = { 7: [0, 0], 8: [1, 0], 9: [2, 0], 4: [0, 1], 5: [1, 1], 6: [2, 1], 1: [0, 2], 2: [1, 2], 3: [2, 2] };

      // ─── STATE ────────────────────────────────────────────────────────────
      // アプリ全体のランタイム状態をまとめたオブジェクト。localStorageへの保存・復元もここを対象にする。
      const S = {
        mode: 'select',        // 'select'|'edit'|'resize'
        ideas: {},             // num id → {id,x,y,text,color}
        connectors: [],        // {id,from,to,type:'line'|'arrow'}
        zones: [],             // {id,x,y,w,h,label}  id=`z${N}`
        nextId: 1,
        focused: null,         // {kind:'idea'|'zone', id}
        lastFocused: null,
        pan: { x: 300, y: 200 },
        zoom: 1,
        cmdBuf: '',
        cmdMode: null,         // null|'c'|'palette'|'v'|'hint'
        panning: false,
        panOrigin: null,
        resizeZoneId: null,
        connectFrom: null,     // {kind,id} — source endpoint during connect mode
        hintMap: null,         // hint char → {kind,id}
        hintBuf: '',
        hintReturnToConnect: false,
        hintReturnToMove: false,
        moveSelection: [],     // {kind,id} objects accumulating for move
        lensMode: false,
        lensDepth: 1,
        graphPos: {},          // 'kind:id' → {x,y}
        theme: 'dark',
      };

      // ─── HISTORY ──────────────────────────────────────────────────────────
      const MAX_HISTORY = 50;
      let historyStack = [];
      function pushHistory() {
        historyStack.push(JSON.stringify({ ideas: S.ideas, connectors: S.connectors, zones: S.zones, nextId: S.nextId }));
        if (historyStack.length > MAX_HISTORY) historyStack.shift();
      }
      function undo() {
        if (!historyStack.length) { toast('これ以上戻れません'); return; }
        const snap = JSON.parse(historyStack.pop());
        Object.assign(S, snap);
        clearFocus();
        renderAll();
        save();
        toast('元に戻しました');
      }

      // ─── DOM ──────────────────────────────────────────────────────────────
      const boardWrap = document.getElementById('board-wrap');
      const board = document.getElementById('board');
      const zonesLayer = document.getElementById('zones-layer');
      const objLayer = document.getElementById('objects-layer');
      const svgOverlay = document.getElementById('svg-overlay');
      const svgDefs = document.getElementById('svg-defs');
      const modeBadge = document.getElementById('mode-badge');
      const modeTxt = document.getElementById('mode-txt');
      const cmdBufEl = document.getElementById('cmd-buf');
      const cmdStat = document.getElementById('cmd-stat');
      const palette = document.getElementById('palette');
      const moveOverlay = document.getElementById('move-overlay');

      // ─── UTILS ────────────────────────────────────────────────────────────
      // HTMLの特殊文字(&, <, >)をエスケープして安全にinnerHTMLへ挿入できるようにする。XSS対策の要。
      const esc = s => String(s || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');

      // 画面下部に一時メッセージ（トースト通知）を表示し、約7秒後に自動で消す。
      function toast(msg) {
        document.querySelectorAll('.toast').forEach(t => t.remove());
        const t = document.createElement('div');
        t.className = 'toast'; t.textContent = msg;
        document.body.appendChild(t);
        setTimeout(() => t.remove(), 6900);
      }

      // 現在のパン・ズームを考慮して、ビューポート中央のボード座標を少しランダムにずらして返す。
      function centerPos(offX = 0, offY = 0) {
        const r = boardWrap.getBoundingClientRect();
        return {
          x: (r.width / 2 - S.pan.x) / S.zoom - 90 + offX + (Math.random() - .5) * 70,
          y: (r.height / 2 - S.pan.y) / S.zoom - 45 + offY + (Math.random() - .5) * 50
        };
      }

      // Board → screen coordinate conversion
      // ボード座標（絶対px）をスクリーン座標（画面px）に変換する。パン・ズーム済みの実際の位置を返す。
      function b2s(bx, by) {
        return { x: bx * S.zoom + S.pan.x, y: by * S.zoom + S.pan.y };
      }

      // ─── TRANSFORM ────────────────────────────────────────────────────────
      // board要素にパン・ズーム変換を適用し、グリッドドットをズームに追従させる。
      const zoomDisplay = document.getElementById('zoom-display');
      const GRID_BASE = 24;
      function applyXform() {
        board.style.transform = `translate(${S.pan.x}px,${S.pan.y}px) scale(${S.zoom})`;
        const gs = GRID_BASE * S.zoom;
        boardWrap.style.setProperty('--grid-size', gs + 'px');
        boardWrap.style.setProperty('--grid-ox', (S.pan.x % gs) + 'px');
        boardWrap.style.setProperty('--grid-oy', (S.pan.y % gs) + 'px');
        zoomDisplay.textContent = Math.round(S.zoom * 100) + '%';
        redrawConnectors();
        updateMinimap();
      }

      // ─── MINIMAP ──────────────────────────────────────────────────────────
      const minimapCanvas = document.getElementById('minimap-canvas');
      const minimapCtx = minimapCanvas.getContext('2d');
      const minimapVP = document.getElementById('minimap-viewport');
      const minimapEl = document.getElementById('minimap');
      const MM_W = 360, MM_H = 240; // canvas resolution (2x of display)
      const COLOR_HEX_VALUES = Object.values(COLOR_HEX);

      function updateMinimap() {
        const ideas = Object.values(S.ideas).filter(o => {
          const el = document.getElementById(`idea-${o.id}`);
          return el && el.style.display !== 'none';
        });
        if (!ideas.length) {
          minimapCtx.clearRect(0, 0, MM_W, MM_H);
          minimapVP.style.display = 'none';
          return;
        }

        // bounds of all cards
        const xs = ideas.map(o => o.x), ys = ideas.map(o => o.y);
        const bLeft = Math.min(...xs) - 60;
        const bTop = Math.min(...ys) - 60;
        const bRight = Math.max(...ideas.map(o => {
          const el = document.getElementById(`idea-${o.id}`);
          return o.x + (el ? el.offsetWidth : 200);
        })) + 60;
        const bBottom = Math.max(...ideas.map(o => {
          const el = document.getElementById(`idea-${o.id}`);
          return o.y + (el ? el.offsetHeight : 120);
        })) + 60;

        const bW = bRight - bLeft, bH = bBottom - bTop;
        const scale = Math.min(MM_W / bW, MM_H / bH, 0.8);
        // center content in canvas
        const offX = (MM_W - bW * scale) / 2 - bLeft * scale;
        const offY = (MM_H - bH * scale) / 2 - bTop * scale;

        minimapCtx.clearRect(0, 0, MM_W, MM_H);

        // draw zones
        S.zones.forEach(z => {
          const hex = COLOR_HEX[z.color || 'cyan'];
          minimapCtx.fillStyle = hex + '18';
          minimapCtx.strokeStyle = hex + '60';
          minimapCtx.lineWidth = 1;
          const zx = z.x * scale + offX, zy = z.y * scale + offY;
          const zw = z.w * scale, zh = z.h * scale;
          minimapCtx.beginPath();
          minimapCtx.roundRect(zx, zy, zw, zh, 4);
          minimapCtx.fill(); minimapCtx.stroke();
        });

        // draw idea cards
        ideas.forEach(o => {
          const el = document.getElementById(`idea-${o.id}`);
          const w = (el ? el.offsetWidth : 200) * scale;
          const h = (el ? el.offsetHeight : 80) * scale;
          const cx = o.x * scale + offX, cy = o.y * scale + offY;
          const hex = COLOR_HEX[o.color || 'purple'];
          const isFocused = S.focused?.kind === 'idea' && S.focused.id === o.id;
          minimapCtx.fillStyle = isFocused ? hex + '40' : '#16161f';
          minimapCtx.strokeStyle = hex;
          minimapCtx.lineWidth = isFocused ? 2 : 1;
          minimapCtx.beginPath();
          minimapCtx.roundRect(cx, cy, w, h, 2);
          minimapCtx.fill(); minimapCtx.stroke();
          // left accent bar
          minimapCtx.fillStyle = hex;
          minimapCtx.fillRect(cx, cy, Math.max(1.5, 3 * scale), h);
        });

        // viewport indicator
        const wrapR = boardWrap.getBoundingClientRect();
        // viewport in board-space
        const vpLeft = (-S.pan.x) / S.zoom;
        const vpTop = (-S.pan.y) / S.zoom;
        const vpW = wrapR.width / S.zoom;
        const vpH = wrapR.height / S.zoom;
        // convert to minimap display space (display is MM_W/2 × MM_H/2 px)
        const mmDisplayScale = 0.5; // canvas is 2x
        const vx = (vpLeft * scale + offX) * mmDisplayScale;
        const vy = (vpTop * scale + offY) * mmDisplayScale;
        const vw = vpW * scale * mmDisplayScale;
        const vh = vpH * scale * mmDisplayScale;
        minimapVP.style.display = '';
        minimapVP.style.left = vx + 'px'; minimapVP.style.top = vy + 'px';
        minimapVP.style.width = vw + 'px'; minimapVP.style.height = vh + 'px';

        // store for click-to-pan
        minimapEl._mmScale = scale; minimapEl._mmOffX = offX; minimapEl._mmOffY = offY;
      }

      // click minimap → pan board to that position
      minimapEl.addEventListener('click', e => {
        const r = minimapEl.getBoundingClientRect();
        const clickX = (e.clientX - r.left) / r.width * MM_W;
        const clickY = (e.clientY - r.top) / r.height * MM_H;
        const sc = minimapEl._mmScale || 1;
        const ox = minimapEl._mmOffX || 0, oy = minimapEl._mmOffY || 0;
        const boardX = (clickX - ox) / sc;
        const boardY = (clickY - oy) / sc;
        const wrapR = boardWrap.getBoundingClientRect();
        S.pan.x = wrapR.width / 2 - boardX * S.zoom;
        S.pan.y = wrapR.height / 2 - boardY * S.zoom;
        applyXform();
        save();
      });

      // ─── MODE ─────────────────────────────────────────────────────────────
      function setMode(m) {
        S.mode = m;
        modeBadge.className = m;
        modeTxt.textContent = m.toUpperCase();
        if (m === 'select') {
          document.querySelectorAll('.idea-ta,.zone-lbl-input').forEach(t => t.blur());
          closePalette();
          S.resizeZoneId = null;
        }
        updateCmd();
      }

      // ─── FOCUS ────────────────────────────────────────────────────────────
      // アイデアカードの左アクセントバー色とフォーカス状態をCSSカスタムプロパティで制御する。
      function applyIdeaBorder(el, obj, focused) {
        const hex = COLOR_HEX[obj.color || 'purple'];
        el.style.setProperty('--idea-accent', hex);
        el.classList.toggle('focused', focused);
      }

      // ゾーンのアクセントカラーをCSSカスタムプロパティで設定する。
      function applyZoneBorder(el, z, focused) {
        const hex = COLOR_HEX[z.color || 'cyan'];
        el.style.setProperty('--zone-accent-col', hex);
        el.style.setProperty('--zone-border-col', hex + '55');
        el.style.setProperty('--zone-fill', hex + '0d');
        el.classList.toggle('focused', focused);
      }

      function focus(kind, id) {
        clearFocus();
        S.focused = { kind, id };
        S.lastFocused = { kind, id };
        const el = getEl(kind, id);
        if (el) {
          if (kind === 'idea') { const o = S.ideas[id]; if (o) applyIdeaBorder(el, o, true); }
          else if (kind === 'zone') { el.classList.add('focused'); const z = S.zones.find(z => z.id === id); if (z) applyZoneBorder(el, z, true); }
        }
        if (S.lensMode) applyLens();
        updateCmd();
      }
      function clearFocus() {
        document.querySelectorAll('.focused').forEach(el => {
          el.classList.remove('focused');
          if (el.classList.contains('idea')) {
            el.style.transform = '';
          }
        });
        S.focused = null;
        if (S.lensMode) exitLensMode();
        updateCmd();
      }
      function getEl(kind, id) {
        if (kind === 'idea') return document.getElementById(`idea-${id}`);
        if (kind === 'zone') return document.getElementById(`zone-${id}`);
        return null;
      }

      // ─── IDEA ─────────────────────────────────────────────────────────────
      function createIdeaAt(x, y) {
        pushHistory();
        const id = S.nextId++;
        S.ideas[id] = { id, x: snapVal(x), y: snapVal(y), text: '', color: 'purple' };
        renderIdea(id, true);
        focus('idea', id);
        setMode('edit');
        startEdit(id);
        save(); updateStat();
      }

      function createIdea() {
        if (S.focused?.kind === 'idea') {
          // Cascade below focused idea
          const fObj = S.ideas[S.focused.id];
          const fEl = getEl('idea', S.focused.id);
          const h = fEl ? fEl.offsetHeight : 80;
          createIdeaAt(fObj.x, fObj.y + h + 20);
        } else {
          const pos = centerPos();
          createIdeaAt(pos.x, pos.y);
        }
      }

      // アイデアオブジェクトからカード内のHTML（タイトル・スニペット・ウィキリンクバッジ）を生成して返す。
      function ideaCardHTML(obj) {
        const raw = (obj.text || '').trim();
        if (!raw) return `<div class="idea-empty">アイデアを入力...</div>`;
        const lines = raw.split('\n');
        // 1行目: タイトル（markdown見出し記号を除去）
        const titleRaw = (lines.find(l => l.trim()) || '').replace(/^#{1,6}\s*/, '').trim();
        const title = esc(titleRaw || '(無題)');
        // 残り行: 本文プレビュー（空行・タイトル行除く）
        const bodyLines = lines.filter(l => l.trim() && l !== lines.find(x => x.trim())).slice(0, 8);
        const snip = bodyLines.length ? `<div class="idea-snip">${esc(bodyLines.join('\n'))}</div>` : '';
        return `<div class="idea-title">${title}</div>${snip}`;
      }

      function renderIdea(id, animate) {
        const obj = S.ideas[id];
        if (!obj) return;
        let el = document.getElementById(`idea-${id}`);
        const isNew = !el;
        if (isNew) {
          el = document.createElement('div');
          el.id = `idea-${id}`;
          el.className = 'idea';
          objLayer.appendChild(el);
          makeDraggable(el, () => S.ideas[id], o => { });
          el.addEventListener('click', e => {
            e.stopPropagation();
            if (S.mode === 'select') focus('idea', id);
          });
          el.addEventListener('dblclick', e => {
            e.stopPropagation();
            focus('idea', id); setMode('edit'); startEdit(id);
          });
        }
        el.style.left = obj.x + 'px';
        el.style.top = obj.y + 'px';
        const isFocused = S.focused?.kind === 'idea' && S.focused.id === id;
        applyIdeaBorder(el, obj, isFocused);
        el.innerHTML = ideaCardHTML(obj);
        if (animate) { el.classList.add('spring-in'); setTimeout(() => el.classList.remove('spring-in'), 400); }
      }

      function startEdit(id) {
        const obj = S.ideas[id];
        if (!obj) return;
        const el = document.getElementById(`idea-${id}`);
        if (!el) return;
        el.innerHTML = `
      <textarea class="idea-ta" placeholder="アイデアを入力...">${esc(obj.text || '')}</textarea>`;
        const ta = el.querySelector('textarea');
        ta.focus();
        ta.setSelectionRange(ta.value.length, ta.value.length);
        ta.addEventListener('input', () => { obj.text = ta.value; save(); });
        ta.addEventListener('blur', () => {
          pushHistory();
          obj.text = ta.value;
          setMode('select'); renderIdea(id); focus('idea', id);
        });
        ta.addEventListener('keydown', e => {
          // Esc or Tab → commit and stop
          if (e.key === 'Escape' || (e.key === 'Tab' && !e.shiftKey)) {
            e.preventDefault(); e.stopPropagation();
            obj.text = ta.value;
            setMode('select'); renderIdea(id); focus('idea', id);
            requestAnimationFrame(() => resolveOverlaps());
            return;
          }
          // Enter (no shift) → commit and immediately create next idea below
          if (e.key === 'Enter' && !e.shiftKey) {
            e.preventDefault(); e.stopPropagation();
            obj.text = ta.value;
            setMode('select'); renderIdea(id); focus('idea', id);
            requestAnimationFrame(() => {
              resolveOverlaps();
              const curEl = document.getElementById(`idea-${id}`);
              const h = curEl ? curEl.offsetHeight : 80;
              createIdeaAt(obj.x, obj.y + h + 20);
            });
            return;
          }
          // Shift+Enter → default textarea newline (no intercept)
        });
      }

      // ─── ZONE ─────────────────────────────────────────────────────────────
      function createZone() {
        pushHistory();
        const pos = centerPos();
        const id = `z${S.nextId++}`;
        S.zones.push({ id, x: pos.x - 100, y: pos.y - 75, w: 280, h: 190, label: 'ZONE' });
        renderZone(id, true);
        focus('zone', id);
        save(); updateStat();
        toast('ゾーン生成 — Enter:ラベル編集  r:リサイズモード  Shift+↑↓←→:サイズ変更');
      }

      function renderZone(id, animate) {
        const z = S.zones.find(z => z.id === id);
        if (!z) return;
        let el = document.getElementById(`zone-${id}`);
        const isNew = !el;
        if (isNew) {
          el = document.createElement('div');
          el.id = `zone-${id}`;
          el.className = 'zone';
          zonesLayer.appendChild(el);
          makeDraggable(el, () => z, o => { }, '.zone-resize-handle');
          el.addEventListener('click', e => {
            e.stopPropagation();
            if (S.mode === 'select') focus('zone', id);
          });
          // Resize handle — event delegation on zone so innerHTML refresh doesn't break it
          el.addEventListener('mousedown', e => {
            if (!e.target.closest('.zone-resize-handle')) return;
            e.stopPropagation(); e.preventDefault();
            const sx = e.clientX, sy = e.clientY, sw = z.w, sh = z.h;
            const onMove = ev => {
              z.w = Math.max(120, sw + (ev.clientX - sx) / S.zoom);
              z.h = Math.max(80, sh + (ev.clientY - sy) / S.zoom);
              el.style.width = z.w + 'px'; el.style.height = z.h + 'px';
              updateMinimap();
            };
            const onUp = () => { save(); document.removeEventListener('mousemove', onMove); document.removeEventListener('mouseup', onUp); };
            document.addEventListener('mousemove', onMove);
            document.addEventListener('mouseup', onUp);
          });
        }
        const zhex = COLOR_HEX[z.color || 'cyan'];
        el.style.left = z.x + 'px'; el.style.top = z.y + 'px';
        el.style.width = z.w + 'px'; el.style.height = z.h + 'px';
        const isFocusedZ = S.focused?.kind === 'zone' && S.focused.id === id;
        applyZoneBorder(el, z, isFocusedZ);
        el.innerHTML = `
      <div class="zone-header">
        <span class="zone-lbl" style="color:${zhex};background:${zhex}18">${esc(z.label) || 'ZONE'}</span>
      </div>
      <div class="zone-resize-handle"></div>`;
        if (animate) { el.classList.add('spring-in'); setTimeout(() => el.classList.remove('spring-in'), 400); }
      }

      function startZoneEdit(id) {
        const z = S.zones.find(z => z.id === id);
        if (!z) return;
        const el = document.getElementById(`zone-${id}`);
        if (!el) return;
        const numPart = id.replace('z', '');
        const zehex = COLOR_HEX[z.color || 'cyan'];
        el.innerHTML = `
      <div class="zone-header">
        <input class="zone-lbl-input" value="${esc(z.label)}" maxlength="30"
          style="color:${zehex};caret-color:${zehex}">
      </div>
      <div class="zone-resize-handle"></div>`;
        const inp = el.querySelector('.zone-lbl-input');
        inp.focus(); inp.select();
        inp.addEventListener('input', () => { z.label = inp.value; });
        inp.addEventListener('keydown', e => {
          if (e.key === 'Enter' || e.key === 'Escape' || (e.key === 'Tab' && !e.shiftKey)) {
            e.preventDefault();
            z.label = inp.value;
            setMode('select');
            renderZone(id);
            focus('zone', id);
            save();
          }
        });
        inp.addEventListener('blur', () => {
          z.label = inp.value; renderZone(id); focus('zone', id); setMode('select'); save();
        });
      }

      // ─── CONNECTORS (screen-space SVG) ───────────────────────────────────
      // エンドポイント（接続点）の種類・IDから人間が読みやすいラベル文字列を作り、トーストなどで使う。
      function endpointLabel(ep) {
        if (ep.kind === 'idea') {
          const o = S.ideas[ep.id];
          const t = o?.text ? o.text.split('\n')[0].slice(0, 15) : '';
          return t ? `"${t}${t.length === 15 ? '…' : ''}"` : 'アイデア';
        }
        if (ep.kind === 'zone') return S.zones.find(z => z.id === ep.id)?.label || 'ゾーン';
        return '?';
      }

      // エンドポイントのボード空間矩形を返す。
      function getObjRect(ep) {
        if (!ep) return null;
        let el;
        if (ep.kind === 'idea') {
          el = document.getElementById(`idea-${ep.id}`);
          if (!el || el.style.display === 'none') return null;
        } else if (ep.kind === 'zone') {
          el = document.getElementById(`zone-${ep.id}`);
          if (!el) return null;
        } else return null;
        const x = parseFloat(el.style.left), y = parseFloat(el.style.top);
        const w = el.offsetWidth, h = el.offsetHeight;
        return { x, y, w, h, cx: x + w / 2, cy: y + h / 2 };
      }
      // 矩形の境界上の点（相手の中心方向）をボード空間で返す。
      function rectEdge(rect, toX, toY) {
        const dx = toX - rect.cx, dy = toY - rect.cy;
        if (Math.abs(dx) < 0.01 && Math.abs(dy) < 0.01) return { x: rect.cx, y: rect.cy };
        const hw = rect.w / 2, hh = rect.h / 2;
        const s = Math.min(hw / Math.abs(dx || 0.01), hh / Math.abs(dy || 0.01));
        return { x: rect.cx + dx * s, y: rect.cy + dy * s };
      }

      function buildArrowMarkers() {
        svgDefs.innerHTML = '';
        Object.entries(COLOR_HEX).forEach(([name, hex]) => {
          const mk = document.createElementNS('http://www.w3.org/2000/svg', 'marker');
          mk.setAttribute('id', `arr-${name}`);
          mk.setAttribute('markerUnits', 'strokeWidth');
          mk.setAttribute('markerWidth', '6');
          mk.setAttribute('markerHeight', '4');
          mk.setAttribute('refX', '6');
          mk.setAttribute('refY', '2');
          mk.setAttribute('orient', 'auto');
          const p = document.createElementNS('http://www.w3.org/2000/svg', 'path');
          p.setAttribute('d', 'M0,0 L6,2 L0,4 z');
          p.setAttribute('fill', hex);
          mk.appendChild(p);
          svgDefs.appendChild(mk);
        });
      }
      buildArrowMarkers();

      // エンドポイントに紐づくカラー名（例: 'purple'）を返す。コネクター線の色決定に使う。
      function epColor(ep) {
        if (!ep) return 'purple';
        if (ep.kind === 'idea') return (S.ideas[ep.id] || {}).color || 'purple';
        if (ep.kind === 'zone') return (S.zones.find(z => z.id === ep.id) || {}).color || 'cyan';
        return 'purple';
      }

      function redrawConnectors() {
        svgOverlay.querySelectorAll('.conn-g').forEach(e => e.remove());
        S.connectors.forEach(conn => {
          const ra = getObjRect(conn.from), rb = getObjRect(conn.to);
          if (!ra || !rb) return;
          const aEdge = rectEdge(ra, rb.cx, rb.cy);
          const bEdge = rectEdge(rb, ra.cx, ra.cy);
          const a = b2s(aEdge.x, aEdge.y), b = b2s(bEdge.x, bEdge.y);
          const color = epColor(conn.from);
          const hex = COLOR_HEX[color];
          const g = document.createElementNS('http://www.w3.org/2000/svg', 'g');
          g.classList.add('conn-g');
          const dx = b.x - a.x, dy = b.y - a.y;
          const td = Math.min(Math.sqrt(dx*dx+dy*dy) * 0.4, 120);
          const aNorm = { x: aEdge.x - ra.cx, y: aEdge.y - ra.cy };
          const bNorm = { x: bEdge.x - rb.cx, y: bEdge.y - rb.cy };
          const al = Math.sqrt(aNorm.x*aNorm.x+aNorm.y*aNorm.y)||1, bl = Math.sqrt(bNorm.x*bNorm.x+bNorm.y*bNorm.y)||1;
          const c1 = b2s(aEdge.x + aNorm.x/al*td/S.zoom, aEdge.y + aNorm.y/al*td/S.zoom);
          const c2 = b2s(bEdge.x + bNorm.x/bl*td/S.zoom, bEdge.y + bNorm.y/bl*td/S.zoom);
          const d = `M${a.x},${a.y} C${c1.x},${c1.y} ${c2.x},${c2.y} ${b.x},${b.y}`;
          // glow
          const glow = document.createElementNS('http://www.w3.org/2000/svg', 'path');
          glow.setAttribute('d', d); glow.setAttribute('fill', 'none');
          glow.setAttribute('stroke', hex); glow.setAttribute('stroke-width', '5'); glow.setAttribute('opacity', '.06');
          g.appendChild(glow);
          // main line
          const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
          path.setAttribute('d', d); path.setAttribute('fill', 'none');
          path.setAttribute('stroke', hex); path.setAttribute('stroke-width', '1.3'); path.setAttribute('opacity', '.75');
          if (conn.type === 'arrow') {
            path.setAttribute('marker-end', `url(#arr-${color})`);
            path.classList.add('conn-path');
          } else if (conn.type === 'link') {
            // wikilink-materialized: faint dotted
            path.setAttribute('stroke-dasharray', '1 5');
            path.setAttribute('stroke-linecap', 'round');
            path.setAttribute('opacity', '.45');
          } else {
            // line: dashed, no animation
            path.setAttribute('stroke-dasharray', '5 3');
          }
          g.appendChild(path);
          svgOverlay.appendChild(g);
        });
        updateConnectLine();
      }

      // ─── CONNECT ENDPOINTS ────────────────────────────────────────────────
      // 2つのエンドポイントが同じ種類・IDかどうかを比較するユーティリティ。
      const epEqual = (a, b) => a && b && a.kind === b.kind && a.id === b.id;


      // 2つのエンドポイントをコネクターで接続する（または既存なら削除する）。接続後にノートのリンクブロックも更新する。
      function connectEndpoints(fromEp, toEp, type) {
        pushHistory();
        const dup = S.connectors.find(c =>
          (epEqual(c.from, fromEp) && epEqual(c.to, toEp)) ||
          (type === 'line' && epEqual(c.from, toEp) && epEqual(c.to, fromEp)));
        if (dup) {
          S.connectors = S.connectors.filter(c => c.id !== dup.id);
          redrawConnectors(); save();
          toast(`${endpointLabel(fromEp)} — ${endpointLabel(toEp)} の接続を削除`);
          return;
        }
        const id = `c${S.nextId++}`;
        S.connectors.push({ id, from: fromEp, to: toEp, type });
        redrawConnectors();
        save();
        toast(`${endpointLabel(fromEp)} ${type === 'arrow' ? '→' : '—'} ${endpointLabel(toEp)} を接続`);
      }

      // ─── DRAG ─────────────────────────────────────────────────────────────
      // 要素にドラッグ操作を追加する。マウスダウン→移動でオブジェクト座標を更新し保存する。
      // ─── SNAP & ALIGNMENT GUIDES ─────────────────────────────────────────
      const SNAP = 24; // must equal GRID_BASE so dragged cards land on grid dots
      let snapEnabled = true;
      function snapVal(v) { return Math.round(v / SNAP) * SNAP; }

      // alignment guide SVG elements (drawn in board coordinate space)
      const guideGroup = (() => {
        const g = document.createElementNS('http://www.w3.org/2000/svg', 'g');
        g.id = 'align-guides';
        svgOverlay.appendChild(g);
        return g;
      })();

      function clearGuides() { guideGroup.innerHTML = ''; }

      function drawGuides(dragEl, obj) {
        clearGuides();
        const elR = dragEl.getBoundingClientRect();
        const wrapR = boardWrap.getBoundingClientRect();
        // convert dragged card bounds to board-space
        const toBoard = v => (v - wrapR.left - S.pan.x) / S.zoom;
        const toBoardY = v => (v - wrapR.top - S.pan.y) / S.zoom;
        const cx = toBoard(elR.left + elR.width / 2);
        const cy = toBoardY(elR.top + elR.height / 2);
        const THRESH = 6; // px in board-space
        const guideLines = []; // {x1,y1,x2,y2}

        Object.values(S.ideas).forEach(other => {
          if (other.id === obj.id) return;
          const otherEl = document.getElementById(`idea-${other.id}`);
          if (!otherEl || otherEl.style.display === 'none') return;
          const oR = otherEl.getBoundingClientRect();
          const oLeft = toBoard(oR.left), oRight = toBoard(oR.right);
          const oTop = toBoardY(oR.top), oBottom = toBoardY(oR.bottom);
          const oCX = (oLeft + oRight) / 2, oCY = (oTop + oBottom) / 2;
          const myLeft = toBoard(elR.left), myRight = toBoard(elR.right);
          const myTop = toBoardY(elR.top), myBottom = toBoardY(elR.bottom);

          // X alignments (vertical guide lines)
          [[myLeft, oLeft],[myLeft, oCX],[myLeft, oRight],
           [cx, oLeft],[cx, oCX],[cx, oRight],
           [myRight, oLeft],[myRight, oCX],[myRight, oRight]].forEach(([a,b]) => {
            if (Math.abs(a - b) < THRESH) {
              guideLines.push({ x1: b, x2: b, y1: Math.min(myTop, oTop) - 20, y2: Math.max(myBottom, oBottom) + 20 });
            }
          });
          // Y alignments (horizontal guide lines)
          [[myTop, oTop],[myTop, oCY],[myTop, oBottom],
           [cy, oTop],[cy, oCY],[cy, oBottom],
           [myBottom, oTop],[myBottom, oCY],[myBottom, oBottom]].forEach(([a,b]) => {
            if (Math.abs(a - b) < THRESH) {
              guideLines.push({ x1: Math.min(myLeft, oLeft) - 20, x2: Math.max(myRight, oRight) + 20, y1: b, y2: b });
            }
          });
        });

        // draw deduplicated guides in SVG board-space (apply board transform via transform attr)
        guideLines.forEach(({x1,y1,x2,y2}) => {
          const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
          // convert board-space back to svg-overlay space
          const toSvgX = bx => bx * S.zoom + S.pan.x;
          const toSvgY = by => by * S.zoom + S.pan.y;
          line.setAttribute('x1', toSvgX(x1)); line.setAttribute('y1', toSvgY(y1));
          line.setAttribute('x2', toSvgX(x2)); line.setAttribute('y2', toSvgY(y2));
          line.setAttribute('stroke', '#f97316');
          line.setAttribute('stroke-width', '1');
          line.setAttribute('stroke-dasharray', '4 3');
          line.setAttribute('opacity', '0.8');
          guideGroup.appendChild(line);
        });
      }

      function makeDraggable(el, getObj, onPos, excludeSel) {
        el.addEventListener('mousedown', e => {
          if (e.target.tagName === 'TEXTAREA' || e.target.tagName === 'INPUT') return;
          if (excludeSel && e.target.closest(excludeSel)) return;
          if (e.button !== 0) return;
          e.stopPropagation();
          const obj = getObj();
          if (!obj) return;
          const sx = e.clientX, sy = e.clientY, ox = obj.x, oy = obj.y;
          const isIdea = el.classList.contains('idea');
          el.style.zIndex = 99; el.style.transition = 'none';
          const onMove = e => {
            obj.x = ox + (e.clientX - sx) / S.zoom;
            obj.y = oy + (e.clientY - sy) / S.zoom;
            el.style.left = obj.x + 'px'; el.style.top = obj.y + 'px';
            redrawConnectors();
            if (isIdea && snapEnabled) drawGuides(el, obj);
            updateMinimap();
          };
          const onUp = e => {
            el.style.zIndex = ''; el.style.transition = '';
            clearGuides();
            pushHistory();
            // snap to grid unless Alt held or snap disabled
            if (isIdea && snapEnabled && !e.altKey) {
              obj.x = snapVal(obj.x); obj.y = snapVal(obj.y);
              el.style.left = obj.x + 'px'; el.style.top = obj.y + 'px';
              redrawConnectors();
            }
            if (isIdea) resolveOverlaps();
            save();
            document.removeEventListener('mousemove', onMove);
            document.removeEventListener('mouseup', onUp);
          };
          document.addEventListener('mousemove', onMove);
          document.addEventListener('mouseup', onUp);
        });
      }

      // ─── OVERLAP RESOLUTION ───────────────────────────────────────────────
      // アイデアカード同士の重なりを解消する。IDが小さい方を固定し、大きい方を下へずらす。
      function resolveOverlaps() {
        const PAD = 12;
        const items = Object.values(S.ideas)
          .filter(o => {
            const el = document.getElementById(`idea-${o.id}`);
            return el && el.style.display !== 'none';
          })
          .map(o => {
            const el = document.getElementById(`idea-${o.id}`);
            return { obj: o, w: el.offsetWidth || 160, h: el.offsetHeight || 80 };
          });

        if (items.length < 2) return;

        // Stable sort: smaller IDs come first (they are the "fixed" anchor for larger IDs)
        items.sort((a, b) => a.obj.id - b.obj.id);

        let changed = true, iter = 0;
        while (changed && iter++ < 60) {
          changed = false;
          for (let i = 0; i < items.length; i++) {
            for (let j = i + 1; j < items.length; j++) {
              const A = items[i], B = items[j]; // A.id < B.id (sorted)
              const overX = A.obj.x < B.obj.x + B.w + PAD && A.obj.x + A.w + PAD > B.obj.x;
              const overY = A.obj.y < B.obj.y + B.h + PAD && A.obj.y + A.h + PAD > B.obj.y;
              if (overX && overY) {
                // B has larger ID → push B below A
                B.obj.y = A.obj.y + A.h + PAD;
                const el = document.getElementById(`idea-${B.obj.id}`);
                if (el) el.style.top = B.obj.y + 'px';
                changed = true;
              }
            }
          }
        }
        redrawConnectors();
      }

      // ─── PAN / ZOOM / RUBBER BAND ─────────────────────────────────────────
      const rubberBand = document.getElementById('rubber-band');
      let rbActive = false, rbStart = {};

      boardWrap.addEventListener('mousedown', e => {
        // Middle-click or Alt+left-drag = pan
        if (e.button === 1 || (e.button === 0 && e.altKey)) {
          e.preventDefault();
          S.panning = true;
          S.panOrigin = { x: e.clientX - S.pan.x, y: e.clientY - S.pan.y };
          boardWrap.classList.add('panning');
          return;
        }
        const isBoard = e.target === boardWrap || e.target === board ||
                        e.target === objLayer || e.target === zonesLayer;
        if (e.button === 0 && isBoard) {
          if (e.shiftKey) {
            // Shift+drag = rubber band
            const wrapR = boardWrap.getBoundingClientRect();
            rbStart = { x: e.clientX - wrapR.left, y: e.clientY - wrapR.top };
            rbActive = true;
            rubberBand.style.display = 'block';
            rubberBand.style.left = rbStart.x + 'px'; rubberBand.style.top = rbStart.y + 'px';
            rubberBand.style.width = '0'; rubberBand.style.height = '0';
          } else {
            // Plain left-drag on empty = pan
            S.panning = true;
            S.panOrigin = { x: e.clientX - S.pan.x, y: e.clientY - S.pan.y };
            boardWrap.classList.add('panning');
          }
        }
      });

      document.addEventListener('mousemove', e => {
        if (rbActive) {
          const wrapR = boardWrap.getBoundingClientRect();
          const cx = e.clientX - wrapR.left, cy = e.clientY - wrapR.top;
          const x = Math.min(cx, rbStart.x), y = Math.min(cy, rbStart.y);
          const w = Math.abs(cx - rbStart.x), h = Math.abs(cy - rbStart.y);
          rubberBand.style.left = x + 'px'; rubberBand.style.top = y + 'px';
          rubberBand.style.width = w + 'px'; rubberBand.style.height = h + 'px';
        }
      });

      document.addEventListener('mouseup', e => {
        if (rbActive) {
          rbActive = false;
          rubberBand.style.display = 'none';
          const wrapR = boardWrap.getBoundingClientRect();
          const cx = e.clientX - wrapR.left, cy = e.clientY - wrapR.top;
          const rx1 = Math.min(cx, rbStart.x), ry1 = Math.min(cy, rbStart.y);
          const rx2 = Math.max(cx, rbStart.x), ry2 = Math.max(cy, rbStart.y);
          if (rx2 - rx1 < 6 && ry2 - ry1 < 6) return; // too small, treat as click
          // convert screen rect to board-space
          const toB = (sx, sy) => ({
            x: (sx - S.pan.x) / S.zoom,
            y: (sy - S.pan.y) / S.zoom
          });
          const p1 = toB(rx1, ry1), p2 = toB(rx2, ry2);
          // select all ideas within rect
          const selected = [];
          Object.values(S.ideas).forEach(o => {
            const el = document.getElementById(`idea-${o.id}`);
            if (!el || el.style.display === 'none') return;
            const cx2 = o.x + el.offsetWidth / 2, cy2 = o.y + el.offsetHeight / 2;
            if (cx2 >= p1.x && cx2 <= p2.x && cy2 >= p1.y && cy2 <= p2.y) {
              selected.push({ kind: 'idea', id: o.id });
            }
          });
          if (selected.length > 0) {
            S.cmdMode = 'move';
            S.moveSelection = selected;
            selected.forEach(({ kind, id }) => {
              const el = getEl(kind, id);
              if (el) el.classList.add('focused');
            });
            toast(`${selected.length}件選択 — 矢印キーで移動  Enter:確定  Esc:終了`);
            updateCmd();
          }
        }
      });
      document.addEventListener('mousemove', e => {
        if (!S.panning) return;
        S.pan.x = e.clientX - S.panOrigin.x;
        S.pan.y = e.clientY - S.panOrigin.y;
        applyXform(); redrawConnectors();
      });
      document.addEventListener('mouseup', () => {
        if (S.panning) { S.panning = false; boardWrap.classList.remove('panning'); }
      });
      boardWrap.addEventListener('wheel', e => {
        e.preventDefault();
        const dz = e.deltaY > 0 ? .9 : 1.1;
        const nz = Math.max(.25, Math.min(2.5, S.zoom * dz));
        const r = boardWrap.getBoundingClientRect();
        const mx = e.clientX - r.left, my = e.clientY - r.top;
        S.pan.x = mx - (mx - S.pan.x) * (nz / S.zoom);
        S.pan.y = my - (my - S.pan.y) * (nz / S.zoom);
        S.zoom = nz;
        applyXform(); redrawConnectors();
      }, { passive: false });
      boardWrap.addEventListener('click', e => {
        if (e.target === boardWrap || e.target === board || e.target === objLayer || e.target === zonesLayer) clearFocus();
      });

      // ─── KEYBOARD ─────────────────────────────────────────────────────────
      document.addEventListener('keydown', e => {
        const ae = document.activeElement;
        const inInput = ae && (ae.tagName === 'INPUT' || ae.tagName === 'TEXTAREA');


        if (e.key === 'Tab') {
          e.preventDefault();
          if (S.mode === 'select') {
            setMode('edit');
            if (S.focused?.kind === 'idea') startEdit(S.focused.id);
            else if (S.focused?.kind === 'zone') { setMode('edit'); startZoneEdit(S.focused.id); }
          } else {
            const { kind, id } = S.focused || {};
            setMode('select');
            if (kind === 'idea' && S.ideas[id]) { renderIdea(id); focus('idea', id); }
            if (kind === 'zone') { renderZone(id); focus('zone', id); }
          }
          return;
        }

        if (S.mode === 'edit') return;

        if (e.key === 'Escape') {
          closePalette(); exitConnectMode(); closeHintSelect(); cancelMoveSelect(); exitLensMode();
          if (S.cmdMode === 'bridge') { S.connectFrom = null; }
          S.cmdBuf = ''; S.cmdMode = null;
          if (S.mode === 'resize') setMode('select');
          updateCmd(); return;
        }

        // ── Resize mode (zone) ──
        if (S.mode === 'resize') {
          const z = S.zones.find(z => z.id === S.resizeZoneId);
          const el = z && document.getElementById(`zone-${z.id}`);
          if (z && el) {
            const step = e.shiftKey ? 50 : 20;
            if (e.key === 'ArrowRight') { e.preventDefault(); z.w = Math.max(80, z.w + step); el.style.width = z.w + 'px'; save(); }
            if (e.key === 'ArrowLeft') { e.preventDefault(); z.w = Math.max(80, z.w - step); el.style.width = z.w + 'px'; save(); }
            if (e.key === 'ArrowDown') { e.preventDefault(); z.h = Math.max(60, z.h + step); el.style.height = z.h + 'px'; save(); }
            if (e.key === 'ArrowUp') { e.preventDefault(); z.h = Math.max(60, z.h - step); el.style.height = z.h + 'px'; save(); }
            if (e.key === 'Enter' || e.key === 'r') {
              e.preventDefault();
              el.classList.remove('resize-mode');
              setMode('select'); focus('zone', S.resizeZoneId);
            }
          }
          return;
        }

        // ── Command modes ──
        if (S.cmdMode === 'palette') { handlePaletteKey(e.key); return; }
        if (S.cmdMode === 'hint') { handleHintKey(e); return; }
        if (S.cmdMode === 'c') { handleConnectKey(e); return; }

        if (S.cmdMode === 'move') {
          if (e.key === 'Escape') { cancelMoveSelect(); return; }
          if (e.key === 'Enter') { e.preventDefault(); finalizeMoveSelect(); return; }
          if (e.key === 'f' || e.key === 'm') { e.preventDefault(); openHintSelect(false, true); return; }
          if (['ArrowLeft', 'ArrowRight', 'ArrowUp', 'ArrowDown'].includes(e.key)) {
            e.preventDefault();
            const step = e.shiftKey ? 50 : 20;
            moveMoveSelection(e.key, step);
            return;
          }
          return;
        }

        if (S.cmdMode === 'bridge') {
          if (e.key === 'Escape') { S.connectFrom = null; S.cmdMode = null; S.cmdBuf = ''; updateCmd(); return; }
          if (e.key === 'f') { e.preventDefault(); openHintSelect(false, false, true); return; }
          return;
        }

        if (S.cmdMode === 'v') {
          if (e.key === 'Escape') { S.cmdBuf = ''; S.cmdMode = null; updateCmd(); return; }
          if (e.key === 'Enter') { fitAll(); S.cmdBuf = ''; S.cmdMode = null; updateCmd(); return; }
          if (/^[1-9]$/.test(e.key)) { zoomToSection(+e.key); S.cmdBuf = ''; S.cmdMode = null; updateCmd(); return; }
          return;
        }

        // ── Lens depth shortcut (1-3 while in lens mode) ──
        if (S.lensMode && /^[123]$/.test(e.key)) {
          e.preventDefault();
          S.lensDepth = +e.key;
          applyLens(); updateCmd(); return;
        }

        // ── Ctrl shortcuts ──
        if (e.ctrlKey || e.metaKey) {
          if (e.key === 'z') { e.preventDefault(); undo(); return; }
          if (e.key === 'ArrowLeft') { e.preventDefault(); S.pan.x += 80; applyXform(); save(); return; }
          if (e.key === 'ArrowRight') { e.preventDefault(); S.pan.x -= 80; applyXform(); save(); return; }
          if (e.key === 'ArrowUp') { e.preventDefault(); S.pan.y += 80; applyXform(); save(); return; }
          if (e.key === 'ArrowDown') { e.preventDefault(); S.pan.y -= 80; applyXform(); save(); return; }
          if (e.key === 'a') {
            e.preventDefault();
            // select all ideas → move mode
            const all = Object.values(S.ideas)
              .filter(o => { const el = document.getElementById(`idea-${o.id}`); return el && el.style.display !== 'none'; })
              .map(o => ({ kind: 'idea', id: o.id }));
            if (all.length) {
              S.cmdMode = 'move'; S.moveSelection = all;
              all.forEach(({ kind, id }) => { const el = getEl(kind, id); if (el) el.classList.add('focused'); });
              toast(`${all.length}件全選択 — 矢印キーで移動  Enter:確定  Esc:終了`);
              updateCmd();
            }
            return;
          }
          if (e.key === 'd') {
            e.preventDefault();
            if (S.focused?.kind === 'idea') {
              const src = S.ideas[S.focused.id];
              if (src) {
                const id = `i${S.nextId++}`;
                S.ideas[id] = { ...src, id, x: src.x + 24, y: src.y + 24 };
                renderIdea(id, true); focus('idea', id); save(); updateStat();
                toast('複製しました');
              }
            }
            return;
          }
          return; // don't intercept other Ctrl combos
        }

        // ── Zoom shortcuts ──
        if (e.key === '+' || e.key === '=') {
          e.preventDefault();
          const wrapR = boardWrap.getBoundingClientRect();
          const cx = wrapR.width / 2, cy = wrapR.height / 2;
          const nz = Math.min(2.5, S.zoom * 1.2);
          S.pan.x = cx - (cx - S.pan.x) * (nz / S.zoom);
          S.pan.y = cy - (cy - S.pan.y) * (nz / S.zoom);
          S.zoom = nz; applyXform(); save(); return;
        }
        if (e.key === '-') {
          e.preventDefault();
          const wrapR = boardWrap.getBoundingClientRect();
          const cx = wrapR.width / 2, cy = wrapR.height / 2;
          const nz = Math.max(0.25, S.zoom / 1.2);
          S.pan.x = cx - (cx - S.pan.x) * (nz / S.zoom);
          S.pan.y = cy - (cy - S.pan.y) * (nz / S.zoom);
          S.zoom = nz; applyXform(); save(); return;
        }
        if (e.key === '0') {
          e.preventDefault();
          S.zoom = 1;
          const wrapR = boardWrap.getBoundingClientRect();
          S.pan.x = wrapR.width / 2; S.pan.y = wrapR.height / 2;
          applyXform(); save(); return;
        }

        // ── Alt+Arrow: connect focused idea to nearest existing idea in that direction ──
        if (e.altKey && S.focused?.kind === 'idea' && ['ArrowLeft','ArrowRight','ArrowUp','ArrowDown'].includes(e.key)) {
          e.preventDefault();
          const src = S.ideas[S.focused.id];
          if (src) {
            const srcEl = getEl('idea', src.id);
            const srcCX = src.x + (srcEl ? srcEl.offsetWidth : 200) / 2;
            const srcCY = src.y + (srcEl ? srcEl.offsetHeight : 80) / 2;
            const dirVec = { ArrowRight:[1,0], ArrowLeft:[-1,0], ArrowDown:[0,1], ArrowUp:[0,-1] }[e.key];
            let best = null, bestScore = -Infinity;
            Object.values(S.ideas).forEach(other => {
              if (other.id === src.id) return;
              const oEl = getEl('idea', other.id);
              if (!oEl || oEl.style.display === 'none') return;
              const oCX = other.x + oEl.offsetWidth / 2, oCY = other.y + oEl.offsetHeight / 2;
              const dx = oCX - srcCX, dy = oCY - srcCY;
              const dot = dx * dirVec[0] + dy * dirVec[1];
              if (dot <= 20) return; // must be clearly in that direction
              const dist = Math.sqrt(dx*dx + dy*dy);
              const cos = dot / dist;
              if (cos < 0.5) return; // within 60° cone
              const score = cos * 1000 - dist; // prefer aligned over close
              if (score > bestScore) { bestScore = score; best = other; }
            });
            if (best) {
              const fromEp = { kind:'idea', id: src.id }, toEp = { kind:'idea', id: best.id };
              const already = S.connectors.find(c =>
                (epEqual(c.from, fromEp) && epEqual(c.to, toEp)) ||
                (epEqual(c.from, toEp) && epEqual(c.to, fromEp)));
              if (!already) {
                pushHistory();
                S.connectors.push({ id: `c${S.nextId++}`, from: fromEp, to: toEp, type: 'arrow' });
                buildArrowMarkers(); redrawConnectors(); save();
                toast('コネクタを追加しました');
              }
              focus('idea', best.id);
            } else {
              toast('その方向にアイデアがありません');
            }
          }
          return;
        }

        // ── Arrow key movement / navigation ──
        if (['ArrowLeft', 'ArrowRight', 'ArrowUp', 'ArrowDown'].includes(e.key)) {
          e.preventDefault();
          if (e.shiftKey && S.focused) {
            moveObjByKey(e.key);
          } else {
            navigateFocus(e.key);
          }
          return;
        }

        // ── Single-key commands ──
        switch (e.key) {
          case 'u': e.preventDefault(); undo(); break;
          case 'i': e.preventDefault(); createIdea(); break;
          case 'z': e.preventDefault(); createZone(); break;
          case 'c':
            e.preventDefault();
            startConnectMode();
            break;
          case 'f':
            e.preventDefault();
            openHintSelect();
            break;
          case 'v':
            e.preventDefault();
            S.cmdMode = 'v'; S.cmdBuf = 'v'; updateCmd();
            toast('ビュー: Enter=全体表示  1〜9=テンキー配置でズーム');
            break;
          case 'm':
            e.preventDefault();
            S.cmdMode = 'move'; S.moveSelection = [];
            toast('移動: f でオブジェクトを選択  矢印で移動  Shift+矢印で大きく移動  Enter:確定  Esc:終了');
            openHintSelect(false, true);
            break;
          case 'p': e.preventDefault(); openPalette(); break;
          case 'l':
            e.preventDefault();
            if (S.lensMode) exitLensMode(); else enterLensMode();
            break;
          case 'G': // Shift+G: snap toggle
            e.preventDefault();
            snapEnabled = !snapEnabled;
            toast(snapEnabled ? 'スナップ ON' : 'スナップ OFF');
            break;
          case 'M': // Shift+M: minimap toggle
            e.preventDefault();
            minimapEl.style.display = minimapEl.style.display === 'none' ? '' : 'none';
            break;
          case 'g':
            e.preventDefault();
            if (!S.focused) { toast('先に接続元を選択してください'); break; }
            S.connectFrom = { ...S.focused };
            S.cmdMode = 'bridge'; S.cmdBuf = 'g';
            openHintSelect(false, false, true);
            break;
          case 's':
            e.preventDefault();
            autoLayout();
            break;
          case 'r':
            e.preventDefault();
            if (S.focused?.kind === 'zone') {
              S.resizeZoneId = S.focused.id;
              const el = getEl('zone', S.focused.id);
              if (el) el.classList.add('resize-mode');
              setMode('resize');
              toast('リサイズモード: ↑↓←→ でサイズ変更 / Enter で確定');
            }
            break;
          case 'Enter':
            if (S.focused?.kind === 'idea') { setMode('edit'); startEdit(S.focused.id); }
            if (S.focused?.kind === 'zone') { setMode('edit'); startZoneEdit(S.focused.id); }
            break;
          case 'x': case 'Delete': e.preventDefault(); deleteSelected(); break;
        }
      });

      // ─── MOVE SELECTION ───────────────────────────────────────────────────
      function cancelMoveSelect() {
        document.querySelectorAll('.move-selected').forEach(el => el.classList.remove('move-selected'));
        S.moveSelection = [];
        if (S.cmdMode === 'move') { S.cmdMode = null; S.cmdBuf = ''; }
        updateCmd();
      }

      function moveMoveSelection(key, step) {
        S.moveSelection.forEach(({ kind, id }) => {
          let obj = null;
          if (kind === 'idea') obj = S.ideas[id];
          else if (kind === 'zone') obj = S.zones.find(z => z.id === id);
          if (!obj) return;
          if (key === 'ArrowLeft') obj.x -= step;
          if (key === 'ArrowRight') obj.x += step;
          if (key === 'ArrowUp') obj.y -= step;
          if (key === 'ArrowDown') obj.y += step;
          const el = getEl(kind, id);
          if (el) { el.style.left = obj.x + 'px'; el.style.top = obj.y + 'px'; }
        });
        redrawConnectors(); save();
      }

      function finalizeMoveSelect() {
        const count = S.moveSelection.length;
        cancelMoveSelect();
        if (count > 0) toast(`${count}件を移動しました`);
      }

      // ─── VIEWPORT ─────────────────────────────────────────────────────────
      function fitAll() {
        const all = [];
        Object.values(S.ideas).forEach(o => { const el = getEl('idea', o.id); if (el && el.style.display !== 'none') all.push({ x: o.x, y: o.y, w: el.offsetWidth || 160, h: el.offsetHeight || 80 }); });
        S.zones.forEach(z => all.push({ x: z.x, y: z.y, w: z.w, h: z.h }));
        if (!all.length) return;
        const pad = 60;
        const minX = Math.min(...all.map(o => o.x)) - pad;
        const minY = Math.min(...all.map(o => o.y)) - pad;
        const maxX = Math.max(...all.map(o => o.x + o.w)) + pad;
        const maxY = Math.max(...all.map(o => o.y + o.h)) + pad;
        const r = boardWrap.getBoundingClientRect();
        const nz = Math.min(r.width / (maxX - minX), r.height / (maxY - minY), 1.5);
        S.zoom = nz;
        S.pan.x = r.width / 2 - (minX + (maxX - minX) / 2) * nz;
        S.pan.y = r.height / 2 - (minY + (maxY - minY) / 2) * nz;
        applyXform(); redrawConnectors();
        toast('全オブジェクトを表示');
      }

      // テンキー数字（1〜9）に対応する3×3グリッドのマス（区画）へズームして中央に表示する。
      function zoomToSection(d) {
        if (!GRID_POS[d]) return;
        const [col, row] = GRID_POS[d];
        const r = boardWrap.getBoundingClientRect();
        // Current section top-left in board space
        const secW = r.width / S.zoom / 3, secH = r.height / S.zoom / 3;
        const secBx = (-S.pan.x / S.zoom) + col * secW;
        const secBy = (-S.pan.y / S.zoom) + row * secH;
        const nz = Math.min(S.zoom * 3, 2.5);
        S.pan.x = r.width / 2 - (secBx + secW / 2) * nz;
        S.pan.y = r.height / 2 - (secBy + secH / 2) * nz;
        S.zoom = nz;
        applyXform(); redrawConnectors();
      }

      // 矢印キーでフォーカス中オブジェクトを10px単位で移動し、コネクターを再描画して保存する。
      function moveObjByKey(key) {
        const { kind, id } = S.focused || {};
        const step = 10;
        let obj = null;
        if (kind === 'idea') obj = S.ideas[id];
        else if (kind === 'zone') obj = S.zones.find(z => z.id === id);
        if (!obj) return;
        if (key === 'ArrowLeft') obj.x -= step;
        if (key === 'ArrowRight') obj.x += step;
        if (key === 'ArrowUp') obj.y -= step;
        if (key === 'ArrowDown') obj.y += step;
        const el = getEl(kind, id);
        if (el) { el.style.left = obj.x + 'px'; el.style.top = obj.y + 'px'; }
        redrawConnectors(); save();
      }

      // ─── NAVIGATE FOCUS ───────────────────────────────────────────────────
      // キー方向（上下左右）に最も近いオブジェクトへフォーカスを移動する。
      function navigateFocus(key) {
        // Gather all objects with positions
        const all = [];
        Object.values(S.ideas).forEach(o => all.push({ kind: 'idea', id: o.id, x: o.x, y: o.y }));
        S.zones.forEach(z => all.push({ kind: 'zone', id: z.id, x: z.x, y: z.y }));
        if (!all.length) return;
        if (!S.focused) { const f = all[0]; focus(f.kind, f.id); return; }
        const cur = all.find(a => a.kind === S.focused.kind && a.id === S.focused.id);
        if (!cur) { const f = all[0]; focus(f.kind, f.id); return; }
        let best = null, bestD = Infinity;
        all.forEach(a => {
          if (a.kind === cur.kind && a.id === cur.id) return;
          const dx = a.x - cur.x, dy = a.y - cur.y;
          let ok = false;
          if (key === 'ArrowRight' && dx > 20 && Math.abs(dy) < Math.abs(dx)) ok = true;
          if (key === 'ArrowLeft' && dx < -20 && Math.abs(dy) < Math.abs(dx)) ok = true;
          if (key === 'ArrowDown' && dy > 20 && Math.abs(dx) < Math.abs(dy)) ok = true;
          if (key === 'ArrowUp' && dy < -20 && Math.abs(dx) < Math.abs(dy)) ok = true;
          if (ok) { const d = Math.hypot(dx, dy); if (d < bestD) { bestD = d; best = a; } }
        });
        if (best) focus(best.kind, best.id);
      }

      // ─── FORCE SIMULATION (shared) ────────────────────────────────────────
      // 反発力とバネ力による力学シミュレーションを指定回数実行し、グラフノードの座標を更新する。
      function runForceSim(nodes, springs, iters = 1) {
        const REPEL = 26000, SPRING = 0.007, IDEAL = 230, DAMP = 0.82;
        for (let iter = 0; iter < iters; iter++) {
          nodes.forEach(n => { n.fx = 0; n.fy = 0; });
          for (let i = 0; i < nodes.length; i++) for (let j = i + 1; j < nodes.length; j++) {
            const A = nodes[i], B = nodes[j];
            if (A.pinned && B.pinned) continue;
            const dx = B.x - A.x, dy = B.y - A.y;
            const dist = Math.max(Math.hypot(dx, dy), 20);
            const f = REPEL / (dist * dist);
            const fx = (dx / dist) * f, fy = (dy / dist) * f;
            if (!A.pinned) { A.fx -= fx; A.fy -= fy; }
            if (!B.pinned) { B.fx += fx; B.fy += fy; }
          }
          springs.forEach(([A, B]) => {
            if (!A || !B) return;
            const dx = B.x - A.x, dy = B.y - A.y;
            const dist = Math.max(Math.hypot(dx, dy), 1);
            const f = SPRING * (dist - IDEAL);
            const fx = (dx / dist) * f, fy = (dy / dist) * f;
            if (!A.pinned) { A.fx += fx; A.fy += fy; }
            if (!B.pinned) { B.fx -= fx; B.fy -= fy; }
          });
          nodes.forEach(n => {
            if (n.pinned) return;
            n.vx = (n.vx + n.fx) * DAMP; n.vy = (n.vy + n.fy) * DAMP;
            n.x += n.vx; n.y += n.vy;
          });
        }
      }

      // ─── LENS MODE ────────────────────────────────────────────────────────
      // エンドポイント指定子から対応するアイデア・ゾーン・ブックのデータオブジェクトを返す。
      function getObjData(ep) {
        if (ep.kind === 'idea') return S.ideas[ep.id];
        if (ep.kind === 'zone') return S.zones.find(z => z.id === ep.id);
        return null;
      }

      // BFS（幅優先探索）でコネクターを辿り、指定した深さまでの近傍エンドポイントキー集合を返す。
      function getNeighborKeys(ep, depth) {
        const visited = new Set([`${ep.kind}:${ep.id}`]);
        let frontier = [ep];
        for (let d = 0; d < depth; d++) {
          const next = [];
          frontier.forEach(f => {
            S.connectors.forEach(c => {
              const check = (from, to) => {
                if (epEqual(from, f)) {
                  const k = `${to.kind}:${to.id}`;
                  if (!visited.has(k)) { visited.add(k); next.push(to); }
                }
              };
              check(c.from, c.to);
              check(c.to, c.from);
            });
          });
          frontier = next;
          if (!frontier.length) break;
        }
        return visited;
      }
