        const bk = S.books.find(b => b.id === id);
        if (!bk) return;
        bk.expanded = !bk.expanded;
        renderBook(id);
        // Re-apply focus class after innerHTML replacement
        const el = document.getElementById(`book-${id}`);
        if (el) el.classList.add('focused');
        S.focused = { kind: 'book', id };
        S.lastFocused = { kind: 'book', id };
        updateCmd();
        save();
      }

      function cancelBookBuild() {
        if (S.cmdMode !== 'book') return;
        document.querySelectorAll('.book-selected').forEach(el => el.classList.remove('book-selected'));
        S.bookSelection = [];
        S.cmdMode = null; S.cmdBuf = '';
        updateCmd();
      }

      // ─── MOVE SELECTION ───────────────────────────────────────────────────
      function cancelMoveSelect() {
        document.querySelectorAll('.move-selected').forEach(el => el.classList.remove('move-selected'));
        S.moveSelection = [];
        if (S.cmdMode === 'move') { S.cmdMode = null; S.cmdBuf = ''; }
        updateCmd();
      }

      function moveMoveSelection(key, step) {
        S.moveSelection.forEach(({ kind, id }) => {
          let obj = null;
          if (kind === 'idea') obj = S.ideas[id];
          else if (kind === 'zone') obj = S.zones.find(z => z.id === id);
          else if (kind === 'book') obj = S.books.find(b => b.id === id);
          if (!obj) return;
          if (key === 'ArrowLeft') obj.x -= step;
          if (key === 'ArrowRight') obj.x += step;
          if (key === 'ArrowUp') obj.y -= step;
          if (key === 'ArrowDown') obj.y += step;
          const el = getEl(kind, id);
          if (el) { el.style.left = obj.x + 'px'; el.style.top = obj.y + 'px'; }
        });
        redrawConnectors(); save();
      }

      function finalizeMoveSelect() {
        const count = S.moveSelection.length;
        cancelMoveSelect();
        if (count > 0) toast(`${count}件を移動しました`);
      }

      // ─── UNBOOK / DETACH ─────────────────────────────────────────────────
      function unbookOrDetach() {
        if (!S.focused) return;
        const { kind, id } = S.focused;
        if (kind === 'book') {
          // Dissolve book: release children back to board
          const bk = S.books.find(b => b.id === id);
          if (!bk) return;
          const el = getEl('book', id);
          if (el) { el.classList.add('fade-out'); setTimeout(() => el.remove(), 200); }
          S.books = S.books.filter(b => b.id !== id);
          syncIdeaVisibility();
          S.focused = null; updateStat(); updateCmd(); save();
          toast('ブックを解除しました — アイデアをボードに戻しました');
        } else if (kind === 'idea') {
          // Remove this idea from any book it belongs to
          let removed = false;
          S.books.forEach(bk => {
            if (bk.children.includes(id)) {
              bk.children = bk.children.filter(c => c !== id);
              renderBook(bk.id);
              removed = true;
            }
          });
          if (removed) { syncIdeaVisibility(); save(); toast(`#${id} をブックから除外しました`); }
          else toast('このアイデアはブックに所属していません');
        }
      }

      // ─── VIEWPORT ─────────────────────────────────────────────────────────
      function fitAll() {
        const all = [];
        Object.values(S.ideas).forEach(o => { const el = getEl('idea', o.id); if (el && el.style.display !== 'none') all.push({ x: o.x, y: o.y, w: el.offsetWidth || 160, h: el.offsetHeight || 80 }); });
        S.zones.forEach(z => all.push({ x: z.x, y: z.y, w: z.w, h: z.h }));
        S.books.forEach(b => { const el = getEl('book', b.id); if (el) all.push({ x: b.x, y: b.y, w: el.offsetWidth || 180, h: el.offsetHeight || 80 }); });
        if (!all.length) return;
        const pad = 60;
        const minX = Math.min(...all.map(o => o.x)) - pad;
        const minY = Math.min(...all.map(o => o.y)) - pad;
        const maxX = Math.max(...all.map(o => o.x + o.w)) + pad;
        const maxY = Math.max(...all.map(o => o.y + o.h)) + pad;
        const r = boardWrap.getBoundingClientRect();
        const nz = Math.min(r.width / (maxX - minX), r.height / (maxY - minY), 1.5);
        S.zoom = nz;
        S.pan.x = r.width / 2 - (minX + (maxX - minX) / 2) * nz;
        S.pan.y = r.height / 2 - (minY + (maxY - minY) / 2) * nz;
        applyXform(); redrawConnectors();
        toast('全オブジェクトを表示');
      }

      function zoomToSection(d) {
        if (!GRID_POS[d]) return;
        const [col, row] = GRID_POS[d];
        const r = boardWrap.getBoundingClientRect();
        // Current section top-left in board space
        const secW = r.width / S.zoom / 3, secH = r.height / S.zoom / 3;
        const secBx = (-S.pan.x / S.zoom) + col * secW;
        const secBy = (-S.pan.y / S.zoom) + row * secH;
        const nz = Math.min(S.zoom * 3, 2.5);
        S.pan.x = r.width / 2 - (secBx + secW / 2) * nz;
        S.pan.y = r.height / 2 - (secBy + secH / 2) * nz;
        S.zoom = nz;
        applyXform(); redrawConnectors();
      }

      function moveObjByKey(key) {
        const { kind, id } = S.focused || {};
        const step = 10;
        let obj = null;
        if (kind === 'idea') obj = S.ideas[id];
        else if (kind === 'zone') obj = S.zones.find(z => z.id === id);
        else if (kind === 'book') obj = S.books.find(b => b.id === id);
        if (!obj) return;
        if (key === 'ArrowLeft') obj.x -= step;
        if (key === 'ArrowRight') obj.x += step;
        if (key === 'ArrowUp') obj.y -= step;
        if (key === 'ArrowDown') obj.y += step;
        const el = getEl(kind, id);
        if (el) { el.style.left = obj.x + 'px'; el.style.top = obj.y + 'px'; }
        redrawConnectors(); save();
      }

      // ─── JOINT ────────────────────────────────────────────────────────────
      function tryJoint() {
        const m = S.cmdBuf.match(/^j(\d+)([+\-])(\d+)$/);
        if (m) {
          buildConnector(+m[1], +m[3], m[2] === '-' ? 'arrow' : 'line');
        } else {
          toast('形式エラー: j[ID][+/-][ID] + Enter  例: j5+24=ライン  j2-3=アロー');
        }
        S.cmdBuf = ''; S.cmdMode = null; updateCmd();
      }

      // ─── BOOK ─────────────────────────────────────────────────────────────
      function execBook() {
        // Format: b[ID]+[ID]+[ID]... — supports multi-digit IDs
        const ids = S.cmdBuf.slice(1).split('+').map(Number).filter(n => n > 0 && S.ideas[n]);
        const valid = [...new Set(ids)]; // deduplicate
        if (!valid.length) { toast('有効なアイデアIDが見つかりません'); S.cmdBuf = ''; S.cmdMode = null; updateCmd(); return; }
        createBook(valid);
        S.cmdBuf = ''; S.cmdMode = null; updateCmd();
      }

      // ─── SELECT BY NUMBER ─────────────────────────────────────────────────
      function execSelect() {
        const num = +S.cmdBuf.replace(/^[a-z]/, '');
        if (S.ideas[num]) { focus('idea', num); S.cmdBuf = ''; S.cmdMode = null; updateCmd(); return; }
        const z = S.zones.find(z => z.id === `z${num}`);
        if (z) { focus('zone', z.id); S.cmdBuf = ''; S.cmdMode = null; updateCmd(); return; }
        const bk = S.books.find(b => b.id === `bk${num}`);
        if (bk) { focus('book', bk.id); S.cmdBuf = ''; S.cmdMode = null; updateCmd(); return; }
        toast(`#${num} が見つかりません`);
        S.cmdBuf = ''; S.cmdMode = null; updateCmd();
      }

      // ─── MOVE COMMAND ─────────────────────────────────────────────────────
      function showMoveOverlay() {
        moveOverlay.innerHTML = '';
        const r = boardWrap.getBoundingClientRect();
        const W = r.width, H = r.height;
        // Show 3x3 outer grid with numpad numbers (7=TL … 3=BR)
        for (let d = 1; d <= 9; d++) {
          const [c, row] = GRID_POS[d];
          const cellW = W / 3, cellH = H / 3;
          const x = r.left + c * cellW, y = r.top + row * cellH;
          const div = document.createElement('div');
          div.className = 'move-grid-cell';
          div.style.cssText = `left:${x}px;top:${y}px;width:${cellW}px;height:${cellH}px;`;
          div.textContent = d;
          moveOverlay.appendChild(div);
        }
        moveOverlay.classList.add('show');
      }
      function hideMoveOverlay() { moveOverlay.classList.remove('show'); moveOverlay.innerHTML = ''; }

      function execMove(objNum, d1, d2) {
        // Lookup object
        let obj = null, kind = null, id = null;
        if (S.ideas[objNum]) { obj = S.ideas[objNum]; kind = 'idea'; id = objNum; }
        else { const z = S.zones.find(z => z.id === `z${objNum}`); if (z) { obj = z; kind = 'zone'; id = z.id; } }
        if (!obj) { const bk = S.books.find(b => b.id === `bk${objNum}`); if (bk) { obj = bk; kind = 'book'; id = bk.id; } }
        if (!obj) { toast(`#${objNum} が見つかりません`); S.cmdBuf = ''; S.cmdMode = null; hideMoveOverlay(); updateCmd(); return; }

        if (!GRID_POS[d1] || !GRID_POS[d2]) { toast('無効な位置です(1-9)'); S.cmdBuf = ''; S.cmdMode = null; hideMoveOverlay(); updateCmd(); return; }

        const r = boardWrap.getBoundingClientRect();
        const [c1, r1] = GRID_POS[d1];
        const [c2, r2] = GRID_POS[d2];
        // Screen position of the target cell center (18-grid)
        const sx = r.left + r.width * (6 * c1 + 2 * c2 + 1) / 18;
        const sy = r.top + r.height * (6 * r1 + 2 * r2 + 1) / 18;
        // Convert screen → board
        const bx = (sx - r.left - S.pan.x) / S.zoom;
        const by = (sy - r.top - S.pan.y) / S.zoom;
        // Get element size for centering
        const el = getEl(kind, id);
        const elW = el ? el.offsetWidth / 2 : 75;
        const elH = el ? el.offsetHeight / 2 : 40;
        obj.x = bx - elW; obj.y = by - elH;
        if (el) { el.style.left = obj.x + 'px'; el.style.top = obj.y + 'px'; }
        redrawConnectors(); save();
        focus(kind, id);
        hideMoveOverlay();
        S.cmdBuf = ''; S.cmdMode = null; updateCmd();
        toast(`#${objNum} を移動しました`);
      }

      // ─── NAVIGATE FOCUS ───────────────────────────────────────────────────
      function navigateFocus(key) {
        // Gather all objects with positions
        const all = [];
        Object.values(S.ideas).forEach(o => all.push({ kind: 'idea', id: o.id, x: o.x, y: o.y }));
        S.zones.forEach(z => all.push({ kind: 'zone', id: z.id, x: z.x, y: z.y }));
        S.books.forEach(b => all.push({ kind: 'book', id: b.id, x: b.x, y: b.y }));
        if (!all.length) return;
        if (!S.focused) { const f = all[0]; focus(f.kind, f.id); return; }
        const cur = all.find(a => a.kind === S.focused.kind && a.id === S.focused.id);
        if (!cur) { const f = all[0]; focus(f.kind, f.id); return; }
        let best = null, bestD = Infinity;
        all.forEach(a => {
          if (a.kind === cur.kind && a.id === cur.id) return;
          const dx = a.x - cur.x, dy = a.y - cur.y;
          let ok = false;
          if (key === 'ArrowRight' && dx > 20 && Math.abs(dy) < Math.abs(dx)) ok = true;
          if (key === 'ArrowLeft' && dx < -20 && Math.abs(dy) < Math.abs(dx)) ok = true;
          if (key === 'ArrowDown' && dy > 20 && Math.abs(dx) < Math.abs(dy)) ok = true;
          if (key === 'ArrowUp' && dy < -20 && Math.abs(dx) < Math.abs(dy)) ok = true;
          if (ok) { const d = Math.hypot(dx, dy); if (d < bestD) { bestD = d; best = a; } }
        });
        if (best) focus(best.kind, best.id);
      }

      // ─── FORCE SIMULATION (shared) ────────────────────────────────────────
      function runForceSim(nodes, springs, iters = 1) {
        const REPEL = 26000, SPRING = 0.007, IDEAL = 230, DAMP = 0.82;
        for (let iter = 0; iter < iters; iter++) {
          nodes.forEach(n => { n.fx = 0; n.fy = 0; });
          for (let i = 0; i < nodes.length; i++) for (let j = i + 1; j < nodes.length; j++) {
            const A = nodes[i], B = nodes[j];
            if (A.pinned && B.pinned) continue;
            const dx = B.x - A.x, dy = B.y - A.y;
            const dist = Math.max(Math.hypot(dx, dy), 20);
            const f = REPEL / (dist * dist);
            const fx = (dx / dist) * f, fy = (dy / dist) * f;
            if (!A.pinned) { A.fx -= fx; A.fy -= fy; }
            if (!B.pinned) { B.fx += fx; B.fy += fy; }
          }
          springs.forEach(([A, B]) => {
            if (!A || !B) return;
            const dx = B.x - A.x, dy = B.y - A.y;
            const dist = Math.max(Math.hypot(dx, dy), 1);
            const f = SPRING * (dist - IDEAL);
            const fx = (dx / dist) * f, fy = (dy / dist) * f;
            if (!A.pinned) { A.fx += fx; A.fy += fy; }
            if (!B.pinned) { B.fx -= fx; B.fy -= fy; }
          });
          nodes.forEach(n => {
            if (n.pinned) return;
            n.vx = (n.vx + n.fx) * DAMP; n.vy = (n.vy + n.fy) * DAMP;
            n.x += n.vx; n.y += n.vy;
          });
        }
      }

      // ─── GRAPH SYSTEM ─────────────────────────────────────────────────────
      const graphView = document.getElementById('graph-view');
      const graphSvg = document.getElementById('graph-svg');
      const graphCam = document.getElementById('graph-cam');
      const graphEdgesG = document.getElementById('graph-edges-g');
      const graphNodesG = document.getElementById('graph-nodes-g');
      let graphSimNodes = [];
      let graphSimEdges = [];
      let gDragging = null;
      let gPanning = false;
      let gPanStart = null;
      let gHoverKey = null;

      function buildGraphArrows() {
        const defs = document.getElementById('graph-defs');
        defs.innerHTML = '';
        Object.entries(COLOR_HEX).forEach(([name, hex]) => {
          const mk = document.createElementNS('http://www.w3.org/2000/svg', 'marker');
          mk.setAttribute('id', `garr-${name}`);
          mk.setAttribute('markerUnits', 'strokeWidth');
          mk.setAttribute('markerWidth', '6'); mk.setAttribute('markerHeight', '4');
          mk.setAttribute('refX', '6'); mk.setAttribute('refY', '2'); mk.setAttribute('orient', 'auto');
          const p = document.createElementNS('http://www.w3.org/2000/svg', 'path');
          p.setAttribute('d', 'M0,0 L6,2 L0,4 z'); p.setAttribute('fill', hex);
          mk.appendChild(p); defs.appendChild(mk);
        });
      }

      function buildGraphData() {
        // Initialize graphPos from board positions if not set
        Object.values(S.ideas).forEach(o => {
          if (!S.graphPos[`idea:${o.id}`]) S.graphPos[`idea:${o.id}`] = { x: o.x || 300, y: o.y || 300 };
        });
        S.books.forEach(b => {
          if (!S.graphPos[`book:${b.id}`]) S.graphPos[`book:${b.id}`] = { x: b.x || 300, y: b.y || 300 };
        });
        // Build node array
        graphSimNodes = [];
        Object.values(S.ideas).forEach(o => {
          const p = S.graphPos[`idea:${o.id}`];
          graphSimNodes.push({ id: o.id, kind: 'idea', x: p.x, y: p.y, vx: 0, vy: 0, fx: 0, fy: 0, pinned: false });
        });
        S.books.forEach(b => {
          const p = S.graphPos[`book:${b.id}`];
          graphSimNodes.push({ id: b.id, kind: 'book', x: p.x, y: p.y, vx: 0, vy: 0, fx: 0, fy: 0, pinned: false });
        });
        // Build edge array (connectors + wikilinks)
        const nodeMap = {};
        graphSimNodes.forEach(n => nodeMap[`${n.kind}:${n.id}`] = n);
        graphSimEdges = [];
        S.connectors.forEach(c => {
          if (nodeMap[`${c.from.kind}:${c.from.id}`] && nodeMap[`${c.to.kind}:${c.to.id}`])
            graphSimEdges.push({ from: c.from, to: c.to, type: 'conn', ctype: c.type || 'line' });
        });
        Object.values(S.ideas).forEach(o => {
          extractWikilinks(o.text).forEach(title => {
            const t = findIdeaByTitle(title);
            if (!t || t.id === o.id) return;
            graphSimEdges.push({ from: { kind: 'idea', id: o.id }, to: { kind: 'idea', id: t.id }, type: 'wikilink' });
          });
        });
      }

      function saveGraphPos() {
        graphSimNodes.forEach(n => { S.graphPos[`${n.kind}:${n.id}`] = { x: n.x, y: n.y }; });
      }

      function graphEdgeColor(e) {
        if (e.from.kind === 'idea') return S.ideas[e.from.id]?.color || 'purple';
        if (e.from.kind === 'book') return S.books.find(b => b.id === e.from.id)?.color || 'purple';
        return 'purple';
      }

      function drawGraph() {
        const nodeMap = {};
        graphSimNodes.forEach(n => nodeMap[`${n.kind}:${n.id}`] = n);
        // Edges
        graphEdgesG.innerHTML = '';
        graphSimEdges.forEach(e => {
          const A = nodeMap[`${e.from.kind}:${e.from.id}`];
          const B = nodeMap[`${e.to.kind}:${e.to.id}`];
          if (!A || !B) return;
          const dx = B.x - A.x, dy = B.y - A.y, len = Math.max(Math.hypot(dx, dy), 1), r = 24;
          const sx = A.x + (dx / len) * r, sy = A.y + (dy / len) * r;
          const ex = B.x - (dx / len) * r, ey = B.y - (dy / len) * r;
          const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
          path.setAttribute('d', `M${sx},${sy} L${ex},${ey}`);
          path.setAttribute('fill', 'none');
          if (e.type === 'wikilink') {
            path.setAttribute('stroke', COLOR_HEX.cyan);
            path.setAttribute('stroke-width', '1'); path.setAttribute('stroke-dasharray', '3 5');
            path.setAttribute('opacity', '.35');
          } else {
            const col = graphEdgeColor(e), hex = COLOR_HEX[col];
            path.setAttribute('stroke', hex); path.setAttribute('stroke-width', '1.5'); path.setAttribute('opacity', '.75');
            if (e.ctype === 'arrow') path.setAttribute('marker-end', `url(#garr-${col})`);
            else if (e.ctype === 'line') path.setAttribute('stroke-dasharray', '5 3');
            else if (e.ctype === 'link') { path.setAttribute('stroke-dasharray', '1 5'); path.setAttribute('opacity', '.4'); }
          }
          const g = document.createElementNS('http://www.w3.org/2000/svg', 'g');
          g.classList.add('gedge'); g.appendChild(path);
          graphEdgesG.appendChild(g);
        });
        // Nodes
        graphNodesG.innerHTML = '';
        graphSimNodes.forEach(n => {
          const g = document.createElementNS('http://www.w3.org/2000/svg', 'g');
          g.classList.add('gnode');
          g.setAttribute('data-kind', n.kind); g.setAttribute('data-id', String(n.id));
          g.setAttribute('transform', `translate(${Math.round(n.x)},${Math.round(n.y)})`);
          if (n.kind === 'idea') {
            const o = S.ideas[n.id];
            const col = COLOR_HEX[o?.color || 'purple'];
            const c = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
            c.setAttribute('r', '22'); c.setAttribute('fill', col); c.setAttribute('fill-opacity', '0.82');
            c.setAttribute('stroke', col); c.setAttribute('stroke-width', '2');
            g.appendChild(c);
            const wls = extractWikilinks(o?.text).length;
            if (wls > 0) {
              const b = document.createElementNS('http://www.w3.org/2000/svg', 'text');
              b.setAttribute('text-anchor', 'middle'); b.setAttribute('y', '4');
              b.setAttribute('font-size', '9'); b.setAttribute('fill', '#fff'); b.setAttribute('opacity', '.9');
              b.textContent = wls; g.appendChild(b);
            }
            const lbl = document.createElementNS('http://www.w3.org/2000/svg', 'text');
            lbl.setAttribute('text-anchor', 'middle'); lbl.setAttribute('y', '38'); lbl.setAttribute('font-size', '10');
            const tt = noteTitle(o || {});
            lbl.textContent = tt.slice(0, 20) + (tt.length > 20 ? '…' : ''); g.appendChild(lbl);
          } else {
            const bk = S.books.find(b => b.id === n.id);
            const col = COLOR_HEX[bk?.color || 'purple'];
            const rect = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
            rect.setAttribute('x', '-24'); rect.setAttribute('y', '-14');
            rect.setAttribute('width', '48'); rect.setAttribute('height', '28'); rect.setAttribute('rx', '6');
            rect.setAttribute('fill', col); rect.setAttribute('fill-opacity', '0.75');
            rect.setAttribute('stroke', col); rect.setAttribute('stroke-width', '2');
            g.appendChild(rect);
            const lbl = document.createElementNS('http://www.w3.org/2000/svg', 'text');
            lbl.setAttribute('text-anchor', 'middle'); lbl.setAttribute('y', '32'); lbl.setAttribute('font-size', '10');
            const tt = bk?.children[0] ? noteTitle(S.ideas[bk.children[0]] || {}) : 'BOOK';
            lbl.textContent = tt.slice(0, 16) + (tt.length > 16 ? '…' : ''); g.appendChild(lbl);
          }
          // Events
          g.addEventListener('mousedown', e => {
            e.stopPropagation();
            gDragging = { n, sx: e.clientX, sy: e.clientY, ox: n.x, oy: n.y }; n.pinned = true;
          });
          g.addEventListener('click', e => {
            e.stopPropagation();
            if (n.kind === 'idea') openNote(n.id);
            else if (n.kind === 'book') { switchView('note'); selectNote(S.books.find(b => b.id === n.id)?.children[0]); }
          });
          g.addEventListener('dblclick', e => {
            e.stopPropagation();
            if (n.kind === 'idea') navigateToNoteOnBoard(n.id);
            else { switchView('board'); focus('book', n.id); }
          });
          g.addEventListener('mouseenter', () => { gHoverKey = `${n.kind}:${n.id}`; applyGraphDim(); });
          g.addEventListener('mouseleave', () => { gHoverKey = null; applyGraphDim(); });
          graphNodesG.appendChild(g);
        });
        applyGraphDim();
        updateGraphCam();
      }

      function applyGraphDim() {
        if (!gHoverKey) {
          graphNodesG.querySelectorAll('.gnode').forEach(el => el.classList.remove('dim'));
          graphEdgesG.querySelectorAll('.gedge').forEach(el => el.classList.remove('dim'));
          return;
        }
        const [hk, hid] = gHoverKey.split(':');
        const ep = { kind: hk, id: isNaN(+hid) ? hid : +hid };
        const vis = getNeighborKeys(ep, 2); vis.add(gHoverKey);
        // Also add wikilink neighbors
        if (hk === 'idea') {
          extractWikilinks(S.ideas[ep.id]?.text || '').forEach(t => {
            const f = findIdeaByTitle(t); if (f) vis.add(`idea:${f.id}`);
          });
          Object.values(S.ideas).forEach(o => {
            if (extractWikilinks(o.text).some(t => { const f = findIdeaByTitle(t); return f && f.id === ep.id; }))
              vis.add(`idea:${o.id}`);
          });
        }
        graphNodesG.querySelectorAll('.gnode').forEach(el => {
          el.classList.toggle('dim', !vis.has(`${el.dataset.kind}:${el.dataset.id}`));
        });
        graphEdgesG.querySelectorAll('.gedge').forEach(el => el.classList.add('dim'));
      }

      function updateGraphCam() {
        graphCam.setAttribute('transform', `translate(${S.gPan.x},${S.gPan.y}) scale(${S.gZoom})`);
      }

      function graphFitAll() {
        if (!graphSimNodes.length) return;
        const xs = graphSimNodes.map(n => n.x), ys = graphSimNodes.map(n => n.y);
        const pad = 80;
        const minX = Math.min(...xs) - pad, maxX = Math.max(...xs) + pad;
        const minY = Math.min(...ys) - pad, maxY = Math.max(...ys) + pad;
        const r = graphSvg.getBoundingClientRect();
        const nz = Math.min(r.width / (maxX - minX), r.height / (maxY - minY), 2);
        S.gZoom = nz;
        S.gPan.x = r.width / 2 - (minX + (maxX - minX) / 2) * nz;
        S.gPan.y = r.height / 2 - (minY + (maxY - minY) / 2) * nz;
        updateGraphCam();
      }

      function getGraphSprings() {
        const nodeMap = {};
        graphSimNodes.forEach(n => nodeMap[`${n.kind}:${n.id}`] = n);
        return graphSimEdges
          .map(e => [nodeMap[`${e.from.kind}:${e.from.id}`], nodeMap[`${e.to.kind}:${e.to.id}`]])
          .filter(([a, b]) => a && b);
      }

      function enterGraphView() {
        buildGraphArrows();
        buildGraphData();
        drawGraph();
        requestAnimationFrame(graphFitAll);
        // Live simulation loop
        const liveChk = document.getElementById('graph-live');
        function simLoop() {
          if (S.view !== 'graph') return;
          if (liveChk.checked && !gDragging) {
            runForceSim(graphSimNodes, getGraphSprings(), 2);
            saveGraphPos();
            drawGraph();
          }
          S.graphAnimId = requestAnimationFrame(simLoop);
        }
        S.graphAnimId = requestAnimationFrame(simLoop);
      }

      function exitGraphView() {
        if (S.graphAnimId) { cancelAnimationFrame(S.graphAnimId); S.graphAnimId = null; }
        saveGraphPos(); save();
      }

      // Graph pan/zoom/drag
      graphSvg.addEventListener('mousedown', e => {
        if (e.button === 1 || (e.button === 0 && e.altKey) || e.button === 0) {
          gPanning = true; gPanStart = { x: e.clientX - S.gPan.x, y: e.clientY - S.gPan.y };
          graphSvg.classList.add('gp');
        }
      });
      document.addEventListener('mousemove', e => {
        if (gDragging) {
          const { n, sx, sy, ox, oy } = gDragging;
          n.x = ox + (e.clientX - sx) / S.gZoom; n.y = oy + (e.clientY - sy) / S.gZoom;
          saveGraphPos(); drawGraph();
        } else if (gPanning && S.view === 'graph') {
          S.gPan.x = e.clientX - gPanStart.x; S.gPan.y = e.clientY - gPanStart.y;
          updateGraphCam();
        }
      });
      document.addEventListener('mouseup', () => {
        if (gDragging) { gDragging.n.pinned = false; gDragging = null; }
        if (gPanning) { gPanning = false; graphSvg.classList.remove('gp'); }
      });
      graphSvg.addEventListener('wheel', e => {
        e.preventDefault();
        const dz = e.deltaY > 0 ? .9 : 1.1, nz = Math.max(.1, Math.min(4, S.gZoom * dz));
        const r = graphSvg.getBoundingClientRect();
        const mx = e.clientX - r.left, my = e.clientY - r.top;
        S.gPan.x = mx - (mx - S.gPan.x) * (nz / S.gZoom); S.gPan.y = my - (my - S.gPan.y) * (nz / S.gZoom);
        S.gZoom = nz; updateGraphCam();
      }, { passive: false });

      document.getElementById('graph-fit-btn').addEventListener('click', graphFitAll);
      document.getElementById('graph-layout-btn').addEventListener('click', () => {
        runForceSim(graphSimNodes, getGraphSprings(), 300);
        saveGraphPos(); drawGraph(); graphFitAll();
      });

      // ─── LENS MODE ────────────────────────────────────────────────────────
      function getObjData(ep) {
        if (ep.kind === 'idea') return S.ideas[ep.id];
        if (ep.kind === 'zone') return S.zones.find(z => z.id === ep.id);
        if (ep.kind === 'book') return S.books.find(b => b.id === ep.id);
        return null;
      }

      function getNeighborKeys(ep, depth) {
        const visited = new Set([`${ep.kind}:${ep.id}`]);
        let frontier = [ep];
        for (let d = 0; d < depth; d++) {
          const next = [];
          frontier.forEach(f => {
            S.connectors.forEach(c => {
              const check = (from, to) => {
                if (epEqual(from, f)) {
                  const k = `${to.kind}:${to.id}`;
                  if (!visited.has(k)) { visited.add(k); next.push(to); }
                }
              };
              check(c.from, c.to);
              check(c.to, c.from);
            });
          });
          frontier = next;
          if (!frontier.length) break;
        }
        return visited;
      }

      function applyLens() {
        if (!S.lensMode || !S.focused) { exitLensMode(); return; }
        const visible = getNeighborKeys(S.focused, S.lensDepth);
        document.querySelectorAll('.idea, .zone, .book').forEach(el => {
          if (el.style.display === 'none') return;
          let key = null;
          if (el.classList.contains('idea')) key = `idea:${el.id.replace('idea-', '')}`;
          else if (el.classList.contains('zone')) key = `zone:${el.id.replace('zone-', '')}`;
          else if (el.classList.contains('book')) key = `book:${el.id.replace('book-', '')}`;
          if (key) el.classList.toggle('lens-dim', !visible.has(key));
        });
      }

      function enterLensMode() {
        if (!S.focused) { toast('先にオブジェクトを選択してください'); return; }
        S.lensMode = true; S.lensDepth = 1;
        applyLens();
        toast('フォーカスレンズ — 1〜3 で深さ変更  L or Esc で終了');
        updateCmd();
      }

      function exitLensMode() {
        if (!S.lensMode) return;
        S.lensMode = false;
        document.querySelectorAll('.lens-dim').forEach(el => el.classList.remove('lens-dim'));
        updateCmd();
      }

      // ─── BRIDGE IDEA ─────────────────────────────────────────────────────
      function createBridgeIdea(fromEp, toEp) {
        const fromObj = getObjData(fromEp);
        const toObj = getObjData(toEp);
        if (!fromObj || !toObj) return;
        const mx = (fromObj.x + toObj.x) / 2 + (Math.random() - .5) * 40;
        const my = (fromObj.y + toObj.y) / 2 - 50;
        const id = S.nextId++;
        S.ideas[id] = { id, x: mx, y: my, text: '', color: 'purple' };
        renderIdea(id, true);
        const bridgeEp = { kind: 'idea', id };
        S.connectors.push({ id: `c${S.nextId++}`, from: fromEp, to: bridgeEp, type: 'line' });
        S.connectors.push({ id: `c${S.nextId++}`, from: bridgeEp, to: toEp, type: 'line' });
        redrawConnectors(); save(); updateStat();
        focus('idea', id); setMode('edit'); startEdit(id);
        toast('架け橋アイデア — 2つをつなぐ概念を入力してください');
      }

      // ─── AUTO LAYOUT (force-directed) ────────────────────────────────────
      function autoLayout() {
        const nodes = [];
        Object.values(S.ideas).forEach(o => {
          const el = getEl('idea', o.id);
          if (!el || el.style.display === 'none') return;
          nodes.push({
            id: o.id, kind: 'idea', x: o.x + (el.offsetWidth || 160) / 2, y: o.y + (el.offsetHeight || 80) / 2,
            w: el.offsetWidth || 160, h: el.offsetHeight || 80, vx: 0, vy: 0, fx: 0, fy: 0
          });
        });
        S.books.forEach(b => {
          const el = getEl('book', b.id);
          if (!el) return;
          nodes.push({
            id: b.id, kind: 'book', x: b.x + (el.offsetWidth || 180) / 2, y: b.y + (el.offsetHeight || 80) / 2,
            w: el.offsetWidth || 180, h: el.offsetHeight || 80, vx: 0, vy: 0, fx: 0, fy: 0
          });
        });
        if (nodes.length < 2) { toast('アイデアが少なすぎます'); return; }

        const nodeMap = {};
        nodes.forEach(n => nodeMap[`${n.kind}:${n.id}`] = n);
        const springs = [];
        S.connectors.forEach(c => {
          const a = nodeMap[`${c.from.kind}:${c.from.id}`];
          const b = nodeMap[`${c.to.kind}:${c.to.id}`];
          if (a && b) springs.push([a, b]);
        });

        const cx0 = nodes.reduce((s, n) => s + n.x, 0) / nodes.length;
        const cy0 = nodes.reduce((s, n) => s + n.y, 0) / nodes.length;

        runForceSim(nodes, springs, 180);

        // Re-center on original centroid
        const cx1 = nodes.reduce((s, n) => s + n.x, 0) / nodes.length;
        const cy1 = nodes.reduce((s, n) => s + n.y, 0) / nodes.length;
        nodes.forEach(n => { n.x += cx0 - cx1; n.y += cy0 - cy1; });

        // Capture start/end positions (center → top-left)
        const startPos = {}, endPos = {};
        nodes.forEach(n => {
          const obj = n.kind === 'idea' ? S.ideas[n.id] : S.books.find(b => b.id === n.id);
          if (!obj) return;
          const key = `${n.kind}:${n.id}`;
          startPos[key] = { x: obj.x, y: obj.y };
          endPos[key] = { x: n.x - n.w / 2, y: n.y - n.h / 2 };
        });

        const DURATION = 700, t0 = performance.now();
        function tick(t) {
          const p = Math.min((t - t0) / DURATION, 1);
          const ease = 1 - Math.pow(1 - p, 3);
          nodes.forEach(n => {
            const key = `${n.kind}:${n.id}`;
            const s = startPos[key], e = endPos[key]; if (!s || !e) return;
            const nx = s.x + (e.x - s.x) * ease, ny = s.y + (e.y - s.y) * ease;
            const obj = n.kind === 'idea' ? S.ideas[n.id] : S.books.find(b => b.id === n.id);
            if (!obj) return;
            obj.x = nx; obj.y = ny;
            const el = getEl(n.kind, n.id); if (el) { el.style.left = nx + 'px'; el.style.top = ny + 'px'; }
          });
          redrawConnectors();
          if (p < 1) requestAnimationFrame(tick);
          else { save(); toast('自動配置しました'); }
        }
        requestAnimationFrame(tick);
        toast('整列中...');
      }

      // ─── CONNECT MODE ─────────────────────────────────────────────────────
      function startConnectMode() {
        if (!S.focused) { toast('先にオブジェクトを選択してください'); return; }
        S.connectFrom = { ...S.focused };
        S.cmdMode = 'c'; S.cmdBuf = 'c';
        const srcEl = getEl(S.connectFrom.kind, S.connectFrom.id);
        if (srcEl) srcEl.classList.add('connect-source');
        updateCmd();
        toast(`接続元: ${endpointLabel(S.connectFrom)} — 矢印キー or f で相手を選択 → Enter:ライン  Shift+Enter:アロー  Esc:キャンセル`);
      }

      function exitConnectMode() {
        svgOverlay.querySelectorAll('.conn-preview').forEach(e => e.remove());
        if (S.connectFrom) {
          const srcEl = getEl(S.connectFrom.kind, S.connectFrom.id);
          if (srcEl) srcEl.classList.remove('connect-source');
        }
        S.connectFrom = null;
        S.cmdMode = null; S.cmdBuf = '';
        updateCmd();
      }

      function updateConnectLine() {
        svgOverlay.querySelectorAll('.conn-preview').forEach(e => e.remove());
        if (S.cmdMode !== 'c' || !S.connectFrom || !S.focused) return;
        if (epEqual(S.connectFrom, S.focused)) return;
        const a = objScreenCenter(S.connectFrom);
        const b = objScreenCenter(S.focused);
        if (!a || !b) return;
        const g = document.createElementNS('http://www.w3.org/2000/svg', 'g');
        g.classList.add('conn-preview');
        const dx = b.x - a.x, dy = b.y - a.y;
        const d = `M${a.x},${a.y} C${a.x + dx * .35},${a.y} ${a.x + dx * .65},${b.y} ${b.x},${b.y}`;
        const glow = document.createElementNS('http://www.w3.org/2000/svg', 'path');
        glow.setAttribute('d', d); glow.setAttribute('fill', 'none');
        glow.setAttribute('stroke', '#7b6cf6'); glow.setAttribute('stroke-width', '8'); glow.setAttribute('opacity', '.18');
        g.appendChild(glow);
        const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
        path.setAttribute('d', d); path.setAttribute('fill', 'none');
        path.setAttribute('stroke', '#fff'); path.setAttribute('stroke-width', '1.5');
        path.setAttribute('opacity', '.7'); path.setAttribute('stroke-dasharray', '7 3');
        g.appendChild(path);
        svgOverlay.appendChild(g);
      }

      function handleConnectKey(e) {
        if (e.key === 'Escape') { exitConnectMode(); return; }
        if (['ArrowLeft', 'ArrowRight', 'ArrowUp', 'ArrowDown'].includes(e.key)) {
          e.preventDefault();
          navigateFocus(e.key);
          updateConnectLine();
          return;
        }
        if (e.key === 'f') {
          e.preventDefault();
          openHintSelect(true); // return to connect mode after selection
          return;
        }
        if (e.key === 'Enter') {
          e.preventDefault();
          if (S.focused && !epEqual(S.connectFrom, S.focused)) {
            connectEndpoints(S.connectFrom, S.focused, e.shiftKey ? 'arrow' : 'line');
          }
          exitConnectMode();
          return;
        }
      }

      // ─── HINT SELECT (Vimium-style) ───────────────────────────────────────
      function openHintSelect(returnToConnect = false, bookMode = false, moveMode = false, bridgeMode = false) {
        closeHintSelect();
        const objs = [];
        if (bookMode) {
          // Book build: only visible ideas not yet selected
          Object.values(S.ideas).forEach(o => {
            const el = document.getElementById(`idea-${o.id}`);
            if (el && el.style.display !== 'none' && !S.bookSelection.includes(o.id))
              objs.push({ kind: 'idea', id: o.id });
          });
        } else if (moveMode) {
          // Move: all objects not yet in move selection
          const inSel = ({ kind, id }) => S.moveSelection.some(s => s.kind === kind && s.id === id);
          Object.values(S.ideas).forEach(o => {
            const el = document.getElementById(`idea-${o.id}`);
            if (el && el.style.display !== 'none' && !inSel({ kind: 'idea', id: o.id }))
              objs.push({ kind: 'idea', id: o.id });
          });
          S.zones.forEach(z => {
            const el = document.getElementById(`zone-${z.id}`);
            if (el && !inSel({ kind: 'zone', id: z.id })) objs.push({ kind: 'zone', id: z.id });
          });
          S.books.forEach(b => {
            const el = document.getElementById(`book-${b.id}`);
            if (el && !inSel({ kind: 'book', id: b.id })) objs.push({ kind: 'book', id: b.id });
          });
        } else {
          Object.values(S.ideas).forEach(o => {
            const el = document.getElementById(`idea-${o.id}`);
            if (el && el.style.display !== 'none') objs.push({ kind: 'idea', id: o.id });
          });
          S.zones.forEach(z => {
            const el = document.getElementById(`zone-${z.id}`);
            if (el) objs.push({ kind: 'zone', id: z.id });
          });
          S.books.forEach(b => {
            const el = document.getElementById(`book-${b.id}`);
            if (el) objs.push({ kind: 'book', id: b.id });
          });
        }
        if (!objs.length) {
          if (bookMode && S.bookSelection.length > 0) toast(`${S.bookSelection.length}件選択済 — Enter で確定`);
          if (moveMode && S.moveSelection.length > 0) toast(`${S.moveSelection.length}件選択済 — 矢印キーで移動`);
          return;
        }
        const chars = 'ASDFJKLGHQWERTYUIOPZXCVBNM';
        const hintMap = {};
        objs.forEach((obj, i) => {
          const h = i < chars.length ? chars[i] : chars[Math.floor(i / chars.length) - 1] + chars[i % chars.length];
          hintMap[h] = obj;
          const sc = objScreenCenter(obj);
          if (!sc) return;
          const div = document.createElement('div');
          div.className = 'hint-label';
          div.dataset.hint = h;
          div.textContent = h;
          div.style.left = sc.x + 'px';
          div.style.top = sc.y + 'px';
          document.body.appendChild(div);
        });
        S.hintMap = hintMap;
        S.hintBuf = '';
        S.hintReturnToConnect = returnToConnect;
        S.hintReturnToBook = bookMode;
        S.hintReturnToMove = moveMode;
        S.hintReturnToBridge = bridgeMode;
        S.cmdMode = 'hint';
        updateCmd();
      }

      function closeHintSelect() {
        document.querySelectorAll('.hint-label').forEach(e => e.remove());
        const wasBook = S.hintReturnToBook;
        const wasMove = S.hintReturnToMove;
        S.hintMap = null; S.hintBuf = '';
        S.hintReturnToConnect = false; S.hintReturnToBook = false;
        S.hintReturnToMove = false; S.hintReturnToBridge = false;
        if (S.cmdMode === 'hint') {
          // Restore the parent mode if we were in a multi-select flow
          if (wasMove) S.cmdMode = 'move';
          else if (wasBook) S.cmdMode = 'book';
          else S.cmdMode = null;
          updateCmd();
        }
      }

      function handleHintKey(e) {
        const k = e.key.toUpperCase();
        if (e.key === 'Escape') { closeHintSelect(); return; }
        if (/^[A-Z]$/.test(k)) {
          e.preventDefault();
          S.hintBuf += k;
          // Dim hints that no longer match
          document.querySelectorAll('.hint-label').forEach(el => {
            el.classList.toggle('faded', !el.dataset.hint.startsWith(S.hintBuf));
          });
          if (S.hintMap[S.hintBuf]) {
            const target = S.hintMap[S.hintBuf];
            const returnToConnect = S.hintReturnToConnect;
            const returnToBook = S.hintReturnToBook;
            const returnToMove = S.hintReturnToMove;
            const returnToBridge = S.hintReturnToBridge;
            const savedFrom = S.connectFrom ? { ...S.connectFrom } : null;
            closeHintSelect();
            if (returnToBook) {
              if (!S.bookSelection.includes(target.id)) S.bookSelection.push(target.id);
              const tEl = document.getElementById(`idea-${target.id}`);
              if (tEl) tEl.classList.add('book-selected');
              S.cmdMode = 'book';
              updateCmd();
              requestAnimationFrame(() => openHintSelect(false, true));
            } else if (returnToMove) {
              const ep = { kind: target.kind, id: target.id };
              if (!S.moveSelection.some(s => s.kind === ep.kind && s.id === ep.id)) {
                S.moveSelection.push(ep);
                const tEl = getEl(target.kind, target.id);
                if (tEl) tEl.classList.add('move-selected');
              }
              S.cmdMode = 'move';
              updateCmd();
              requestAnimationFrame(() => openHintSelect(false, false, true));
            } else if (returnToBridge) {
              S.connectFrom = null; S.cmdMode = null; S.cmdBuf = '';
              if (savedFrom) createBridgeIdea(savedFrom, { kind: target.kind, id: target.id });
            } else {
              focus(target.kind, target.id);
              if (returnToConnect && S.connectFrom) {
                S.cmdMode = 'c'; S.cmdBuf = 'c';
                updateConnectLine(); updateCmd();
              }
            }
          } else if (!Object.keys(S.hintMap).some(h => h.startsWith(S.hintBuf))) {
            closeHintSelect();
          } else {
            updateCmd();
          }
          return;
        }
      }

      // ─── PALETTE ──────────────────────────────────────────────────────────
      function openPalette() {
        if (!S.lastFocused) { toast('先にオブジェクトを選択してください'); return; }
        S.cmdMode = 'palette'; palette.classList.add('show'); updateCmd();
      }
      function closePalette() {
        palette.classList.remove('show');
        if (S.cmdMode === 'palette') S.cmdMode = null;
      }
      function handlePaletteKey(key) {
        const c = COLOR_KEYS[key];
        if (c) applyColor(c);
        closePalette(); updateCmd();
      }
      function applyColor(color) {
        const lf = S.lastFocused;
        if (!lf) return;
        if (lf.kind === 'idea') {
          const o = S.ideas[lf.id]; if (!o) return;
          o.color = color; renderIdea(lf.id); focus('idea', lf.id);
        } else if (lf.kind === 'zone') {
          const z = S.zones.find(z => z.id === lf.id); if (!z) return;
          z.color = color; renderZone(lf.id); focus('zone', lf.id);
        } else if (lf.kind === 'book') {
          const bk = S.books.find(b => b.id === lf.id); if (!bk) return;
          bk.color = color; renderBook(lf.id); focus('book', lf.id);
        }
        buildArrowMarkers(); redrawConnectors(); save();
      }
      document.querySelectorAll('.psw').forEach(sw => {
        sw.addEventListener('click', () => { applyColor(sw.dataset.c); closePalette(); });
      });

      // ─── DELETE ───────────────────────────────────────────────────────────
      function deleteSelected() {
        if (!S.focused) return;
        const { kind, id } = S.focused;
        const el = getEl(kind, id);
        if (el) { el.classList.add('fade-out'); setTimeout(() => el.remove(), 200); }
        const rmConns = () => {
          S.connectors = S.connectors.filter(c =>
            !(c.from.kind === kind && c.from.id === id) && !(c.to.kind === kind && c.to.id === id));
        };
        if (kind === 'idea') {
          delete S.ideas[id];
          S.noteOrder = S.noteOrder.filter(oid => oid !== id);
          rmConns();
          S.books.forEach(b => { b.children = b.children.filter(c => c !== id); });
          S.books.forEach(b => renderBook(b.id));
          redrawConnectors();
        } else if (kind === 'zone') {
          S.zones = S.zones.filter(z => z.id !== id);
          rmConns(); redrawConnectors();
        } else if (kind === 'book') {
          S.books = S.books.filter(b => b.id !== id);
          rmConns(); syncIdeaVisibility(); redrawConnectors();
        }
        S.focused = null;
        save(); updateStat(); updateCmd();
      }

      // ─── CMD / STATUS ─────────────────────────────────────────────────────
      function updateCmd() {
        let txt = '';
        if (S.cmdMode === 'c' && S.connectFrom)
          txt = `接続元: ${endpointLabel(S.connectFrom)} → 矢印キー/f で対象選択  Enter:ライン  Shift+Enter:アロー  Esc:中止`;
        else if (S.cmdMode === 'hint' && S.hintReturnToBook)
          txt = `ブック追加 — ${S.bookSelection.length}件選択済  [${S.hintBuf || '_'}]  Enter:確定  Esc:キャンセル`;
        else if (S.cmdMode === 'hint' && S.hintReturnToMove)
          txt = `移動対象を選択 — ${S.moveSelection.length}件選択済  [${S.hintBuf || '_'}]  矢印:移動  Esc:終了`;
        else if (S.cmdMode === 'hint')
          txt = `ジャンプ [${S.hintBuf || '_'}] — アルファベットを入力  Esc:キャンセル`;
        else if (S.cmdMode === 'book')
          txt = `ブック作成: ${S.bookSelection.length}件選択済  f:追加  Enter:確定  Esc:キャンセル`;
        else if (S.cmdMode === 'move')
          txt = `移動モード: ${S.moveSelection.length}件選択済  f:追加  ↑↓←→:移動  Shift+↑↓:大移動  Enter:確定  Esc:終了`;
        else if (S.cmdBuf) txt = S.cmdBuf;
        else if (S.cmdMode === 'palette') txt = 'COLOR: 1紫  2シアン  3緑  4琥珀  5ピンク  Esc:キャンセル';
        else if (S.mode === 'resize') txt = `リサイズモード — ↑↓←→:サイズ変更  Enter:確定`;
        else if (S.cmdMode === 'v') txt = 'VIEW: Enter=全体  1-9=テンキー位置  Esc:キャンセル';
        else if (S.cmdMode === 'bridge') txt = `架け橋: 接続先を選択 — f:選択  Esc:キャンセル`;
        else if (S.lensMode) txt = `フォーカスレンズ (深さ:${S.lensDepth}) — 1〜3:深さ変更  L/Esc:終了`;
        else if (S.focused) { const { kind } = S.focused; txt = `${kind} 選択中 — Enter:編集  c:接続  g:架け橋  l:レンズ  f:別を選択  p:カラー  u:解除  x:削除`; }
        cmdBufEl.textContent = txt;
      }
      function updateStat() {
        const ni = Object.keys(S.ideas).length, nc = S.connectors.length, nz = S.zones.length, nb = S.books.length;
        let s = `${ni} idea${ni !== 1 ? 's' : ''}`;
        if (nc) s += ` · ${nc} conn`;
        if (nz) s += ` · ${nz} zone${nz !== 1 ? 's' : ''}`;
        if (nb) s += ` · ${nb} book${nb !== 1 ? 's' : ''}`;
        cmdStat.textContent = s;
      }

      // ─── THEME ────────────────────────────────────────────────────────────
      document.getElementById('theme-btn').addEventListener('click', () => {
        S.theme = S.theme === 'dark' ? 'light' : 'dark';
        document.body.classList.toggle('light', S.theme === 'light');
        document.getElementById('theme-btn').textContent = S.theme === 'dark' ? '◑' : '◐';
        save();
      });

      // ─── PERSIST ──────────────────────────────────────────────────────────
      let saveTimer;
      function save() {
        clearTimeout(saveTimer);
        saveTimer = setTimeout(() => {
          try {
            localStorage.setItem('ideaboard_v4', JSON.stringify({
              ideas: S.ideas, connectors: S.connectors, zones: S.zones, books: S.books,
              nextId: S.nextId, pan: S.pan, zoom: S.zoom, theme: S.theme, noteSort: S.noteSort, noteOrder: S.noteOrder,
              graphPos: S.graphPos
            }));
          } catch (e) { }
        }, 400);
      }

      function loadSaved() {
        try {
          const raw = localStorage.getItem('ideaboard_v4') || localStorage.getItem('ideaboard_v3');
          if (!raw) return false;
          const d = JSON.parse(raw);
          Object.assign(S, {
            ideas: d.ideas || {}, connectors: d.connectors || [],
            zones: d.zones || [], books: d.books || [],
            nextId: d.nextId || 1, pan: d.pan || S.pan, zoom: d.zoom || 1, theme: d.theme || 'dark', noteSort: d.noteSort || 'az', noteOrder: d.noteOrder || [],
            graphPos: d.graphPos || {}
          });
          // normalize idea ids to numbers
          const fixed = {};
          Object.entries(S.ideas).forEach(([k, v]) => { fixed[+k] = v; v.id = +v.id; });
          S.ideas = fixed;
          // normalize connectors: old format had numeric from/to, new format uses {kind,id}
          S.connectors.forEach(c => {
            if (typeof c.from !== 'object') c.from = { kind: 'idea', id: +c.from };
            if (typeof c.to !== 'object') c.to = { kind: 'idea', id: +c.to };
          });
          return true;
        } catch (e) { return false; }
      }

      function renderAll() {
        objLayer.innerHTML = ''; zonesLayer.innerHTML = '';
        S.zones.forEach(z => renderZone(z.id));
        Object.values(S.ideas).forEach(o => renderIdea(o.id));
        S.books.forEach(b => renderBook(b.id));
        syncIdeaVisibility();
        buildArrowMarkers();
        redrawConnectors();
        applyXform(); updateStat();
        document.body.classList.toggle('light', S.theme === 'light');
        document.getElementById('theme-btn').textContent = S.theme === 'dark' ? '◑' : '◐';
      }

      // ─── NOTE SYSTEM ──────────────────────────────────────────────────────
      function noteTitle(idea) {
        const t = (idea?.text || '').trim();
        if (!t) return '(無題)';
        let first = t.split('\n').find(l => l.trim()) || '';
        first = first.replace(/^#{1,6}\s*/, '').trim();
        return (first.slice(0, 80) || '(無題)');
      }
      function findIdeaByTitle(title) {
        const n = s => (s || '').trim().toLowerCase();
        const tn = n(title);
        return Object.values(S.ideas).find(o => n(noteTitle(o)) === tn) || null;
      }
      function extractWikilinks(text) {
        const out = [], re = /\[\[([^\]\n]+)\]\]/g; let m;
        while ((m = re.exec(text || ''))) {
          const t = m[1].trim();
          if (t && !out.includes(t)) out.push(t);
        }
        return out;
      }

      // Minimal dependency-free markdown renderer (escape-first)
      function mdRender(src) {
        src = String(src || '');
        const blocks = [];
        // fenced code
        src = src.replace(/```([\s\S]*?)```/g, (_, c) => {
          blocks.push(`<pre><code>${esc(c.replace(/^\n/, ""))}</code></pre>`);
          return `\x00B${blocks.length - 1}\x00`;
        });
        const lines = src.split('\n');
        let html = '';
        // nested list stack: [{type:"ul"|"ol", indent:number}]
        const listStack = [];
        const closeListsTo = (targetIndent) => {
          while (listStack.length && listStack[listStack.length - 1].indent > targetIndent) {
            html += `</${listStack.pop().type}>`;
          }
        };
        const closeLists = () => { while (listStack.length) html += `</${listStack.pop().type}>`; };
        const inline = s => {
          s = esc(s);
          s = s.replace(/\[\[([^\]]+)\]\]/g, (_, t) => {
            t = t.trim();
            const found = findIdeaByTitle(t);
            return `<span class="wikilink${found ? "" : " missing"}" data-wl="${esc(t)}">${esc(t)}</span>`;
          });
          s = s.replace(/`([^`]+)`/g, '<code>$1</code>');
          s = s.replace(/~~([^~]+)~~/g, '<del>$1</del>');
          s = s.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
          s = s.replace(/(^|[^*])\*([^*\n]+)\*/g, '$1<em>$2</em>');
          s = s.replace(/(^|[^_])_([^_\n]+)_/g, '$1<em>$2</em>');
          // named links before bare URLs
          s = s.replace(/\[([^\]]+)\]\((https?:\/\/[^\s)]+)\)/g,
            '<a href="$2" target="_blank" rel="noopener noreferrer">$1</a>');
          // bare URLs not already inside an href
          s = s.replace(/(^|[\s(])(https?:\/\/[^\s<)"]+)/g,
            '$1<a href="$2" target="_blank" rel="noopener noreferrer">$2</a>');
          return s;
        };
        for (let raw of lines) {
          const line = raw.replace(/\r$/, '');
          const ph = line.match(/^\x00B(\d+)\x00$/);
          if (ph) { closeLists(); html += blocks[+ph[1]]; continue; }
          if (/^\s*$/.test(line)) { closeLists(); continue; }
          let m;
          if ((m = line.match(/^(#{1,6})\s+(.*)$/))) {
            closeLists(); html += `<h${m[1].length}>${inline(m[2])}</h${m[1].length}>`; continue;
          }
          if (/^\s*([-*_])\s*\1\s*\1[\s\1]*$/.test(line)) { closeLists(); html += "<hr>"; continue; }
          if ((m = line.match(/^(>\s?)(.*)/))) { closeLists(); html += `<blockquote>${inline(m[2])}</blockquote>`; continue; }
          // task list
          if ((m = line.match(/^(\s*)([-*+])\s+\[([ xX])\]\s+(.*)/))) {
            const indent = m[1].length;
            const done = m[3].toLowerCase() === "x";
            closeListsTo(indent - 1);
            if (!listStack.length || listStack[listStack.length - 1].indent < indent) {
              html += "<ul>"; listStack.push({ type: "ul", indent });
            }
            html += `<li class="task${done ? " done" : ""}><span class="cb">${done ? "☑" : "☐"}</span> ${inline(m[4])}</li>`; continue;
          }
          // unordered list
          if ((m = line.match(/^(\s*)[-*+]\s+(.*)/))) {
            const indent = m[1].length;
            closeListsTo(indent - 1);
            if (!listStack.length || listStack[listStack.length - 1].indent < indent) {
              html += "<ul>"; listStack.push({ type: "ul", indent });
            }
            html += `<li>${inline(m[2])}</li>`; continue;
          }
          // ordered list
          if ((m = line.match(/^(\s*)\d+\.\s+(.*)/))) {
            const indent = m[1].length;
            closeListsTo(indent - 1);
            if (!listStack.length || listStack[listStack.length - 1].indent < indent) {
              html += "<ol>"; listStack.push({ type: "ol", indent });
            }
            html += `<li>${inline(m[2])}</li>`; continue;
          }
          closeLists(); html += `<p>${inline(line)}</p>`;
        }
        closeLists();
        return html;
      }
      // Links for a given idea id
      function noteBacklinks(id) {
        const title = noteTitle(S.ideas[id]);
        const n = s => (s || '').trim().toLowerCase();
        const tn = n(title);
        const out = [];
        Object.values(S.ideas).forEach(o => {
          if (o.id === id) return;
          if (extractWikilinks(o.text).some(w => n(w) === tn)) out.push(o.id);
        });
        return out;
      }
      function noteConnLinks(id) {
        const ids = new Set();
        S.connectors.forEach(c => {
          if (c.from.kind === 'idea' && c.to.kind === 'idea') {
            if (c.from.id === id) ids.add(c.to.id);
            else if (c.to.id === id) ids.add(c.from.id);
          }
        });
        return [...ids];
      }
      function noteOutlinks(id) {
        return extractWikilinks(S.ideas[id]?.text).map(t => ({ title: t, target: findIdeaByTitle(t) }));
      }
      function hasConnectorBetween(a, b) {
        return S.connectors.some(c =>
          c.from.kind === 'idea' && c.to.kind === 'idea' &&
          ((c.from.id === a && c.to.id === b) || (c.from.id === b && c.to.id === a)));
      }
      function materializeLink(fromId, toId) {
        if (hasConnectorBetween(fromId, toId)) { toast('既に接続済みです'); return; }
        S.connectors.push({ id: `c${S.nextId++}`, from: { kind: 'idea', id: fromId }, to: { kind: 'idea', id: toId }, type: 'link' });
        rebuildNoteLinkBlock(fromId); rebuildNoteLinkBlock(toId);
        redrawConnectors(); save();
        toast('ボード上でリンクを接続しました');
        if (S.view === 'note') renderNoteLinks();
      }
      function createNoteFromTitle(title, nearId) {
        const base = nearId != null ? S.ideas[nearId] : null;
        const x = base ? base.x + 60 : 400;
        const y = base ? base.y + 120 : 300;
        const id = S.nextId++;
        S.ideas[id] = { id, x, y, text: `# ${title}\n\n`, color: base?.color || 'purple' };
        if (!S.noteOrder.includes(id)) S.noteOrder.push(id);
        renderIdea(id);
        save(); updateStat();
        return id;
      }

      // ─── VIEW SWITCH ──────────────────────────────────────────────────────
      const noteView = document.getElementById('note-view');
      function switchView(v) {
        const prev = S.view;
        if (prev === 'graph' && v !== 'graph') exitGraphView();
        S.view = v;
        document.querySelectorAll('.vs-btn').forEach(b =>
          b.classList.toggle('active', b.dataset.view === v));
        noteView.classList.toggle('show', v === 'note');
        graphView.classList.toggle('show', v === 'graph');
        if (v === 'note') {
          if (!S.activeNote || !S.ideas[S.activeNote]) {
            const first = Object.values(S.ideas)[0];
            S.activeNote = first ? first.id : null;
          }
          renderNoteList();
          selectNote(S.activeNote);
        } else if (v === 'graph') {
          enterGraphView();
        } else {
          renderAll();
        }
      }

      function openNote(id) {
        if (id != null && S.ideas[id]) S.activeNote = id;
        switchView('note');
      }

      function getSortedNoteItems(filter = '') {
        const f = filter.trim().toLowerCase();
        let items = Object.values(S.ideas)
          .map(o => ({ id: o.id, title: noteTitle(o), text: (o.text || '') }))
          .filter(o => !f || o.title.toLowerCase().includes(f) || o.text.toLowerCase().includes(f));
        if (S.noteSort === 'az') items.sort((a, b) => a.title.localeCompare(b.title, 'ja'));
        else if (S.noteSort === 'za') items.sort((a, b) => b.title.localeCompare(a.title, 'ja'));
        else if (S.noteSort === 'new') items.sort((a, b) => b.id - a.id);
        else if (S.noteSort === 'manual') {
          const orderMap = new Map(S.noteOrder.map((id, i) => [id, i]));
          items.sort((a, b) => (orderMap.has(a.id) ? orderMap.get(a.id) : 9999) - (orderMap.has(b.id) ? orderMap.get(b.id) : 9999));
        } else items.sort((a, b) => a.id - b.id);
        return items;
      }
      function renderNoteList(filter = '') {
        const box = document.getElementById('note-list-items');
        const items = getSortedNoteItems(filter !== undefined ? filter : document.getElementById('note-search').value);
        box.innerHTML = items.map(o =>
          `<div class="nl-item${o.id === S.activeNote ? ' active' : ''}" data-id="${o.id}">${esc(o.title)}</div>`
        ).join('') || '<div class="nlk-empty" style="padding:8px">該当なし</div>';
        box.querySelectorAll('.nl-item').forEach(el =>
          el.addEventListener('click', () => selectNote(+el.dataset.id)));
        const activeEl = box.querySelector('.nl-item.active');
        if (activeEl) activeEl.scrollIntoView({ block: 'nearest' });
        const sb = document.getElementById('note-sort-btn');
        if (sb) sb.textContent = { az: 'A→Z', za: 'Z→A', new: '新→古', old: '古→新', manual: '手動' }[S.noteSort] || 'A→Z';
      }

      function selectNote(id) {
        if (id == null || !S.ideas[id]) {
          S.activeNote = null;
          document.getElementById('note-name').textContent = 'メモがありません';
          document.getElementById('note-ta').value = '';
          document.getElementById('note-preview').innerHTML = '';
          document.getElementById('note-links').innerHTML = '';
          return;
        }
        S.activeNote = id;
        const o = S.ideas[id];
        document.getElementById('note-name').textContent = noteTitle(o);
        document.getElementById('note-color').style.background = COLOR_HEX[o.color || 'purple'];
        const ta = document.getElementById('note-ta');
        ta.value = o.text || '';
        wlClose();
        renderNotePreview();
        renderNoteList(document.getElementById('note-search').value);
        renderNoteLinks();
      }

      function renderNotePreview() {
        const o = S.ideas[S.activeNote]; if (!o) return;
        const pv = document.getElementById('note-preview');
        pv.innerHTML = mdRender(o.text);
        pv.querySelectorAll('.wikilink').forEach(el =>
          el.addEventListener('click', () => openWikilink(el.dataset.wl)));
      }

      function openWikilink(title) {
        let t = findIdeaByTitle(title);
        if (!t) {
          const id = createNoteFromTitle(title, S.activeNote);
          renderNoteList(document.getElementById('note-search').value);
          selectNote(id);
        } else {
          selectNote(t.id);
        }
      }

      function renderNoteLinks() {
        const id = S.activeNote;
        const box = document.getElementById('note-links');
        if (id == null) { box.innerHTML = ''; return; }
        const mkItem = (tid, withConnect) => {
          const o = S.ideas[tid]; if (!o) return '';
          const linked = withConnect && !hasConnectorBetween(id, tid);
          return `<div class="nlk-item" data-go="${tid}">
        <span class="nlk-tx">${esc(noteTitle(o))}</span>
        ${linked ? `<span class="nlk-link" data-link="${tid}">＋つなぐ</span>` : ''}
      </div>`;
        };
        const mkBackItem = (tid) => {
          const o = S.ideas[tid]; if (!o) return '';
          const alreadyBack = noteOutlinks(id).some(l => l.target && l.target.id === tid);
          const linked = !hasConnectorBetween(id, tid);
          return `<div class="nlk-item" data-go="${tid}">
        <span class="nlk-tx">${esc(noteTitle(o))}</span>
        ${!alreadyBack ? `<span class="nlk-back" data-back="${tid}">← リンク追記</span>` : ''}
        ${linked ? `<span class="nlk-link" data-link="${tid}">＋つなぐ</span>` : ''}
      </div>`;
        };
        const back = noteBacklinks(id);
        const conn = noteConnLinks(id);
        const out = noteOutlinks(id);
        let h = '';
        h += `<div class="nlk-sec">発リンク [[ ]]</div>`;
        h += out.length ? out.map(l =>
          l.target ? mkItem(l.target.id, true)
            : `<div class="nlk-item missing" data-new="${esc(l.title)}"><span class="nlk-tx" style="color:var(--pink)">${esc(l.title)}</span><span class="nlk-link">作成</span></div>`
        ).join('') : '<div class="nlk-empty">なし</div>';
        h += `<div class="nlk-sec">バックリンク <span style="font-size:9px;opacity:.6">（このメモへリンクしているメモ）</span></div>`;
        h += back.length ? back.map(b => mkBackItem(b)).join('') : '<div class="nlk-empty">なし</div>';
        h += `<div class="nlk-sec">ボード接続</div>`;
        h += conn.length ? conn.map(c => mkItem(c, false)).join('') : '<div class="nlk-empty">なし</div>';
        box.innerHTML = h;
        box.querySelectorAll('.nlk-item').forEach(el => {
          const go = el.dataset.go, nw = el.dataset.new;
          el.addEventListener('click', e => {
            if (e.target.dataset.link) { materializeLink(id, +e.target.dataset.link); return; }
            if (e.target.dataset.back) {
              const backId = +e.target.dataset.back;
              if (!S.ideas[id] || !S.ideas[backId]) return;
              if (hasConnectorBetween(id, backId)) { toast('既にリンク済みです'); return; }
              S.connectors.push({ id: `c${S.nextId++}`, from: { kind: 'idea', id }, to: { kind: 'idea', id: backId }, type: 'link' });
              rebuildNoteLinkBlock(id); rebuildNoteLinkBlock(backId);
              redrawConnectors(); save(); renderNoteLinks();
              toast(`[[${noteTitle(S.ideas[backId])}]] を追記しました`);
              return;
            }
            if (nw != null) { openWikilink(nw); return; }
            if (go != null) selectNote(+go);
          });
        });
      }

      function navigateToNoteOnBoard(id) {
        switchView('board');
        const o = S.ideas[id]; if (!o) return;
        const el = getEl('idea', id);
        const w = el ? el.offsetWidth : 160, h = el ? el.offsetHeight : 80;
        const r = boardWrap.getBoundingClientRect();
        S.zoom = Math.min(Math.max(S.zoom, 1), 1.4);
        S.pan.x = r.width / 2 - (o.x + w / 2) * S.zoom;
        S.pan.y = r.height / 2 - (o.y + h / 2) * S.zoom;
        applyXform(); redrawConnectors();
        focus('idea', id);
      }

      // Note view wiring
      document.querySelectorAll('.vs-btn').forEach(b =>
        b.addEventListener('click', () => switchView(b.dataset.view)));
      document.getElementById('note-search').addEventListener('input', e =>
        renderNoteList(e.target.value));
      document.getElementById('note-new').addEventListener('click', () => {
        const id = createNoteFromTitle('新規メモ', S.activeNote);
        renderNoteList();
        selectNote(id);
        enterNoteEdit();
        setTimeout(() => document.getElementById('note-ta').select(), 0);
      });
      // ── [[ ]] autocomplete ──
      const wlAutoEl = document.getElementById('wl-auto');
      const wlA = { active: false, start: -1, query: '', items: [], sel: 0 };

      function wlClose() {
        wlA.active = false;
        wlAutoEl.classList.remove('show');
        wlAutoEl.innerHTML = '';
      }
      function wlScan(ta) {
        const before = ta.value.slice(0, ta.selectionStart);
        const m = before.match(/\[\[([^\[\]\n]*)$/);
        if (!m) { wlClose(); return; }
        wlA.start = ta.selectionStart - m[1].length - 2; // pos of '[['
        wlA.query = m[1];
        const q = m[1].trim().toLowerCase();
        const titles = Object.values(S.ideas)
          .filter(o => o.id !== S.activeNote)
          .map(o => noteTitle(o))
          .filter((t, i, a) => a.indexOf(t) === i && (!q || t.toLowerCase().includes(q)))
          .sort((a, b) => a.localeCompare(b, 'ja'))
          .slice(0, 7);
        const exact = titles.some(t => t.toLowerCase() === q);
        wlA.items = titles.map(t => ({ label: t, create: false }));
        if (q && !exact) wlA.items.push({ label: wlA.query.trim(), create: true });
        if (!wlA.items.length) { wlClose(); return; }
        wlA.sel = 0; wlA.active = true;
        wlRender();
      }
      function wlRender() {
        wlAutoEl.innerHTML = '<div class="wla-hd">[[ リンク ]]  ↑↓ 選択 / Enter 確定 / Esc</div>' +
          wlA.items.map((it, i) =>
            `<div class="wla-item${it.create ? ' create' : ''}${i === wlA.sel ? ' sel' : ''}" data-i="${i}">${it.create ? `＋ 「${esc(it.label)}」を新規作成` : esc(it.label)
            }</div>`).join('');
        wlAutoEl.classList.add('show');
        wlAutoEl.querySelectorAll('.wla-item').forEach(el =>
          el.addEventListener('mousedown', ev => { ev.preventDefault(); wlConfirm(+el.dataset.i); }));
      }
      function wlConfirm(idx) {
        const ta = document.getElementById('note-ta');
        const it = wlA.items[idx]; if (!it) return;
        const o = S.ideas[S.activeNote]; if (!o) return;
        const after = ta.value.slice(ta.selectionStart);
        const insert = `[[${it.label}]]`;
        ta.value = ta.value.slice(0, wlA.start) + insert + after;
        const caret = wlA.start + insert.length;
        ta.setSelectionRange(caret, caret);
        o.text = ta.value;
        document.getElementById('note-name').textContent = noteTitle(o);
        if (it.create && !findIdeaByTitle(it.label)) createNoteFromTitle(it.label, S.activeNote);
        if (S.notePreview) renderNotePreview();
        save();
        wlClose();
        ta.focus();
      }

      document.getElementById('note-ta').addEventListener('input', e => {
        const o = S.ideas[S.activeNote]; if (!o) return;
        o.text = e.target.value;
        document.getElementById('note-name').textContent = noteTitle(o);
        if (S.notePreview) renderNotePreview();
        save();
        wlScan(e.target);
      });
      document.getElementById('note-ta').addEventListener('keydown', e => {
        // Shift+Enter: exit edit mode
        if (e.key === 'Enter' && e.shiftKey && !wlA.active) { e.preventDefault(); e.stopPropagation(); document.getElementById('note-ta').blur(); return; }
        if (!wlA.active) return;
        if (e.key === 'ArrowDown') { e.preventDefault(); wlA.sel = (wlA.sel + 1) % wlA.items.length; wlRender(); }
        else if (e.key === 'ArrowUp') { e.preventDefault(); wlA.sel = (wlA.sel - 1 + wlA.items.length) % wlA.items.length; wlRender(); }
        else if (e.key === 'Enter' || e.key === 'Tab') { e.preventDefault(); wlConfirm(wlA.sel); }
        else if (e.key === 'Escape') { e.preventDefault(); e.stopPropagation(); wlClose(); }
      });
      document.getElementById('note-ta').addEventListener('blur', () => {
        // Sync connectors with the managed link block edited by the user
        const id = S.activeNote;
        if (id && S.ideas[id]) {
          const n = s => (s || '').trim().toLowerCase();
          const { links } = splitNote(S.ideas[id].text || '');
          const expected = connectorLinkTitlesFor(id);
          // Links the user added → create a 'link' connector
          links.forEach(t => {
            if (expected.some(e => n(e) === n(t))) return;
            const target = findIdeaByTitle(t);
            if (!target || target.id === id) return;
            const exists = S.connectors.some(c =>
              c.from.kind === 'idea' && c.to.kind === 'idea' &&
              ((c.from.id === id && c.to.id === target.id) ||
               (c.type === 'line' && c.from.id === target.id && c.to.id === id)));
            if (!exists) S.connectors.push({ id: `c${S.nextId++}`, from: { kind: 'idea', id }, to: { kind: 'idea', id: target.id }, type: 'link' });
          });
          // Links the user removed → drop the matching connector
          expected.forEach(t => {
            if (links.some(l => n(l) === n(t))) return;
            const target = findIdeaByTitle(t);
            if (!target) return;
            S.connectors = S.connectors.filter(c => {
              if (c.from.kind !== 'idea' || c.to.kind !== 'idea') return true;
              const match = (c.from.id === id && c.to.id === target.id) ||
                            (c.type === 'line' && c.from.id === target.id && c.to.id === id);
              return !match;
            });
          });
          rebuildAllNoteLinkBlocks();
          redrawConnectors(); save();
        }
        setTimeout(wlClose, 120);
        renderNoteList(document.getElementById('note-search').value);
        renderNoteLinks();
      });
      function toggleNotePreview() {
        S.notePreview = !S.notePreview;
        document.getElementById('note-ta').classList.toggle('hidden', S.notePreview);
        document.getElementById('note-preview').classList.toggle('hidden', !S.notePreview);
        document.getElementById('note-toggle-prev').textContent = S.notePreview ? '編集' : 'プレビュー';
        if (S.notePreview) renderNotePreview();
        else document.getElementById('note-ta').focus();
      }
      function enterNoteEdit() {
        if (S.notePreview) toggleNotePreview();
        document.getElementById('note-ta').focus();
      }
      document.getElementById('note-toggle-prev').addEventListener('click', toggleNotePreview);
      document.getElementById('note-sort-btn').addEventListener('click', () => {
        const order = ['az', 'za', 'new', 'old'];
        S.noteSort = order[(order.indexOf(S.noteSort) + 1) % order.length];
        renderNoteList(document.getElementById('note-search').value);
        save();
      });
      document.getElementById('note-open-board').addEventListener('click', () => {
        if (S.activeNote != null) navigateToNoteOnBoard(S.activeNote);
        else switchView('board');
      });
      document.getElementById('note-json-export').addEventListener('click', exportJSON);
      document.getElementById('note-json-import').addEventListener('click', () =>
        document.getElementById('note-imp').click());
      document.getElementById('note-imp').addEventListener('change', ev => {
        importJSON(ev);
      });
      document.getElementById('note-txt-export').addEventListener('click', exportCurrentNoteText);

      // ─── MARKDOWN EXPORT ──────────────────────────────────────────────────
      function exportMarkdown() {
        const lines = [];
        lines.push('# IDEA BOARD');
        lines.push('');
        lines.push(`> エクスポート: ${new Date().toLocaleDateString('ja-JP')}`);
        lines.push('');

        // 1. Determine which zone each idea belongs to (by position containment)
        const ideaZone = {};
        Object.values(S.ideas).forEach(idea => {
          for (const z of S.zones) {
            if (idea.x >= z.x && idea.x <= z.x + z.w &&
              idea.y >= z.y && idea.y <= z.y + z.h) {
              ideaZone[idea.id] = z.id;
              break;
            }
          }
        });

        // 2. Build directed adjacency list from connectors (idea-to-idea only)
        const childrenOf = {}; // parent id → [child ids]
        const parentOf = {}; // child id → parent id
        S.connectors.forEach(conn => {
          if (conn.from.kind !== 'idea' || conn.to.kind !== 'idea') return;
          let parentId, childId;
          if (conn.type === 'arrow') {
            parentId = conn.from.id; childId = conn.to.id;
          } else {
            parentId = Math.min(conn.from.id, conn.to.id);
            childId = Math.max(conn.from.id, conn.to.id);
          }
          if (!childrenOf[parentId]) childrenOf[parentId] = [];
          childrenOf[parentId].push(childId);
          if (!parentOf[childId]) parentOf[childId] = parentId; // first parent wins
        });
        // 2b. Add [[wikilink]] edges (A contains [[B]] → A is parent of B)
        Object.values(S.ideas).forEach(a => {
          extractWikilinks(a.text).forEach(title => {
            const b = findIdeaByTitle(title);
            if (!b || b.id === a.id) return;
            if (!childrenOf[a.id]) childrenOf[a.id] = [];
            if (!childrenOf[a.id].includes(b.id)) childrenOf[a.id].push(b.id);
            if (!parentOf[b.id]) parentOf[b.id] = a.id;
          });
        });

        // 3. DFS printer
        const printed = new Set();
        function printIdea(id, indent) {
          if (printed.has(id)) return;
          printed.add(id);
          const idea = S.ideas[id];
          if (!idea) return;
          const text = (idea.text || '').trim();
          const firstLine = (text.split('\n')[0] || '(空)').replace(/^#{1,6}\s*/, '');
          const rest = text.split('\n').slice(1).join('\n').trim();
          lines.push(`${indent}- ${firstLine}`);
          if (rest) rest.split('\n').forEach(l => lines.push(`${indent}  ${l}`));
          (childrenOf[id] || []).slice().sort((a, b) => a - b).forEach(cid => printIdea(cid, indent + '  '));
        }

        // 4. Print zone chapters (sorted by zone number)
        const sortedZones = [...S.zones].sort((a, b) => +a.id.replace('z', '') - +b.id.replace('z', ''));
        const allIds = Object.keys(S.ideas).map(Number).sort((a, b) => a - b);

        sortedZones.forEach(z => {
          const zoneIdeas = allIds.filter(id => ideaZone[id] === z.id);
          if (!zoneIdeas.length) return;
          lines.push(`## ${z.label}`);
          lines.push('');
          // Roots = ideas with no parent inside this zone
          const roots = zoneIdeas.filter(id => {
            const p = parentOf[id];
            return !p || !zoneIdeas.includes(p);
          }).sort((a, b) => a - b);
          roots.forEach(id => printIdea(id, ''));
          zoneIdeas.forEach(id => { if (!printed.has(id)) printIdea(id, ''); });
          lines.push('');
        });

        // 5. Ungrouped ideas
        const ungrouped = allIds.filter(id => !ideaZone[id]);
        if (ungrouped.length) {
          lines.push('## ゾーンなし');
          lines.push('');
          const roots = ungrouped.filter(id => {
            const p = parentOf[id];
            return !p || !ungrouped.includes(p);
          }).sort((a, b) => a - b);
          roots.forEach(id => printIdea(id, ''));
          ungrouped.forEach(id => { if (!printed.has(id)) printIdea(id, ''); });
          lines.push('');
        }

        const md = lines.join('\n');
        const blob = new Blob([md], { type: 'text/markdown' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url; a.download = `ideaboard-${Date.now()}.md`;
        a.click(); URL.revokeObjectURL(url);
        toast('Markdownをエクスポートしました');
      }

      // ─── EXPORT / IMPORT ──────────────────────────────────────────────────
      function exportJSON() {
        const data = {
          ideas: S.ideas, connectors: S.connectors, zones: S.zones, books: S.books,
          nextId: S.nextId, noteSort: S.noteSort, noteOrder: S.noteOrder,
          meta: { exported: new Date().toISOString(), version: 4 }
        };
        const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url; a.download = `ideaboard-${Date.now()}.json`;
        a.click(); URL.revokeObjectURL(url);
        toast('JSONをエクスポートしました');
      }
      function importJSON(ev) {
        const file = ev.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = e => {
          try {
            const d = JSON.parse(e.target.result);
            Object.assign(S, {
              ideas: d.ideas || {}, connectors: d.connectors || [],
              zones: d.zones || [], books: d.books || [],
              nextId: d.nextId || 1,
              noteSort: d.noteSort || S.noteSort,
              noteOrder: d.noteOrder || []
            });
            const fixed = {};
            Object.entries(S.ideas).forEach(([k, v]) => { fixed[+k] = v; v.id = +v.id; });
            S.ideas = fixed;
            S.connectors.forEach(c => {
              if (typeof c.from !== 'object') c.from = { kind: 'idea', id: +c.from };
              if (typeof c.to !== 'object') c.to = { kind: 'idea', id: +c.to };
            });
            renderAll(); save();
            if (S.view === 'note') {
              const first = Object.values(S.ideas)[0];
              S.activeNote = first ? first.id : null;
              renderNoteList(); selectNote(S.activeNote);
            }
            toast('インポートしました');
          } catch (ex) { toast('インポートに失敗しました'); }
        };
        reader.readAsText(file);
        ev.target.value = '';
      }
      function exportCurrentNoteText() {
        const o = S.ideas[S.activeNote];
        if (!o) { toast('エクスポートするメモを選択してください'); return; }
        const title = noteTitle(o);
        const filename = title.replace(/[\/\\?%*:|"<>]/g, '-') + '.md';
        const blob = new Blob([o.text || ''], { type: 'text/markdown' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url; a.download = filename;
        a.click(); URL.revokeObjectURL(url);
        toast(`${filename} をエクスポートしました`);
      }

      // ─── INIT ─────────────────────────────────────────────────────────────
      (function init() {
        const hasSaved = loadSaved();
        renderAll();
        if (!hasSaved) toast('i でアイデアを作成、Enter で次々と連続入力  /  c で接続  /  f でジャンプ選択  /  Alt+ドラッグ でパン');
      })();

      return { exportMarkdown };
    })();
  </script>
